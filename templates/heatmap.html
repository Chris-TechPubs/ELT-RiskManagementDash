function buildCatDropdown() {
  const dd = document.getElementById('cat-dropdown');
  dd.innerHTML = '';
  CAT_LABELS.forEach(([label, col]) => {
    const row = document.createElement('div');
    row.className = 'cat-dd-row' + (_hiddenCatColors.has(col) ? ' off' : '');
    row.innerHTML =
      `<span class="cat-dd-swatch" style="--swatch-col:${col}"></span>` +
      `<span class="cat-dd-label">${label}</span>`;
    catKeyElByColor[col] = row;
    row.addEventListener('click', e => {
      e.stopPropagation();
      const isHiding = !_hiddenCatColors.has(col);
      if (isHiding) _hiddenCatColors.add(col); else _hiddenCatColors.delete(col);
      updateCatFilter(col, isHiding);
      updateCatFilterBtn();
    });
    dd.appendChild(row);
  });

  // NOTE: button click handler and document close handler are registered ONCE
  // below (not here), so rebuilding the dropdown doesn't stack duplicate listeners.
}

function positionRiskHeader() {
  const r = hm.getBoundingClientRect();
  if (!r.width || !r.height) return;
  const scale   = Math.min(r.width / 1300, r.height / 780);
  const offsetX = (r.width  - 1300 * scale) / 2;
  const offsetY = (r.height -  780  * scale) / 2;

  // Card geometry — must match renderLegend() constants
  const CARD_TPAD = 52;
  const cardLeft  = (LEG_X - 40) * scale + offsetX + r.left;
  const cardTop   = P.y * scale + offsetY + r.top;
  const cardW     = 490 * scale;
  const h         = CARD_TPAD * scale;  // header height in CSS px

  const bar = document.getElementById('risk-header-bar');
  bar.style.left         = cardLeft + 'px';
  bar.style.top          = cardTop  + 'px';
  bar.style.width        = cardW    + 'px';
  bar.style.height       = h        + 'px';
  // Match SVG card's rx=20 corner radius exactly at current scale
  const rx = Math.round(20 * scale);
  bar.style.borderRadius = `0 ${rx}px 0 0`;  // left edge flush with graph; only top-right rounded

  // Column alignment: "#" at SVG x≈777 (one "R" char past R01 start at x=770)
  //                   "RISK NAME" at SVG x=808 (= lx+38, where name text starts)
  // Total from padding-left to RISK NAME = 31 SVG units, split as:
  //   #rh-id width (border-box, includes border+padding) + margin-right
  const DIV_GAP = 6;  // px: gap between border line and RISK NAME
  bar.style.setProperty('--rh-pad-l',  Math.round(47 * scale)                               + 'px');
  bar.style.setProperty('--rh-pad-r',  Math.max(8, Math.round(h * 0.18))                    + 'px');
  bar.style.setProperty('--rh-id-w',   Math.max(14, Math.round(31 * scale) - DIV_GAP)       + 'px');
  bar.style.setProperty('--rh-id-mr',  DIV_GAP                                               + 'px');
  bar.style.setProperty('--rh-id-pr',  Math.max(3, Math.round(3 * scale))                   + 'px');
  bar.style.setProperty('--rh-col-font',  Math.max(9,  Math.round(h * 0.26)) + 'px');
  bar.style.setProperty('--rh-btn-font',  Math.max(11, Math.round(h * 0.30)) + 'px');
  bar.style.setProperty('--rh-btn-pad-v', Math.max(3,  Math.round(h * 0.14)) + 'px');
  bar.style.setProperty('--rh-btn-pad-h', Math.max(8,  Math.round(h * 0.22)) + 'px');
  bar.style.setProperty('--rh-btn-r',     Math.max(4, rx)                    + 'px');
  bar.style.setProperty('--rh-div-mx',    Math.max(5,  Math.round(h * 0.18)) + 'px');
  // Dropdown items scale with header so they're legible at any iframe size
  bar.style.setProperty('--rh-dd-font',   Math.max(12, Math.round(h * 0.36)) + 'px');
  bar.style.setProperty('--rh-dd-dot',    Math.max(10, Math.round(h * 0.26)) + 'px');
  bar.style.setProperty('--rh-dd-pad-v',  Math.max(6,  Math.round(h * 0.18)) + 'px');
  bar.style.setProperty('--rh-dd-pad-h',  Math.max(12, Math.round(h * 0.30)) + 'px');
  bar.style.setProperty('--rh-dd-min-w',  Math.max(210, Math.round(300 * scale)) + 'px');

  // Size rh-mf-btn to match cat-filter-btn using same CSS vars (already set above)
  // Size search button to match cat-filter-btn height exactly — reads offsetHeight
  // after CSS vars are applied (forces reflow, guaranteeing accurate measurement)
  const catBtnH = document.getElementById('cat-filter-btn').offsetHeight;
  const sb = document.getElementById('rh-search-btn');
  sb.style.width        = catBtnH + 'px';
  sb.style.height       = catBtnH + 'px';
  sb.style.padding      = '0';
  sb.style.borderRadius = '50%';

  // Size the cat-filter overlay to cover the card body (everything below the header bar)
  const overlay = document.getElementById('cat-list-overlay');
  overlay.style.left         = cardLeft + 'px';
  overlay.style.top          = (cardTop + h) + 'px';
  overlay.style.width        = cardW + 'px';
  overlay.style.height       = Math.max(0, P.h * scale - h) + 'px';
  overlay.style.borderRadius = `0 0 ${rx}px ${rx}px`;

  // Size the modal backdrop to cover graph + risk list only (not full viewport)
  const plotLeft = P.x * scale + offsetX + r.left;
  const plotTop  = P.y * scale + offsetY + r.top;
  const mol = document.getElementById('risk-modal-overlay');
  mol.style.left         = plotLeft + 'px';
  mol.style.top          = plotTop  + 'px';
  mol.style.width        = ((P.w + 490) * scale) + 'px';  // graph width + risk list width
  mol.style.height       = (P.h * scale) + 'px';
  mol.style.borderRadius = rx + 'px';
}

// ── Legend ────────────────────────────────────────────────────────────────────
function renderLegend() {
  const layer = document.getElementById('legend-layer');
  // Clear previous content and stale map references before rebuilding —
  // without this, old detached DOM nodes accumulate on every call
  while (layer.firstChild) layer.removeChild(layer.firstChild);
  Object.keys(legendRowByRiskId).forEach(k => delete legendRowByRiskId[k]);

  const lx    = LEG_X;

  const sorted = [...RISKS].filter(r => _isRiskVisible(r)).sort((a, b) => {
    switch (_listSort) {
      case 'score':      return (b.likelihood * b.severity) - (a.likelihood * a.severity);
      case 'severity':   return b.severity   - a.severity;
      case 'likelihood': return b.likelihood - a.likelihood;
      default:           return parseInt(a.id.replace(/\D/g,''),10) - parseInt(b.id.replace(/\D/g,''),10);
    }
  });

  // Card sizing — fills from graph-top to graph-bottom
  const CARD_PADX = 40;
  const CARD_TPAD = 52;  // header bar zone (HTML overlay covers this area)
  const CARD_BPAD = 8;   // snug below last row
  const CARD_W    = 490;
  const HDR_H     = 18;  // gap below header bar — must clear chevron circle tops
  // Top 5/10 only shows when ALL risks are visible (no filters active)
  const _allRisksVisible = sorted.length >= RISKS.length;
  const _top10WasVis     = typeof _top10SectionVisible !== 'undefined' ? _top10SectionVisible : true;
  _top10SectionVisible   = _allRisksVisible;
  // Reserve bottom of the panel for the Top 5/10 section
  const TOP10_H   = _allRisksVisible ? (_top10Expanded ? 175 : 135) : 0; // hide when filtered
  const TOP10_GAP = 10;  // separator gap between list and top 10
  const listAvail = P.h - TOP10_H - TOP10_GAP; // height available for the risk list
  const RISK_H    = (listAvail - CARD_TPAD - HDR_H - CARD_BPAD) / sorted.length;
  const fontSize  = Math.min(11, Math.max(8.5, RISK_H * 0.78));
  const cardListH = P.h;  // always matches graph height exactly (top + bottom edges flush)

  // Backer card — left edge flush with graph right; right corners match graph's left corner rx=20
  const cx = lx - CARD_PADX, cw = CARD_W, cy = P.y, ch = cardListH, cr = 20;
  mk('path', { d: roundedRectPath(cx, cy, cw, ch, 0, cr, cr, 0), fill: '#2D2D2E' }, layer);
  // Card border — open path (no left edge); matches graph's open right+top+bottom exposed sides
  const cBorder = `M ${cx},${cy} L ${cx+cw-cr},${cy} Q ${cx+cw},${cy} ${cx+cw},${cy+cr} L ${cx+cw},${cy+ch-cr} Q ${cx+cw},${cy+ch} ${cx+cw-cr},${cy+ch} L ${cx},${cy+ch}`;
  mk('path',{d:cBorder,fill:'none',stroke:'rgba(0,0,0,0.45)','stroke-width':1.5},layer);

  // Clip path so scaled rows can't overflow the card right edge
  const defs = document.querySelector('#hm defs');
  const existingClip = document.getElementById('risk-list-clip');
  if (existingClip) existingClip.remove();
  const clipEl = mk('clipPath', { id: 'risk-list-clip' }, defs);
  mk('rect', { x: lx - CARD_PADX, y: P.y, width: CARD_W, height: cardListH }, clipEl);
  // Wrapper: clip-path on parent so row scale transforms don't carry the clip with them
  const listWrap = mk('g', { 'clip-path': 'url(#risk-list-clip)' }, layer);

  // Risk list inside card (HTML header bar covers the CARD_TPAD zone; rows start below)
  let y = P.y + CARD_TPAD + HDR_H;

  sorted.forEach((r, idx) => {
    const col  = catColor(r.category || '');
    const name = r.name.length > 72 ? r.name.slice(0,70)+'…' : r.name;

    // Hairline separator exactly halfway between rows (true center of the gap)
    if (idx > 0) {
      mk('line', {
        x1: lx - CARD_PADX + 6, y1: y - Math.round(RISK_H * 0.68),
        x2: lx - CARD_PADX + CARD_W - 6, y2: y - Math.round(RISK_H * 0.68),
        stroke: '#3A3B3C', 'stroke-width': 0.5
      }, listWrap);
    }

    const rowG = mk('g', { class: 'legend-row' }, listWrap);
    legendRowByRiskId[r.id] = rowG;
    // Transparent full-width hit rect — closes the gaps between chevron/ID/name
    // fill:"transparent" (not "none") is required; SVG treats it as painted for pointer events
    mk('rect', {
      x: lx - CARD_PADX, y: y - Math.round(RISK_H * 0.5),
      width: CARD_W,      height: RISK_H,
      fill: 'transparent'
    }, rowG);
    const chevR = Math.max(5, Math.round(fontSize * 0.62));
    const chevX = lx - CARD_PADX + chevR + 12;
    const chevCy = y - Math.round(fontSize * 0.3);
    const chevG = mk('g', { class: 'legend-chevron' }, rowG);
    mk('circle', { cx: chevX, cy: chevCy, r: chevR, fill: col }, chevG);
    const s = chevR * 0.5;
    mk('path', {
      d: `M ${(chevX-s*0.7).toFixed(1)} ${(chevCy-s).toFixed(1)} L ${(chevX+s*0.7).toFixed(1)} ${chevCy.toFixed(1)} L ${(chevX-s*0.7).toFixed(1)} ${(chevCy+s).toFixed(1)}`,
      stroke: '#2D2D2E', 'stroke-width': (Math.max(1.5, chevR*0.28)).toFixed(1),
      'stroke-linecap': 'round', 'stroke-linejoin': 'round', fill: 'none'
    }, chevG);
    // ID in category color (accent); name in neutral — corporate data-table convention
    mktxt(r.id,  {x:lx,    y,'font-size':fontSize,'font-weight':700,fill:col,      'font-family':FONT}, rowG);
    mktxt(name,  {x:lx+38, y,'font-size':fontSize,'font-weight':500,fill:'#BEC0C6','font-family':FONT}, rowG);
    rowG.addEventListener('mouseenter', () => {
      _activeLegendRows.add(r.id);
      rowG.classList.add('legend-row-hl');
      const dg = dotGroupByRiskId[r.id];
      if (dg) dg.classList.add('dot-force-highlight');
      if (!_spotlightOwner) dimLegend(true);
      clearTimeout(_panDelay);
      _panDelay = setTimeout(() => panToRisk(r), 500);
    });
    rowG.addEventListener('mouseleave', () => {
      _activeLegendRows.delete(r.id);
      clearTimeout(_panDelay); _panDelay = null;
      // Keep highlight/dim if spotlight is active for this risk
      if (_spotlightOwner && _isSpotlightRisk(r)) return;
      rowG.classList.remove('legend-row-hl');
      const dg = dotGroupByRiskId[r.id];
      if (dg) dg.classList.remove('dot-force-highlight');
      if (!_spotlightOwner) dimLegend(false);
    });
    rowG.addEventListener('click', () => {
      const grp = dotRisksGroupById[r.id];
      const fullRisks = (grp || [r]).map(gr => RISKS.find(fr => fr.id === gr.id) || gr);
      const tab = fullRisks.findIndex(fr => fr.id === r.id);
      openModal(fullRisks, Math.max(0, tab));
    });
    y += RISK_H;
  });
  _reapplySpotlight(); // restore spotlight highlights on newly created row elements

  // Animate legend when top10 section appears/disappears
  // No animation here — top10 section simply appears/disappears with filter changes
  // (animation was causing white flash from SVG layer compositing)

  // ── Top 10 — rendered in reserved space, only when all risks are visible ──
  if (!_allRisksVisible) return; // no top10 section when filters are active
  const t10y0   = P.y + listAvail + TOP10_GAP; // top of the top-10 section
  const t10Count = _top10Expanded ? 10 : 5;
  const t10Rows = [...RISKS]
    .filter(r => _isRiskVisible(r))
    .sort((a, b) => (b.severity || 0) - (a.severity || 0) || (b.likelihood || 0) - (a.likelihood || 0))
    .slice(0, t10Count);
  const t10RowH  = (TOP10_H - 40) / t10Count; // 40 = header(24) + expand-btn(16)
  const t10X0    = lx - CARD_PADX;
  const t10Font  = Math.min(10, Math.max(8, t10RowH * 0.72));

  // Named wrapper group — animated independently from the risk list above
  const t10g = mk('g', { id: 'top10-layer-group' }, layer);

  // Separator line
  mk('line', { x1: t10X0 + 10, y1: t10y0, x2: t10X0 + CARD_W - 10, y2: t10y0,
               stroke: 'rgba(255,255,255,0.12)', 'stroke-width': 0.8 }, t10g);

  // Section header
  mktxt(`TOP ${t10Count} — HIGHEST SEVERITY`, {
    x: t10X0 + CARD_W / 2, y: t10y0 + 14,
    'text-anchor': 'middle', 'font-size': 8.5, 'font-weight': 700,
    fill: '#FF671F', 'font-family': AXIS_FONT, 'letter-spacing': 1
  }, t10g);

  // Rows
  t10Rows.forEach((r, i) => {
    // Hairline separator between rows (skip before first)
    if (i > 0) {
      const sepY = t10y0 + 24 + i * t10RowH;
      mk('line', {
        x1: t10X0 + 8, y1: sepY, x2: t10X0 + CARD_W - 8, y2: sepY,
        stroke: 'rgba(255,255,255,0.07)', 'stroke-width': 0.6
      }, layer);
    }
    const rowY   = t10y0 + 24 + i * t10RowH + t10RowH * 0.72;
    const col    = catColor(r.category || '') || '#666';
    const sev    = r.severity != null ? parseFloat(r.severity).toFixed(1) : '—';
    const maxLen = 36;
    const name   = r.name.length > maxLen ? r.name.slice(0, maxLen - 1) + '…' : r.name;
    const rowG   = mk('g', { style: 'cursor:pointer' }, t10g);

    // Hover hit area
    mk('rect', { x: t10X0, y: rowY - t10RowH * 0.7, width: CARD_W, height: t10RowH,
                 fill: 'transparent', rx: 4 }, rowG);
    rowG.addEventListener('mouseenter', () =>
      rowG.querySelector('rect').setAttribute('fill', 'rgba(255,255,255,0.06)'));
    rowG.addEventListener('mouseleave', () =>
      rowG.querySelector('rect').setAttribute('fill', 'transparent'));
    rowG.addEventListener('click', () =>
      openModal([RISKS.find(x => x.id === r.id)], 0));

    // Rank
    mktxt(String(i + 1), {
      x: t10X0 + 14, y: rowY, 'text-anchor': 'middle',
      'font-size': t10Font * 0.85, fill: 'rgba(168,168,170,0.7)', 'font-family': AXIS_FONT
    }, rowG);
    // Colored ID badge
    mktxt(r.id, {
      x: t10X0 + 38, y: rowY, 'text-anchor': 'middle',
      'font-size': t10Font, 'font-weight': 700, fill: col, 'font-family': AXIS_FONT
    }, rowG);
    // Risk name
    mktxt(name, {
      x: t10X0 + 65, y: rowY,
      'font-size': t10Font, fill: '#BEC0C6', 'font-family': AXIS_FONT
    }, rowG);
    // Severity (right-aligned)
    // Subtle vertical tick before severity value
    mk('line', {
      x1: t10X0 + CARD_W - 50, y1: rowY - t10Font * 0.7,
      x2: t10X0 + CARD_W - 50, y2: rowY + t10Font * 0.2,
      stroke: 'rgba(255,255,255,0.12)', 'stroke-width': 0.7
    }, rowG);
    mktxt(sev, {
      x: t10X0 + CARD_W - 28, y: rowY, 'text-anchor': 'end',
      'font-size': t10Font, 'font-weight': 700, fill: '#E8EAED', 'font-family': AXIS_FONT
    }, rowG);
  });

  // Expand / collapse toggle button
  const expandBtnY = t10y0 + TOP10_H - 6;
  const expandG = mk('g', { style: 'cursor:pointer' }, t10g);
  mk('rect', {
    x: t10X0 + CARD_W / 2 - 52, y: expandBtnY - 9,
    width: 104, height: 14, rx: 7, fill: 'rgba(255,103,31,0.12)'
  }, expandG);
  mktxt(_top10Expanded ? '▼  Show Top 5' : '▲  Show Top 10', {
    x: t10X0 + CARD_W / 2, y: expandBtnY,
    'text-anchor': 'middle', 'font-size': 8.5, 'font-weight': 700,
    fill: '#FF671F', 'font-family': AXIS_FONT, 'letter-spacing': 0.5
  }, expandG);
  expandG.addEventListener('click', () => {
    const expanding = !_top10Expanded;
    _top10Expanded = expanding;
    renderLegend(); // rebuild with new row count
    // Animate ONLY the top10 group — no opacity, no full-layer flash
    const g = document.getElementById('top10-layer-group');
    if (!g) return;
    g.style.transition = 'none';
    g.style.transform  = expanding ? 'translateY(20px)' : 'translateY(-14px)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      g.style.transition = expanding
        ? 'transform 0.58s cubic-bezier(0.16,1,0.3,1)'
        : 'transform 0.38s cubic-bezier(0.4,0,0.2,1)';
      g.style.transform  = 'translateY(0)';
      setTimeout(() => { g.style.transition = g.style.transform = ''; }, 620);
    }));
  });
  expandG.addEventListener('mouseenter', () =>
    expandG.querySelector('rect').setAttribute('fill', 'rgba(255,103,31,0.22)'));
  expandG.addEventListener('mouseleave', () =>
    expandG.querySelector('rect').setAttribute('fill', 'rgba(255,103,31,0.12)'));
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const TIP = document.getElementById('tooltip');
// Sequence number — increment to cancel any in-flight delay
let _tipSeq = 0;

function showTip(e, risks) {
  const l = risks[0]?.likelihood ?? 0;
  const s = risks[0]?.severity   ?? 0;
  const isOverdue    = risks.some(r => String(r.review_overdue).toLowerCase() === 'true');
  const isPoorHealth = risks.some(r => { const h=(r.mitigation_health||'').toLowerCase(); return h.includes('risk')||h.includes('behind'); });
  const alerts = [
    isOverdue    ? `<div class="tt-alert overdue">⚠ Review Overdue</div>` : '',
    isPoorHealth ? `<div class="tt-alert health">↓ Mitigation Behind</div>` : '',
  ].join('');

  TIP.innerHTML = risks.map(r =>
    `<div class="tt-row"><span class="tt-id" style="color:${catColor(r.category||'')}">${r.id}</span><span class="tt-nm">${r.name}</span></div>`
  ).join('') + `<div class="tt-div"></div>
  <div class="tt-stat">Likelihood: <span class="tt-val">${snap(l).toFixed(1)}</span>
    &nbsp;|&nbsp; Severity: <span class="tt-val">${snap(s).toFixed(1)}</span></div>
  ${alerts}`;
  moveTip(e);  // position while invisible so it won't jump when it appears
  const seq = ++_tipSeq;
  // setTimeout for wall-clock delay (refresh-rate independent), then rAF to land
  // at the start of a paint frame so the CSS opacity transition fires cleanly.
  setTimeout(() => {
    if (_tipSeq !== seq) return;
    requestAnimationFrame(() => {
      if (_tipSeq !== seq) return;
      void TIP.offsetWidth;              // commit opacity:0 state before transitioning
      TIP.classList.add('tt-visible');
    });
  }, 400);
}
function getRiskListLeftPx() {
  const svgEl = document.getElementById('hm');
  if (!svgEl) return window.innerWidth * 0.56;
  const ctm = svgEl.getScreenCTM();
  if (!ctm) return window.innerWidth * 0.56;
  const pt = svgEl.createSVGPoint();
  pt.x = P.x + P.w;  // SVG x=730 — left edge of risk list card
  pt.y = 0;
  return pt.matrixTransform(ctm).x;
}
function moveTip(e) {
  const tw=TIP.offsetWidth, th=TIP.offsetHeight;
  const rightBound = getRiskListLeftPx() - 12;  // stop 12px before risk list

  // Prefer tooltip left of cursor
  let tx = e.clientX - tw - 16;
  if (tx < 8) {
    // Not enough room on left — try right side only if it clears the risk list
    const rightTx = e.clientX + 16;
    tx = (rightTx + tw <= rightBound) ? rightTx : 8;
  } else if (tx + tw > rightBound) {
    // Left-side tooltip bleeds into risk list — push it further left
    tx = Math.max(8, rightBound - tw);
  }

  let ty = e.clientY - 10;
  if (ty + th > window.innerHeight - 8) ty = e.clientY - th - 4;
  TIP.style.left=tx+'px'; TIP.style.top=ty+'px';
}
function hideTip() {
  ++_tipSeq;  // invalidates any pending rAF delay chain
  TIP.classList.remove('tt-visible');
}

// ── Risk detail modal with tabs ───────────────────────────────────────────────
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
let _modalRisks = [];  // risks currently shown in the modal

function openModal(risks, initialTab, initialPage, targetTask, searchQuery) {
  hideTip();
  closePersonModal();    // close person card if open
  _activeTabIdx = null;  // reset so first switchModalTab call skips animation
  _modalPage = initialPage || 0; // use caller's page (e.g. Tasks tab from search result)
  _taskSortOrder = 'completion'; // reset sort on each new modal open
  document.querySelectorAll('.sort-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  const allRisks = risks.map(r => RISKS.find(fr => fr.id === r.id) || r);
  _modalRisks = allRisks.filter(r => _isRiskVisible(r));
  if (!_modalRisks.length) return;
  // Adjust initialTab to point to the same risk in filtered array
  if (initialTab != null && allRisks[initialTab]) {
    const tid = allRisks[initialTab].id;
    const ni = _modalRisks.findIndex(r => r.id === tid);
    if (ni >= 0) initialTab = ni; else initialTab = 0;
  }

  // Build tabs — one per risk ID
  const tabsEl = document.getElementById('risk-modal-tabs');
  tabsEl.innerHTML = '';
  if (_modalRisks.length > 1) {
    _modalRisks.forEach((r, idx) => {
      const btn = document.createElement('button');
      const col = catColor(r.category || '') || '#666';
      btn.className   = 'modal-tab' + (idx === 0 ? ' active' : '');
      btn.textContent = r.id;
      // Inactive: subtle category tint; active styling applied in switchModalTab
      btn.style.backgroundColor = hexToRgba(col, 0.22);
      btn.style.color            = col;
      btn.style.borderColor      = hexToRgba(col, 0.5);
      btn.dataset.col            = col;  // store for later updates
      btn.onclick = () => switchModalTab(idx);
      tabsEl.appendChild(btn);
    });
    tabsEl.style.display = 'flex';
    document.getElementById('modal-sep').style.display = '';
  } else {
    tabsEl.style.display = 'none';
    document.getElementById('modal-sep').style.display = 'none';
  }

  switchModalTab(initialTab || 0);
  document.getElementById('risk-modal').classList.add('open');
  // Re-snap indicator after the modal becomes display:flex — getBoundingClientRect
  // returns zeros while the modal is still display:none, so we must measure again
  // on the next frame when layout is available.
  // Animated slide: indicator travels to the correct tab 100ms after open,
  // after layout is stable. Looks intentional and sidesteps transition-timing issues.
  setTimeout(() => _updateIndicator(false), 100);
  // Highlight the specific task card that was clicked from search results
  if (targetTask) setTimeout(() => _highlightTaskCard(targetTask, searchQuery || ''), 220);
}

function _hlPulseHtml(text, query, col) {
  if (!query || !text) return text || '';
  const lo = text.toLowerCase(), q = query.toLowerCase();
  let result = '', i = 0;
  while (i < text.length) {
    const idx = lo.indexOf(q, i);
    if (idx < 0) { result += text.slice(i); break; }
    result += text.slice(i, idx) +
      `<span class="task-char-pulse" style="--card-pulse:${col}">${text.slice(idx, idx + q.length)}</span>`;
    i = idx + q.length;
  }
  return result;
}

function _highlightTaskCard(taskName, searchQuery) {
  if (!taskName) return;
  const r   = _modalRisks[_activeTabIdx ?? 0] || {};
  const col = catColor(r.category || '') || '#FF671F';
  const card = [...document.querySelectorAll('.task-card')]
    .find(c => c.dataset.task === taskName);
  if (!card) return;

  card.style.setProperty('--card-pulse', col);
  card.classList.remove('task-card-pulse');
  void card.offsetWidth;
  card.classList.add('task-card-pulse');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  let savedPanelEl = null, savedPanelText = null;

  if (searchQuery) {
    const q = searchQuery.toLowerCase();

    // Highlight in task name if it matches
    const nameEl = card.querySelector('.task-card-name');
    if (nameEl && taskName.toLowerCase().includes(q))
      nameEl.innerHTML = _hlPulseHtml(taskName, searchQuery, col);

    // Highlight in the currently visible content panel (definition) if it matches
    card.querySelectorAll('.task-content-panel').forEach(panel => {
      if (savedPanelEl || panel.style.display === 'none') return;
      const text = panel.textContent;
      if (text.toLowerCase().includes(q)) {
        savedPanelEl   = panel;
        savedPanelText = text;
        panel.innerHTML = _hlPulseHtml(text, searchQuery, col);
      }
    });
  }

  setTimeout(() => {
    card.classList.remove('task-card-pulse');
    card.style.removeProperty('--card-pulse');
    if (searchQuery) {
      const nameEl = card.querySelector('.task-card-name');
      if (nameEl) nameEl.textContent = taskName;
      if (savedPanelEl) savedPanelEl.textContent = savedPanelText;
    }
  }, 5200);
}

// ── Owner spotlight ───────────────────────────────────────────────────────────
function _isSpotlightRisk(r) {
  if (!_spotlightOwner) return false;
  return [r.owner, r.elt_owner, r.managers, r.other_managers]
    .some(f => f && f.split(',').map(s => s.trim()).includes(_spotlightOwner));
}

function _reapplySpotlight() {
  if (!_spotlightOwner) return;
  // Re-apply dot and row highlights after any rerender/renderLegend that wipes them
  const matchIds = new Set(RISKS.filter(r => _isSpotlightRisk(r)).map(r => r.id));
  Object.entries(dotGroupByRiskId).forEach(([id, dg]) =>
    dg.classList.toggle('dot-force-highlight', matchIds.has(id)));
  Object.entries(legendRowByRiskId).forEach(([id, row]) =>
    row.classList.toggle('legend-row-hl', matchIds.has(id)));
  if (_dimCount === 0) dimLegend(true); // restore if rerender reset it
}

function activateSpotlight(ownerName) {
  _spotlightOwner = ownerName;
  _updateResetBtn();
  // Close the modal first so the chart is visible
  closeModal();
  // Apply after the modal close animation completes (0.20s)
  setTimeout(() => {
    const matchIds = new Set(
      RISKS.filter(r =>
        [r.owner, r.elt_owner, r.managers, r.other_managers]
          .some(f => f && f.split(',').map(s => s.trim()).includes(ownerName))
      ).map(r => r.id)
    );
    Object.entries(dotGroupByRiskId).forEach(([id, dg]) => {
      dg.classList.toggle('dot-force-highlight', matchIds.has(id));
    });
    Object.entries(legendRowByRiskId).forEach(([id, row]) => {
      row.classList.toggle('legend-row-hl', matchIds.has(id));
    });
    dimLegend(true);
    document.getElementById('spotlight-chip-label').textContent = ownerName;
    document.getElementById('spotlight-chip').classList.add('visible');
  }, 230);
}

function clearSpotlight() {
  if (!_spotlightOwner) return;
  _spotlightOwner = null;
  Object.values(dotGroupByRiskId).forEach(dg => dg.classList.remove('dot-force-highlight'));
  Object.values(legendRowByRiskId).forEach(row => row.classList.remove('legend-row-hl'));
  dimLegend(false);
  document.getElementById('spotlight-chip').classList.remove('visible');
  _updateResetBtn();
}

function updateFilterChip() {
  const n = _activeFilters.status.size + _activeFilters.health.size +
            _activeFilters.quarter.size + (_activeFilters.overdue ? 1 : 0);
  const chip = document.getElementById('filter-chip');
  if (!n) {
    chip.classList.remove('visible', 'clickable');
    closeFilterChipMenu();
    return;
  }
  let label;
  const isSpecific = n === 1;
  if (isSpecific) {
    if (_activeFilters.overdue)           label = 'Overdue Only';
    else if (_activeFilters.status.size)  label = [..._activeFilters.status][0];
    else if (_activeFilters.health.size)  label = [..._activeFilters.health][0];
    else if (_activeFilters.quarter.size) label = [..._activeFilters.quarter][0];
    else                                  label = '1 Filter Active';
  } else {
    label = `${n} Filters Active`;
  }
  document.getElementById('filter-chip-label').textContent = label;
  chip.classList.add('visible');
  chip.classList.toggle('clickable', !isSpecific);
  if (document.getElementById('filter-chip-menu').classList.contains('open'))
    _buildFilterChipMenu();
  _updateResetBtn();
}

// ── Active filter detail menu ─────────────────────────────────────────────────
let _fcmOpen = false;

function _buildFilterChipMenu() {
  const menu = document.getElementById('filter-chip-menu');
  menu.innerHTML = '';
  const FONT = `font-family:var(--antenna);font-size:15px;`;

  const addSection = (title, items, removeOne) => {
    if (!items.length) return;
    const hdr = document.createElement('div');
    hdr.className = 'fcm-header'; hdr.textContent = title;
    menu.appendChild(hdr);
    items.forEach(val => {
      const row = document.createElement('div'); row.className = 'fcm-row';
      const lbl = document.createElement('span'); lbl.className = 'fcm-label';
      lbl.textContent = val; row.appendChild(lbl);
      const x = document.createElement('button'); x.className = 'fcm-x'; x.textContent = '✕';
      x.addEventListener('click', e => { e.stopPropagation(); removeOne(val); });
      row.appendChild(x); menu.appendChild(row);
    });
  };

  if (_activeFilters.overdue) {
    const hdr = document.createElement('div'); hdr.className = 'fcm-header'; hdr.textContent = 'Review';
    menu.appendChild(hdr);
    const row = document.createElement('div'); row.className = 'fcm-row';
    const lbl = document.createElement('span'); lbl.className = 'fcm-label'; lbl.textContent = 'Overdue Only';
    row.appendChild(lbl);
    const x = document.createElement('button'); x.className = 'fcm-x'; x.textContent = '✕';
    x.addEventListener('click', e => { e.stopPropagation();
      const prev = new Set(RISKS.filter(r => _isRiskVisible(r)).map(r => r.id));
      _activeFilters.overdue = false; updateFilterChip(); updateMfBtn();
      requestAnimationFrame(() => _applyFilterWithAnimation(prev));
    });
    row.appendChild(x); menu.appendChild(row);
  }
  addSection('Status', [..._activeFilters.status], val => {
    const prev = new Set(RISKS.filter(r => _isRiskVisible(r)).map(r => r.id));
    _activeFilters.status.delete(val); updateFilterChip(); updateMfBtn();
    requestAnimationFrame(() => _applyFilterWithAnimation(prev));
  });
  addSection('Health', [..._activeFilters.health], val => {
    const prev = new Set(RISKS.filter(r => _isRiskVisible(r)).map(r => r.id));
    _activeFilters.health.delete(val); updateFilterChip(); updateMfBtn();
    requestAnimationFrame(() => _applyFilterWithAnimation(prev));
  });
  addSection('Quarter', [..._activeFilters.quarter], val => {
    const prev = new Set(RISKS.filter(r => _isRiskVisible(r)).map(r => r.id));
    _activeFilters.quarter.delete(val); updateFilterChip(); updateMfBtn();
    requestAnimationFrame(() => _applyFilterWithAnimation(prev));
  });
}

function openFilterChipMenu() {
  const menu = document.getElementById('filter-chip-menu');
  const chip = document.getElementById('filter-chip');
  _buildFilterChipMenu();
  if (!menu.children.length) return;
  const cr = chip.getBoundingClientRect();
  menu.style.left = cr.left + 'px';
  menu.style.bottom = (window.innerHeight - cr.top + 8) + 'px';
  menu.style.top = 'auto';
  menu.classList.remove('open'); void menu.offsetWidth;
  menu.classList.add('open');
  _fcmOpen = true;
}

function closeFilterChipMenu() {
  document.getElementById('filter-chip-menu').classList.remove('open');
  _fcmOpen = false;
}

// Wire up chip click
document.getElementById('filter-chip').addEventListener('click', () => {
  if (!document.getElementById('filter-chip').classList.contains('clickable')) return;
  _fcmOpen ? closeFilterChipMenu() : openFilterChipMenu();
});

// Close on outside click
document.addEventListener('click', e => {
  if (!_fcmOpen) return;
  const menu = document.getElementById('filter-chip-menu');

function clearAllFilters() {

  _activeFilters.status.clear();

  _activeFilters.quarter.clear();

function _updateResetBtn() {
  const multiActive =
    _hiddenCatColors.size > 0 || _activeFilters.status.size > 0 ||
    _activeFilters.health.size > 0 || _activeFilters.quarter.size > 0 ||
    _activeFilters.overdue || !!_spotlightOwner;
  const anyActive  = multiActive || !!_ownerFilter;
  const chip       = document.getElementById('reset-all-chip');
  chip.classList.toggle('visible', anyActive);

  if (!anyActive) return;

  // Owner-only mode: show person name + × button
  const onlyOwner = !!_ownerFilter && !multiActive;
  if (onlyOwner) {
    chip.innerHTML = `
      <span class="chip-icon">person</span>
      <span>${_ownerFilter}</span>
      <button class="chip-close" title="Clear owner filter"
              onclick="setOwnerFilter(null);event.stopPropagation()">✕</button>`;
    chip.onclick   = null;
    chip.style.cursor = 'default';
  } else {
    chip.innerHTML = `
      <span class="chip-icon" style="font-size:14px">restart_alt</span>
      <span>Reset All</span>`;
    chip.onclick      = resetAllFilters;
    chip.style.cursor = 'pointer';
  }
}

// ── Owner Filter ──────────────────────────────────────────────────────────────
let _ownerFilter = null; // currently selected owner name (null = All Owners)

function _getAllOwners() {
  const names = new Set();
  RISKS.forEach(r => {
    [r.owner, r.elt_owner, r.managers, r.other_managers].forEach(field => {
      if (!field) return;
      field.split(/[,\/]/).map(n => n.trim()).filter(n => n.length > 1)
           .forEach(n => names.add(n));
    });
  });
  return [...names].sort((a, b) => a.localeCompare(b));
}

function _isOwnerMatch(r) {
  if (!_ownerFilter) return true;
  const q = _ownerFilter.toLowerCase();
  return [r.owner, r.elt_owner, r.managers, r.other_managers]
    .filter(Boolean)
    .some(field => field.split(/[,\/]/).map(n => n.trim().toLowerCase()).includes(q));
}

function buildOwnerDropdown() {
  const dd = document.getElementById('owner-dropdown');
  dd.innerHTML = '';
  // "All Owners" reset row
  const allRow = document.createElement('div');
  allRow.className = 'owner-dd-row' + (!_ownerFilter ? ' active' : '');
  allRow.textContent = 'All Owners';
  allRow.addEventListener('click', e => { e.stopPropagation(); setOwnerFilter(null); });
  dd.appendChild(allRow);
  // One row per unique owner
  _getAllOwners().forEach(name => {
    const row = document.createElement('div');
    row.className = 'owner-dd-row' + (_ownerFilter === name ? ' active' : '');
    row.textContent = name;
    row.addEventListener('click', e => { e.stopPropagation(); setOwnerFilter(name); });
    dd.appendChild(row);
  });
}

function setOwnerFilter(name) {
  _ownerFilter = name || null;
  updateOwnerBtn();

  const prev = new Set(RISKS.filter(r => _isRiskVisible(r)).map(r => r.id));

function resetAllFilters() {
  const prev = new Set(RISKS.filter(r => _isRiskVisible(r)).map(r => r.id));
  // Immediately un-dim the legend — prevents stale _dimCount leaving list dark
  _dimCount = 0;

    document.getElementById(id).classList.remove('open', 'closing'));

  document.getElementById('cat-list-overlay').classList.remove('dd-open');
  // Clear category filter
  _hiddenCatColors.clear();
  Object.entries(catKeyElByColor).forEach(([, el]) => el.classList.remove('off'));

  buildCatDropdown();

  _activeFilters.health.clear();
  _activeFilters.quarter.clear();
  _activeFilters.overdue = false;

  updateMfBtn();

// Mouse-wheel: vertical inside cards/panels (natural), horizontal on task row
document.getElementById('modal-page-area').addEventListener('wheel', e => {
  function _scrolledOut(el) {
    const atTop    = el.scrollTop === 0 && e.deltaY < 0;
    const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1 && e.deltaY > 0;
    return atTop || atBottom;
  }
  // Text panel: scroll it vertically; fall through to row only at its limits
  const panel = e.target.closest('.task-content-panel');
  if (panel) { if (!_scrolledOut(panel)) return; }

  // Task card (tasks-mode): scroll card vertically; fall through to row at limits
  const card = e.target.closest('.task-card');
  if (card && document.getElementById('modal-page-area').classList.contains('tasks-mode')) {
    if (!_scrolledOut(card)) return;
  }

  // Scroll the task row horizontally
  const row = e.target.closest('.tasks-scroll-row');
  if (!row) return;
  e.preventDefault();
  row.scrollLeft += e.deltaY + e.deltaX;
}, { passive: false });

  box.style.height = pinnedH + 'px';
  _setModalPage(page, true);
  _animateBoxToAutoHeight(box, pinnedH);
});

let _activeTabIdx = null;  // null = modal not currently shown

let _modalPage = 0;
let _taskSortOrder = 'completion'; // 'completion' | 'alpha' | 'severity'

function _sortedTasks(r) {
  const tasks = (TASKS[r.id] || []).filter(t => t.task);
  return [...tasks].sort((a, b) => {
    if (_taskSortOrder === 'alpha')
      return (a.task || '').localeCompare(b.task || '');
    if (_taskSortOrder === 'severity') {
      const sa = parseFloat(a.severity) ?? 0;
      const sb = parseFloat(b.severity) ?? 0;
      return sb - sa; // highest severity first
    }
    // completion: highest % first; null/missing goes last
    const pa = a.progress ?? -1;
    const pb = b.progress ?? -1;
    return pb - pa;
  });
}

function _renderContacts(name, email) {
  if (!name) return '—';
  if (!email) return name;
  const names  = name.split(',').map(s => s.trim()).filter(Boolean);
  const emails = email.split(',').map(s => s.trim()).filter(Boolean);
  return names.map((n, i) => {
    const e = emails[i] || emails[0] || '';
    return e ? `<a class="contact-link" href="mailto:${e}">${n}</a>` : n;
  }).join(', ');
}

function _field(label, value) {
  if (!value || value === 'None') return '';
  return `<div class="modal-field">
    <div class="modal-label">${label}</div>
    <div class="modal-value">${value}</div>
  </div>`;
}

// "At Risk" renamed at display time — items are already called Risks, the label is confusing
function _displayStatus(s) {
  if (!s) return s;
  // "At Risk" renamed — items are already called Risks, the label is redundant and confusing
  return s.toLowerCase().trim() === 'at risk' ? 'Needs Attention' : s;
}

function _badge(text) {
  if (!text || text === 'None') return '—';
  const display = _displayStatus(text);
  const t = text.toLowerCase(); // keep original for color logic
  const cls = t.includes('overdue') || t.includes('at risk') || t === 'true'   ? 'red'
            : t.includes('on track') || t.includes('complete') || t === 'false' ? 'green'
            : t.includes('monitor') || t.includes('behind')                     ? 'yellow'
            : 'grey';
  return `<span class="modal-badge ${cls}">${display}</span>`;
}

function _scoreCell(label, value, color) {
  const v = value || '—';
  return `<div class="modal-data-cell">
    <div class="modal-label">${label}</div>
    <div class="modal-value" style="${color ? 'color:'+color : ''}">${v}</div>
  </div>`;
}

function _buildPageContent(r, page) {
  if (page === 0) {
    // ── Overview ──────────────────────────────────────────────────────────────
    return [
      _field('Definition',          r.definition),
      _field('Risk Status',         r.status),
      _field('Action Plan Status',  r.action_status),
      _field('Control Effectiveness', r.control_eff),
      _field('Risk Level',          r.risk_level),
    ].filter(Boolean).join('') || '<div class="modal-value">No overview data available.</div>';
  }

  if (page === 1) {
    // ── Risk Data ─────────────────────────────────────────────────────────────
    const l = r.likelihood != null ? snap(r.likelihood).toFixed(1) : '—';
    const s = r.severity   != null ? snap(r.severity).toFixed(1)   : '—';
    const score = (r.likelihood != null && r.severity != null)
      ? (snap(r.likelihood) * snap(r.severity)).toFixed(2) : r.risk_score || '—';

    const inherent = `
      <div class="modal-section-head">Inherent Risk</div>
      <div class="modal-data-grid">
        ${_scoreCell('Likelihood', l)}
        ${_scoreCell('Severity',   s)}
      </div>`;

    const residual = ''; // removed per ELT feedback

    const isOverdueFlag = String(r.review_overdue).toLowerCase() === 'true';
    const reviewOverdue = isOverdueFlag ? _badge('Overdue') : r.review_overdue === 'false' ? _badge('On Track') : '';
    const overdueTriangle = isOverdueFlag
      ? `<button class="overdue-tri" title="Overdue for review">
           <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
             <polygon points="8,1 15,13 1,13" fill="#E53935"/>
             <text x="8" y="11.5" text-anchor="middle" fill="white"
               font-size="7.5" font-weight="900" font-family="Arial,sans-serif">!</text>
           </svg>
           <span class="overdue-tip">This item is overdue for review</span>
         </button>`
      : '';
    const reviewBlock = (r.review_date || r.last_reviewed)
      ? `<div class="modal-section-head">Review</div>
         <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
           ${r.review_date ? `<div class="modal-field">
             <div class="modal-label">Scheduled</div>
             <div class="modal-value ${isOverdueFlag ? 'overdue-date' : ''}">
               ${r.review_date}
             </div></div>` : ''}
           ${r.last_reviewed ? _field('Last Reviewed', r.last_reviewed) : ''}
         </div>
         ${reviewOverdue ? `<div class="modal-field"><div class="modal-label">Status</div><div class="modal-value">${reviewOverdue}</div></div>` : ''}`
      : '';

    const metaBlock = (r.date_added || r.date_modified)
      ? `<div class="modal-section-head">Record</div>
         <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
           ${r.date_added    ? `<div class="modal-field"><div class="modal-label">Date Added</div><div class="modal-value">${r.date_added}</div></div>` : ''}
           ${r.date_modified ? `<div class="modal-field"><div class="modal-label">Last Modified</div><div class="modal-value">${r.date_modified}</div></div>` : ''}
         </div>`
      : '';

    return inherent + residual + reviewBlock + metaBlock;
  }

  if (page === 2) {
    // ── Ownership & Mitigation ────────────────────────────────────────────────
    const pct     = parseFloat(r.mitigation_pct) || 0;
    const total   = r.tasks_total || '—';
    const done    = r.tasks_done  || '—';

    const _spotBtn = name => name
      ? name.split(',').map(n => n.trim()).filter(Boolean)
             .map(n => `<button class="spotlight-btn" data-spotlight="${n.replace(/"/g,'&quot;')}">${n}</button>`)
             .join(', ')
      : '—';
    const ownership = `
      <div class="modal-section-head">Ownership</div>
      ${r.elt_owner ? `<div class="modal-field"><div class="modal-label">ELT Owner</div><div class="modal-value">${_spotBtn(r.elt_owner)}</div></div>` : ''}
      ${r.owner     ? `<div class="modal-field"><div class="modal-label">Risk Owner</div><div class="modal-value">${_spotBtn(r.owner)}</div></div>` : ''}
      ${r.managers  ? `<div class="modal-field"><div class="modal-label">Manager(s)</div><div class="modal-value">${_spotBtn(r.managers)}</div></div>` : ''}
      ${r.other_managers ? `<div class="modal-field"><div class="modal-label">Other Managers</div><div class="modal-value">${_spotBtn(r.other_managers)}</div></div>` : ''}`;

    const mitigation = `
      <div class="modal-section-head">Mitigation</div>
      ${r.mitigation_health ? `<div class="modal-field"><div class="modal-label">Health</div><div class="modal-value">${_badge(r.mitigation_health)}</div></div>` : ''}
      ${r.mitigation_pct !== undefined && r.mitigation_pct !== '' ? `
        <div class="modal-field">
          <div class="modal-label">Completion — ${Math.round(pct)}%
            ${total !== '—' ? `<span style="color:var(--allegion-muted);font-weight:400;text-transform:none">&nbsp;(${done}/${total} tasks)</span>` : ''}
          </div>
          <div class="modal-progress-track">
            <div class="modal-progress-fill" style="width:${Math.min(100,pct)}%"></div>
          </div>
        </div>` : ''}`;

    return ownership + mitigation;
  }

  if (page === 3) {
    return _buildTasksPage(r);
  }

  return '';
}

function _taskStatusClass(status) {
  if (!status) return 'tss-not-started';
  const s = status.toLowerCase();
  if (s.includes('complete') || s.includes('done'))    return 'tss-completed';
  if (s.includes('in progress') || s.includes('progress')) return 'tss-in-progress';
  if (s.includes('monitor'))                           return 'tss-monitoring';
  if (s.includes('at risk') || s.includes('risk'))     return 'tss-at-risk';
  return 'tss-not-started';
}

function _taskProgressFillClass(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('complete'))   return 'task-progress-fill-completed';
  if (s.includes('at risk'))    return 'task-progress-fill-at-risk';
  if (s.includes('monitor'))    return 'task-progress-fill-monitoring';
  return 'task-progress-fill-in-progress';
}

function _trendLabel(trend) {
  if (!trend) return '';
  // Map emoji shortcuts to readable labels
  if (trend.includes('⚠') || trend.includes('risk'))    return { icon: '⚠️', label: 'Needs Attention', cls: 'color:#EF5350' };
  if (trend.includes('►') || trend.includes('▶'))  return { icon: '▶',  label: 'On Track',  cls: 'color:#8BC34A' };
  if (trend.includes('\U0001f441') || trend.includes('👁'))  return { icon: '👁', label: 'Monitoring', cls: 'color:#74B8F5' };
  return { icon: '', label: trend, cls: '' };
}

function _buildTasksPage(r) {
  const tasks = _sortedTasks(r);
  if (!tasks.length) {
    return `<div class="task-no-data">No mitigation tasks recorded for this risk.</div>`;
  }

  return `<div class="tasks-scroll-row">${tasks.map(t => {
    const statusCls  = _taskStatusClass(t.task_status);
    const fillCls    = _taskProgressFillClass(t.task_status);
    const pct        = (t.progress != null) ? Math.min(100, Math.max(0, t.progress)) : null;
    const trend      = _trendLabel(t.trend);

    const progressBar = pct != null ? `
      <div class="task-progress-row">
        <div class="modal-progress-track" style="flex:1">
          <div class="modal-progress-fill ${fillCls}" style="width:${pct}%"></div>
        </div>
        <span class="task-progress-label">${pct}%</span>
      </div>` : '';

    const sevNum = t.severity != null ? parseFloat(t.severity) : null;
    const metaRows = [
      sevNum != null  ? ['Severity',   sevNum.toFixed(1)] : null,
      t.responsible  ? ['Responsible', t.responsible]    : null,
      t.target_date  ? ['Target Date', t.target_date]    : null,
      t.start_date   ? ['Start Date',  t.start_date]     : null,
      t.managers     ? ['Manager(s)',  t.managers]        : null,
    ].filter(Boolean);

    const meta = metaRows.length ? `
      <div class="task-meta">
        ${metaRows.map(([lbl, val]) =>
          `<span class="task-meta-label">${lbl}</span><span class="task-meta-value">${val}</span>`
        ).join('')}
        ${trend.label ? `<span class="task-meta-label">Trend</span>
          <span class="task-meta-value" style="${trend.cls}">
            <span class="task-trend-icon">${trend.icon}</span>${trend.label}
          </span>` : ''}
      </div>` : '';

    // Build content tabs — only for non-empty fields, first one active by default
    // Definition first (default view), then strategy, then analysis
    const textFields = [
      { key: 'definition', label: 'Definition', text: t.definition },
      { key: 'strategy',   label: 'Strategy',   text: t.mitigation_strategy },
      { key: 'analysis',   label: 'Analysis',   text: t.trend_analysis },
    ].filter(f => f.text);

    const details = textFields.length ? `
      <div class="task-detail-block">
        <div class="task-content-tabs">
          ${textFields.map((f, i) =>
            `<button class="tct-btn${i === 0 ? ' active' : ''}" data-field="${f.key}">${f.label}</button>`
          ).join('')}
        </div>
        ${textFields.map((f, i) =>
          `<div class="task-content-panel" data-panel="${f.key}" style="${i > 0 ? 'display:none' : ''}">${f.text}</div>`
        ).join('')}
      </div>` : '';

    const expandRisk = r.id || '';
    const expandTask = (t.task||'').replace(/"/g,'&quot;');
    return `
      <div class="task-card" data-task="${expandTask}" style="position:relative">
        <button class="task-expand-btn" data-expand-risk="${expandRisk}" data-expand-task="${expandTask}"
                title="View full task details">
          <span class="material-symbols-outlined" style="font-size:13px;line-height:1;font-family:'Material Symbols Outlined';font-weight:300;font-variation-settings:'wght' 300">open_in_full</span>
        </button>
        <div class="task-card-header" style="padding-right:34px">
          <span class="task-card-name">${t.task}</span>
          ${t.task_status ? `<span class="task-status-badge ${statusCls}">${_displayStatus(t.task_status)}</span>` : ''}
        </div>
        ${progressBar}
        ${meta}
        ${details}
      </div>`;
  }).join('')}</div>`;
}

function _updateIndicator(instant) {
  const nav = document.getElementById('modal-page-nav');
  const activeBtn = nav && nav.querySelector('.mpn-btn.active');
  const indicator = document.getElementById('mpn-indicator');
  if (!activeBtn || !indicator) return;
  const navRect = nav.getBoundingClientRect();
  const btnRect = activeBtn.getBoundingClientRect();
  const left  = btnRect.left - navRect.left;
  const width = btnRect.width;
  if (instant) {
    indicator.classList.add('instant');
    indicator.style.left  = left + 'px';
    indicator.style.width = width + 'px';
    void indicator.offsetWidth; // flush so transition re-arms after class removal
    indicator.classList.remove('instant');
  } else {
    indicator.style.left  = left + 'px';
    indicator.style.width = width + 'px';
  }
}

function _setModalPage(page, animate) {
  _modalPage = page;
  // Update active button
  const r   = _modalRisks[_activeTabIdx ?? 0] || {};
  const _isOD = String(r.review_overdue).toLowerCase() === 'true';
  document.querySelectorAll('.mpn-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.page === page);
    if (+b.dataset.page === 1) b.classList.toggle('tab-overdue', _isOD);
  });
  // Expand modal width to fit task cards exactly, capped at viewport - 48px
  const _box = document.getElementById('risk-modal-box');
  if (page === 3) {
    const taskCount = (TASKS[r.id] || []).filter(t => t.task).length;
    const needed = taskCount * 354 + 100; // 340px card + 14px gap + box padding + scroll row padding + scrollbar
    const MIN_W  = 808; // floor: exact 2-card width (2*354+100), avoids jarring collapse
    const target = Math.min(Math.max(needed, MIN_W), window.innerWidth - 48);
    _box.style.width    = target + 'px';
    _box.style.maxWidth = target + 'px';
  } else {
    _box.style.width  = '';
    _box.style.maxWidth = '';
  }
  document.getElementById('task-sort-bar').classList.toggle('visible', page === 3);
  _updateIndicator(false); // slide to new tab
  const area = document.getElementById('modal-page-area');
  area.classList.toggle('tasks-mode', page === 3);
  area.innerHTML = _buildPageContent(r, page);
  if (animate) {
    area.classList.remove('page-in');
    void area.offsetWidth;
    area.classList.add('page-in');
    area.addEventListener('animationend', () => area.classList.remove('page-in'), { once: true });
  }
}

function switchModalTab(idx) {
  const isFirstRender = (_activeTabIdx === null);
  const dir = (!isFirstRender && idx > _activeTabIdx) ? 1 : -1;
  _activeTabIdx = idx;

  // Update tab button styles
  document.querySelectorAll('.modal-tab').forEach((t, i) => {
    const col = t.dataset.col || '#666';
    if (i === idx) {
      t.classList.add('active');
      t.style.backgroundColor = hexToRgba(col, 0.85);
      t.style.borderColor     = col;
      t.style.color           = '#000';
    } else {
      t.classList.remove('active');
      t.style.backgroundColor = hexToRgba(col, 0.22);
      t.style.borderColor     = hexToRgba(col, 0.5);
      t.style.color           = '#000';
    }
  });

  const newColor = document.querySelectorAll('.modal-tab')[idx]?.dataset.col || '#5A5A5C';
  const sep   = document.getElementById('modal-sep');
  const sweep = document.getElementById('modal-sep-sweep');

  if (isFirstRender) {
    // No animation on initial open — set directly and wipe any frozen sweep
    // state left over from a modal that was closed mid-animation
    sweep.classList.remove('sweeping');
    sweep.style.cssText = '';  // clear background, transform, transition all at once
    sep.style.setProperty('--sep-color', newColor);
    _updateModalContent(idx);
    return;
  }

  // ── Separator colour sweep ────────────────────────────────────────────────
  sweep.style.background = newColor;
  sweep.classList.remove('sweeping');
  void sweep.offsetWidth;
  sweep.classList.add('sweeping');
  sweep.addEventListener('transitionend', () => {
    sep.style.setProperty('--sep-color', newColor);
    sweep.classList.remove('sweeping');
    // Clear inline overrides so base CSS scaleX(0) takes over cleanly next time
    sweep.style.transform  = '';
    sweep.style.transition = '';
  }, { once: true });

  // ── Height animation setup — pin current height before content changes ────
  const box = document.getElementById('risk-modal-box');
  const pinnedH = box.offsetHeight;
  box.style.transition = _W_TRANSITION; // keep width animated, kill height transition for pinning
  box.style.height = pinnedH + 'px';

  // ── Content directional slide ─────────────────────────────────────────────
  const content = document.getElementById('modal-tab-content');
  // Rapid click mid-animation — bail to immediate update
  if (content.classList.contains('tab-exit') || content.classList.contains('tab-enter')) {
    content.classList.remove('tab-exit', 'tab-enter');
    _updateModalContent(idx);
    _animateBoxToAutoHeight(box, pinnedH);
    return;
  }
  content.dataset.dir = dir;
  content.classList.add('tab-exit');
  content.addEventListener('animationend', () => {
    content.classList.remove('tab-exit');
    _updateModalContent(idx);
    _animateBoxToAutoHeight(box, pinnedH);
    void content.offsetWidth;
    content.classList.add('tab-enter');
    content.addEventListener('animationend', () => content.classList.remove('tab-enter'), { once: true });
  }, { once: true });
}

const _W_TRANSITION = 'width 0.35s cubic-bezier(0.16,1,0.3,1), max-width 0.35s cubic-bezier(0.16,1,0.3,1)';

function _animateBoxToAutoHeight(box, fromH) {
  // Measure the new natural height
  box.style.height = 'auto';
  const toH = box.offsetHeight;
  if (toH === fromH) { box.style.height = ''; box.style.transition = _W_TRANSITION; return; }
  // Snap back to old height, then transition to new — keep width transition alive
  box.style.height = fromH + 'px';
  void box.offsetWidth;
  box.style.transition = `height 0.44s cubic-bezier(0.165, 0.84, 0.44, 1), ${_W_TRANSITION}`;
  box.style.height = toH + 'px';
  box.addEventListener('transitionend', function h(e) {
    if (e.propertyName !== 'height') return;
    box.removeEventListener('transitionend', h);
    box.style.height = '';
    box.style.transition = _W_TRANSITION;
  });
}

function closeModal() {
  const modal = document.getElementById('risk-modal');
  if (!modal.classList.contains('open')) return;
  modal.classList.add('closing');
  // Overlay carries the 0.20s closing animation — listen there for animationend
  document.getElementById('risk-modal-overlay').addEventListener('animationend', () => {
    modal.classList.remove('open', 'closing');

}

    if (_fcmOpen) { closeFilterChipMenu(); return; }
    if (_spotlightOwner) { clearSpotlight(); return; }
    // Close all open modals and search at once
    closeTaskDetail();
    closePersonModal();

  if (!document.getElementById('risk-modal').classList.contains('open')) return;
  const tabs = document.querySelectorAll('.modal-tab');
  if (!tabs.length) return;
  const cur = [...tabs].findIndex(t => t.classList.contains('active'));
  if (e.key === 'ArrowRight') switchModalTab((cur + 1) % _modalRisks.length);
  if (e.key === 'ArrowLeft')  switchModalTab((cur - 1 + _modalRisks.length) % _modalRisks.length);
});

// ── Data-range Zoom / Pan ────────────────────────────────────────────────────
// The plot square stays fixed in size. Zoom changes VR (the visible data range).
// svgX/svgY automatically map the new range into the same plot pixels.
// Re-rendering updates axis ticks, dots, and labels.
const hm = document.getElementById('hm');

// Pin zoom pill directly below "Likelihood" label in SVG space
function positionCtrl() {
  const r = hm.getBoundingClientRect();
  if (!r.width || !r.height) return;
  const scale   = Math.min(r.width / 1300, r.height / 780);
  const offsetX = (r.width  - 1300 * scale) / 2;
  const offsetY = (r.height - 780  * scale) / 2;
  const ctrl = document.getElementById('zoom-ctrl');
  const pillLeft = r.left + offsetX + 430 * scale;
  const pillTop  = Math.min(r.top + offsetY + 734 * scale + 10, window.innerHeight - 50);
  ctrl.style.left      = pillLeft + 'px';
  ctrl.style.top       = pillTop + 'px';
  ctrl.style.bottom    = 'auto';
  ctrl.style.transform = 'translateX(-50%)';
  // Position chips centred on the same axis as the zoom pill, stacking upward
  const chips = document.getElementById('active-chips');
  chips.style.left      = pillLeft + 'px';
  chips.style.transform = 'translateX(-50%)';
  chips.style.top       = 'auto';
  chips.style.bottom    = (window.innerHeight - pillTop + 10) + 'px';
}

function updateResetBtn() {
  const atDefault = Math.abs(VR.xMin) < 0.001 && Math.abs(VR.xMax - 5) < 0.001 &&
                    Math.abs(VR.yMin) < 0.001 && Math.abs(VR.yMax - 5) < 0.001;
  document.getElementById('zoom-reset').classList.toggle('reset-active', !atDefault);
}

function rerender() {
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  hideTip();
  updateResetBtn();
  _dimCount = 0;
  document.getElementById('legend-layer').classList.remove('legend-dimmed');
  // Briefly suppress hover-dim so mouseenter on newly-created dot elements
  // can't immediately re-dim the legend before the cursor has settled
  _suppressHoverDim = true;
  setTimeout(() => { _suppressHoverDim = false; }, 180);
  ['static-layer','risks-layer'].forEach(id => {
    const el = document.getElementById(id);
    while (el.firstChild) el.removeChild(el.firstChild);
  });
  renderStatic();
  renderRisks();
  positionCtrl();
  _reapplyLegendHighlights();
  _reapplySpotlight();
}

// Labels fade out at zoom start; 50ms debounce before fade-in so rapid scroll
// events don't flicker them in and out between each 180ms animation.
let _zoomFadeIn = null;
const _zoomRL = () => document.getElementById('risks-layer');

function doZoom(factor, pivDX, pivDY, dur = 300) {
  const cx = (pivDX != null) ? pivDX : (VR.xMin + VR.xMax) / 2;
  const cy = (pivDY != null) ? pivDY : (VR.yMin + VR.yMax) / 2;
  const nxMin = cx - (cx - VR.xMin) / factor;
  const nxMax = cx + (VR.xMax - cx) / factor;
  const nyMin = cy - (cy - VR.yMin) / factor;
  const nyMax = cy + (VR.yMax - cy) / factor;
  if (nxMax - nxMin > 5.001 || nyMax - nyMin > 5.001) return;

  let tXMin = nxMin, tXMax = nxMax, tYMin = nyMin, tYMax = nyMax;
  const _xrz = tXMax - tXMin, _yrz = tYMax - tYMin;
  if (tXMin < 0) { tXMin = 0; tXMax = _xrz; }
  if (tXMax > 5) { tXMax = 5; tXMin = 5 - _xrz; }
  if (tYMin < 0) { tYMin = 0; tYMax = _yrz; }
  if (tYMax > 5) { tYMax = 5; tYMin = 5 - _yrz; }

  _zoomRL().classList.add('zooming');  // labels start fading out (CSS transition)
  clearTimeout(_zoomFadeIn);           // cancel any pending fade-in
  const aXMin = VR.xMin, aXMax = VR.xMax, aYMin = VR.yMin, aYMax = VR.yMax;
  const t0 = performance.now();
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    VR.xMin = aXMin + (tXMin - aXMin) * e;  VR.xMax = aXMax + (tXMax - aXMax) * e;
    VR.yMin = aYMin + (tYMin - aYMin) * e;  VR.yMax = aYMax + (tYMax - aYMax) * e;
    _fastRerender();
    if (p < 1) { _panAnim = requestAnimationFrame(step); }
    else {
      VR.xMin=tXMin; VR.xMax=tXMax; VR.yMin=tYMin; VR.yMax=tYMax;
      rerender();  // places labels at correct positions (still opacity:0)
      _panAnim = null;
      _zoomFadeIn = setTimeout(() => _zoomRL().classList.remove('zooming'), 50);
    }
  }
  _panAnim = requestAnimationFrame(step);
}

function resetView() {
  _zoomRL().classList.add('zooming');
  clearTimeout(_zoomFadeIn);
  const aXMin=VR.xMin, aXMax=VR.xMax, aYMin=VR.yMin, aYMax=VR.yMax;
  const tXMin=0, tXMax=5, tYMin=0, tYMax=5;
  const dur = 420; const t0 = performance.now();
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    VR.xMin = aXMin+(tXMin-aXMin)*e; VR.xMax = aXMax+(tXMax-aXMax)*e;
    VR.yMin = aYMin+(tYMin-aYMin)*e; VR.yMax = aYMax+(tYMax-aYMax)*e;
    _fastRerender();
    if (p < 1) { _panAnim = requestAnimationFrame(step); }
    else {
      VR={xMin:0,xMax:5,yMin:0,yMax:5}; rerender(); _panAnim=null;
      _zoomFadeIn = setTimeout(() => _zoomRL().classList.remove('zooming'), 50);
    }
  }
  _panAnim = requestAnimationFrame(step);
}

function screenToData(clientX, clientY) {
  const r = hm.getBoundingClientRect();
  const sx = (clientX - r.left) / r.width  * 1300;
  const sy = (clientY - r.top)  / r.height * 780;
  return { x: dataX(sx), y: dataY(sy) };
}

// Scroll wheel zoom: rAF accumulation batches rapid events into one doZoom() per frame.
// doZoom() runs the same 180ms animated zoom as button clicks, using _renderVR as origin.
let _wheelAcc = 1, _wheelPivX = null, _wheelPivY = null, _wheelRafId = null;
hm.addEventListener('wheel', e => {
  e.preventDefault();
  const r = hm.getBoundingClientRect();
  const sx = (e.clientX - r.left) / r.width * 1300;
  if (sx < P.x || sx > P.x + P.w) return;
  const pt = screenToData(e.clientX, e.clientY);
  _wheelAcc *= e.deltaY < 0 ? 1.25 : 0.8;
  _wheelAcc  = Math.max(0.5, Math.min(2.0, _wheelAcc));
  _wheelPivX = pt.x;
  _wheelPivY = pt.y;
  if (!_wheelRafId) {
    _wheelRafId = requestAnimationFrame(() => {
      doZoom(_wheelAcc, _wheelPivX, _wheelPivY, 180);
      _wheelAcc = 1;
      _wheelRafId = null;
    });
  }
}, { passive: false });

// Pan: update VR on mousemove but throttle rerender to ~20fps so the data
// inside the chart square updates smoothly without flickering label recalc.
let panState    = null;
let panThrottle = null;

hm.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const r = hm.getBoundingClientRect();
  const sx = (e.clientX - r.left) / r.width * 1300;
  if (sx < P.x || sx > P.x + P.w) return;
  panState = { clientX: e.clientX, clientY: e.clientY, vr: {...VR}, moved: false };
  hm.classList.add('panning');
  e.preventDefault();
});

const risksLayer = document.getElementById('risks-layer');

window.addEventListener('mousemove', e => {
  if (!panState) return;
  const r = hm.getBoundingClientRect();
  // Data-space delta
  const dDataX = -(e.clientX - panState.clientX) / r.width  * (panState.vr.xMax - panState.vr.xMin);
  const dDataY =  (e.clientY - panState.clientY) / r.height * (panState.vr.yMax - panState.vr.yMin);
  // Update VR then clamp to default 0–5 bounds
  VR.xMin = panState.vr.xMin + dDataX;
  VR.xMax = panState.vr.xMax + dDataX;
  VR.yMin = panState.vr.yMin + dDataY;
  VR.yMax = panState.vr.yMax + dDataY;
  const _xr = VR.xMax - VR.xMin, _yr = VR.yMax - VR.yMin;
  if (VR.xMin < 0) { VR.xMin = 0; VR.xMax = _xr; }
  if (VR.xMax > 5) { VR.xMax = 5; VR.xMin = 5 - _xr; }
  if (VR.yMin < 0) { VR.yMin = 0; VR.yMax = _yr; }
  if (VR.yMax > 5) { VR.yMax = 5; VR.yMin = 5 - _yr; }
  panState.moved = true;

  // SVG-pixel offset using clamped VR (not raw delta)
  const dxSVG = -(VR.xMin - panState.vr.xMin) / (panState.vr.xMax - panState.vr.xMin) * P.w;
  const dySVG =  (VR.yMin - panState.vr.yMin) / (panState.vr.yMax - panState.vr.yMin) * P.h;

  if (!panThrottle) {
    panThrottle = requestAnimationFrame(() => {
      // Static layer re-renders (fast: gradient + grid + axis ticks update to new VR)
      const sl = document.getElementById('static-layer');
      while (sl.firstChild) sl.removeChild(sl.firstChild);
      renderStatic();
      // Risks layer just gets a translate — zero label recalculation, zero flicker
      risksLayer.setAttribute('transform',
        'translate('+dxSVG.toFixed(2)+','+dySVG.toFixed(2)+')');
      panThrottle = null;
    });
  }
});

window.addEventListener('mouseup', () => {
  if (!panState) return;
  if (panThrottle) { cancelAnimationFrame(panThrottle); panThrottle = null; }
  risksLayer.setAttribute('transform', '');  // clear visual offset
  const wasDrag = panState.moved;
  panState = null;
  hm.classList.remove('panning');
  // Only rerender if user actually dragged — a plain click must NOT destroy
  // dot elements before the click event fires on the dot group.
  if (wasDrag) rerender();
});

// ── Page-load entrance animation ─────────────────────────────────────────────
function runEntranceAnimation() {
  const GRAPH_OFFSET = 220;   // SVG units — shifts graph to center initially
  const PAUSE_MS     = 1000;  // hold centered state before animation begins
  const P1_DUR       = 950;   // graph slides to final position
  const P2_DELAY     = 550;   // list starts expanding (graph is ~97% home)
  const P2_DUR       = 580;   // list card reveals
  const P3_DELAY     = 1080;  // rows start after list bounce settles (must be < P2_DELAY+P2_DUR)
  const STAGGER_DUR  = 980;   // total spread for all rows
  const ITEM_DUR     = 400;   // each row / dot animation

  const easeGraph   = t => 1 - (1 - t) ** 4;  // quartic: fast start, long settle
  // easeOutBack: overshoots to ~1.10x then settles — gives the overstretch bounce
  const c1 = 1.70158, c3 = c1 + 1;
  const easeList    = t => 1 + c3 * (t - 1) ** 3 + c1 * (t - 1) ** 2;

  const chartInner  = document.getElementById('chart-inner');
  const legendLayer = document.getElementById('legend-layer');
  const zoomCtrl    = document.getElementById('zoom-ctrl');
  const headerBar   = document.getElementById('risk-header-bar');

  // SVG attribute transform: translate-scale-translate anchors scale to x=730 (graph right edge)
  // This is immune to CSS-pixel vs SVG-unit mismatch that causes left-edge drift with CSS scaleX
  const SCALE_ORIGIN = P.x + P.w;  // = 730
  legendLayer.setAttribute('transform',
    `translate(${SCALE_ORIGIN} 0) scale(0 1) translate(${-SCALE_ORIGIN} 0)`);

  zoomCtrl.style.opacity  = '0';
  headerBar.style.opacity = '0';

  const sortedIds = [...RISKS]
    .sort((a, b) => parseInt(a.id.replace(/\D/g,'')) - parseInt(b.id.replace(/\D/g,'')))
    .map(r => r.id);
  const STAGGER_PER = STAGGER_DUR / sortedIds.length;

  // ── Set initial visual state NOW (before the 1s pause) ───────────────────
  const revealedRiskGroups = new Set();
  sortedIds.forEach(id => {
    const row = legendRowByRiskId[id];
    if (row) {
      row.style.opacity        = '0';
      row.style.transform      = 'translateX(-20px)';
      row.style.transformBox   = 'view-box';
      row.style.transformOrigin = '50% 50%';
    }
    const dotG = dotGroupByRiskId[id];
    if (dotG) {
      const rg = dotG.parentElement;
      if (rg && !revealedRiskGroups.has(rg)) { rg.style.opacity = '0'; revealedRiskGroups.add(rg); }
      const sw = dotG.querySelector('.dot-scale-wrapper');
      if (sw) { sw.style.transform = 'scale(0)'; sw.style.transition = 'none'; }
    }
  });
  revealedRiskGroups.clear();

  // Graph centered from the very first frame — user sees this for PAUSE_MS
  chartInner.setAttribute('transform', `translate(${GRAPH_OFFSET},0)`);

  // ── Start ticker after 1-second pause ────────────────────────────────────
  setTimeout(() => {
    const t0 = performance.now();
    let phase2CornerSwitched = false;
    let phase3Fired          = false;

    function tick(now) {
      const elapsed = now - t0;

      // Phase 1: graph slides to final position
      const p1 = Math.min(1, elapsed / P1_DUR);
      const gx = GRAPH_OFFSET * (1 - easeGraph(p1));
      if (p1 < 1) chartInner.setAttribute('transform', `translate(${gx.toFixed(2)},0)`);
      else        chartInner.removeAttribute('transform');

      // Switch to open-path border just as list starts appearing
      if (!phase2CornerSwitched && elapsed >= P2_DELAY) {
        phase2CornerSwitched = true;
        _graphAllRounded = false;
        const sl = document.getElementById('static-layer');
        while (sl.firstChild) sl.removeChild(sl.firstChild);
        renderStatic();
      }

      // Phase 2: SVG transform scale anchored to x=730 — easeOutBack gives overstretch bounce
      const p2raw = (elapsed - P2_DELAY) / P2_DUR;
      const p2    = Math.max(0, Math.min(1, p2raw));
      const sx    = Math.max(0, easeList(p2)).toFixed(4);
      legendLayer.setAttribute('transform',
        `translate(${SCALE_ORIGIN} 0) scale(${sx} 1) translate(${-SCALE_ORIGIN} 0)`);

      if (p2 > 0.4) {
        headerBar.style.transition = 'opacity 0.35s ease';
        headerBar.style.opacity    = '1';
        zoomCtrl.style.transition  = 'opacity 0.35s ease';
        zoomCtrl.style.opacity     = '1';
      }

      // Phase 3: stagger rows and dots
      if (!phase3Fired && elapsed >= P3_DELAY) {
        phase3Fired = true;
        sortedIds.forEach((id, idx) => {
          setTimeout(() => {
            const row = legendRowByRiskId[id];
            if (row) {
              row.style.transition = `opacity ${ITEM_DUR}ms cubic-bezier(0.16,1,0.3,1), transform ${ITEM_DUR}ms cubic-bezier(0.16,1,0.3,1)`;
              row.style.opacity    = '1';
              row.style.transform  = 'translateX(0px)';
              setTimeout(() => {
                // Clear ALL inline styles — leftover values override CSS hover/dim rules
                row.style.opacity = ''; row.style.transform = ''; row.style.transformBox = '';
                row.style.transformOrigin = ''; row.style.transition = '';
              }, ITEM_DUR + 60);
            }
            const dotG = dotGroupByRiskId[id];
            if (dotG) {
              const rg = dotG.parentElement;
              if (rg && !revealedRiskGroups.has(rg)) {
                revealedRiskGroups.add(rg);
                rg.style.transition = `opacity ${Math.round(ITEM_DUR * 0.55)}ms ease`;
                rg.style.opacity    = '1';
                setTimeout(() => { rg.style.opacity = ''; rg.style.transition = ''; }, ITEM_DUR + 60);
              }
              const sw = dotG.querySelector('.dot-scale-wrapper');
              if (sw) {
                sw.style.transition = 'none';
                sw.style.transform  = 'scale(0)';
                requestAnimationFrame(() => {
                  sw.style.transition = `transform ${ITEM_DUR}ms cubic-bezier(0.34,1.56,0.64,1)`;
                  sw.style.transform  = 'scale(1)';
                  // Clear inline styles after bounce so CSS hover rules take over
                  setTimeout(() => {
                    sw.style.transform = '';
                    sw.style.transition = '';
                  }, ITEM_DUR + 60);
                });
              }
            }
          }, idx * STAGGER_PER);
        });
      }

      // Keep ticking until p1 done, p2 done, AND phase3 has fired
      if (p1 < 1 || (p2raw > 0 && p2 < 1) || !phase3Fired) {
        requestAnimationFrame(tick);
      } else {
        setTimeout(() => legendLayer.removeAttribute('transform'), STAGGER_DUR + ITEM_DUR + 100);
      }
    }

    requestAnimationFrame(tick);
  }, PAUSE_MS);
}

// Renders run LAST — after all event listeners are registered so a render
// error can never prevent zoom/pan/labels from working
try { renderStatic(); renderRisks(); renderLegend(); } catch(e) { console.error('render error', e); }
