n_strategy": "", "mitigation_type": "", "progress": 0, "responsible": "", "severity": 3.0, "start_date": "", "status": "", "target_date": "", "task": "Increased Litigation \u0026 Regulatiory Fines", "task_status": "Not Started/Planning", "trend": "\u23f8", "trend_analysis": ""}], "R03": [{"definition": "Our success in Germany creates a risk of exposure to competitive and market forces in a single country.  This is mitigated by continued focus on our competitive positioning in Germany, while also continuing to invest in expansion of Electronics in markets outside of Germany, and growth (revneue and profit) in other geographies and businesses in the International portfolio", "gov_compliance": "", "likelihood": 3.5, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, Nate Spitz, Paul Bilyeu", "mitigation_strategy": "", "mitigation_type": "", "progress": 75, "responsible": "", "severity": 4.0, "start_date": "", "status": "", "target_date": "", "task": "International: Concentration of revenue and profit in Germany", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": ""}, {"definition": "For Allegion Home, the market risk (NC, AM) is very similar to channel distribution \"concentration\" risk. Revenue for home concentrated in America, with 70% coming from consumer channels.", "gov_compliance": "", "likelihood": 4.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, Nate Spitz, Paul Bilyeu", "mitigation_strategy": "Allegion Home looking to expand reach into Canada (res pro,  Mexico (online), luxury segment (showrooms, designers, architects), OEM and direct to consumer. All are focus areas to gain share and diversify current verticla and geography mix.", "mitigation_type": "", "progress": 75, "responsible": "Perozzi", "severity": 4.0, "start_date": "", "status": "Just Starting", "target_date": "Ongoing", "task": "Americas: Concentration of business by vertical and geography.", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "No significant changes for Allegion Home concentration in US or AM/NC."}, {"definition": "A large portion of the business is within the national account/retail space.  We are vulnerable to overall economic pressure in this vertical.  Secondly the business is concentrated in the US and Canada primarily", "gov_compliance": "", "likelihood": 1.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, Nate Spitz, Paul Bilyeu", "mitigation_strategy": "Diversification of channels and geography to minimize impact of national accounts and retail on the overall business.  Working on building out capabilities for expansion into Transit, Government and Healthcare vertcials.  Additionally building a plan to expand to into LATAM through our new distribution strategy outlined in \"channel distribution\"", "mitigation_type": "", "progress": 75, "responsible": "Krich", "severity": 1.0, "start_date": "", "status": "Active on building out transit and healthcare capbilities.  All other actions not started.", "target_date": "12/31/26 (ongoing into future years)", "task": "Americas: (Access Technologies) Concentration of business by vertical and geography.", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "National account work is approximately 35% of our install business and slightly less than half of our service business."}, {"definition": "\u003e$2B of business concentrated in Commercial Americas.  NC vs AM 50/50%.  Vertical mix is still heavy institutional, but diversified. Category Mix (Exits/DC \u003e $1B.  Locks \u003e $600M).", "gov_compliance": "", "likelihood": 3.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, Nate Spitz, Paul Bilyeu", "mitigation_strategy": "Continue to drive discretionary AM growth and lesson reliance on NC.  Diversify vertical mix by following opportunity (Data Center example).  Grow software/electronics share vs mechanical via partnerships (PAC\u0027s) and investments in software and electronics (YP, Zentra, Mobile Cred, XE360, etc)", "mitigation_type": "", "progress": 75, "responsible": "Bilyeu/Spitz", "severity": 2.0, "start_date": "", "status": "Scaling in 2026", "target_date": "Ongoing", "task": "Americas: (Commercial - COS \u0026 L\u0026A) Concentration of business by vertical and geography.", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "Software/Electronics growing share vs mechanical.  Acquisitions continue to diversify.  Data Centers rising in share."}], "R04": [{"definition": "Amazon is second customer in Allegion Home.  New brands are constantly showing up in online marketplaces targetting our share position. \nLikelihood is low, but an import brand could, like TFH, could attemp to start selling the builder channel through their existing warehouse. \nCould door manufacturers integrate locking mechanisms into doors (i.e. magnets on interior doors)", "gov_compliance": "", "likelihood": 1.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, Nate Spitz, Paul Bilyeu", "mitigation_strategy": "", "mitigation_type": "", "progress": 50, "responsible": "", "severity": 2.0, "start_date": "", "status": "", "target_date": "", "task": "Americas (Allegion Home) -1.)  Low Barrier to Entry for Online Channels. 2.) Potential for an import brand to start selling direct to the builder channel. 3.) Changes in door preps that eliminate need for door locks (i.e. magnets)", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "The flood of import brands is already in progress.We haven\u0027t seen players like TFH try to enter the builder market, but new leadership team is hungry to grow. Hardware assembly in construction process is not efficient. If there were a more efficient, economical path, builders may consider. Door mfgs are already including multipoint locking systems in their exterir doors."}, {"definition": "Competition attempts to flip our distribution channel from selling our product to theirs which could pull national account work with it.", "gov_compliance": "", "likelihood": 1.5, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, Nate Spitz, Paul Bilyeu", "mitigation_strategy": "", "mitigation_type": "", "progress": 75, "responsible": "", "severity": 1.0, "start_date": "", "status": "", "target_date": "", "task": "Americas (Access Technolgies): Competitors target our distribution channel", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "OEM manufacturers have not attempted any such activity to date, but we continue to monitor."}, {"definition": "Software providers, like Verkada (Video + Access Control), or Mega Techs utilize technology to reduce barriers to entry and de-value hardware.", "gov_compliance": "", "likelihood": 3.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, Nate Spitz, Paul Bilyeu", "mitigation_strategy": "", "mitigation_type": "", "progress": 75, "responsible": "", "severity": 2.5, "start_date": "", "status": "", "target_date": "", "task": "Americas (Commercial - COS \u0026 L\u0026A): Software \u0026 technology rate of change causes disruption.", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "Verkada introducing their own e-locks, Aliro standard harmonizing mobile access."}, {"definition": "Definition TBD", "gov_compliance": "", "likelihood": 1.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, Nate Spitz, Paul Bilyeu", "mitigation_strategy": "", "mitigation_type": "", "progress": 75, "responsible": "", "severity": 1.0, "start_date": "", "status": "", "target_date": "", "task": "International (Germany)", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": ""}], "R05": [{"definition": "Critical DD functions such as financial, tax, and legal receive insufficient or poor diligence documentation or are rushed during the due diligence process, increasing the likelihood of undiscovered liabilities, integration challenges, and errors in valuation", "gov_compliance": "", "likelihood": 5.0, "managers": "Joe Juarez", "mitigation_strategy": "M\u0026A toolkit (DD lists, Final Report, models) updated annually to reflect new learnings from previous acquistions.", "mitigation_type": "", "progress": 75, "responsible": "Joe Juarez", "severity": 3.0, "start_date": "", "status": "On track", "target_date": "In place", "task": "Inadequate due diligence scope", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "As the M\u0026A and DD team gets more experience throughout each deal, and the M\u0026A\u0027s teams \"bench\" of advisors becomes more robust, the probabality of an insufficient DD scope gets lower and lower."}, {"definition": "Integration strategy is not well-defined before the transaction closes, which can lead to business disruption post-close.", "gov_compliance": "", "likelihood": 5.0, "managers": "Joe Juarez", "mitigation_strategy": "Continued development of current personnel through training and experience.", "mitigation_type": "", "progress": 50, "responsible": "Joe Juarez", "severity": 5.0, "start_date": "", "status": "On track", "target_date": "Ongoing", "task": "Inadequate integration planning", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "Key Risk Indicator is naturally offset by the new hire of the VP of Integration; however, there have been some misses from recently closed transactions that have higlighted the need for a more robust integration plan being established before DD starts, which we are actively addressing."}, {"definition": "Management and essential employees of the target show signs of disengagement or intent to leave after the transaction, jeopardizing knowledge transfer and smooth integration.", "gov_compliance": "", "likelihood": 2.0, "managers": "Joe Juarez", "mitigation_strategy": "Post Close Acquistions Reviews occur on a six month cadence during ELT MOR/QBR meetings, providing earlier visbility to deviations to business case or integration goals", "mitigation_type": "", "progress": 75, "responsible": "Joe Juarez", "severity": 2.0, "start_date": "", "status": "On track", "target_date": "Ongoing", "task": "Key talent flight risk", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "The M\u0026A team, HR, the General Manager, and the Integration team have an existing playbook to retain and integrate key talent."}, {"definition": "Building unrealistic business cases, which can lead to unhealthy stretch goals that misalign incentives with the local team and potentially cause business disruption.", "gov_compliance": "", "likelihood": 1.0, "managers": "Joe Juarez", "mitigation_strategy": "Appropriately evaluate integration risks prior to acquisition, perform more work/coordination prior to transaction closing.", "mitigation_type": "", "progress": 75, "responsible": "PMO Office", "severity": 4.0, "start_date": "", "status": "On track", "target_date": "Ongoing", "task": "Overrestimation of synergies", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "Multiple \"gates\" established between the M\u0026A team, the business, and Finance to make sure the business case, and the synergies within, are realistic."}], "R06": [{"definition": "Quality impacts would be felt through an increase in product litigation and/or increase in warranty claims.", "gov_compliance": "", "likelihood": 1.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, John Ward, Nate Spitz, Paul Bilyeu, Serge Zappone", "mitigation_strategy": "Project teams internally stood up to look at quality issues seen by the field technicians as well as operations.  Teams problem solving issues as an ongoing basis.  Additionally, engineering is performing sampling of product to be tested per industry standards for compliance.Ongoing reliability testing, NPD testing standards.", "mitigation_type": "", "progress": 50, "responsible": "Krich, Perozzi", "severity": 1.0, "start_date": "", "status": "", "target_date": "12 in travel locations and can generate ad hoc reports identifying travelers in those areas.", "mitigation_type": "", "progress": 75, "responsible": "Carl Veld", "severity": 1.0, "start_date": "", "status": "In Progress", "target_date": "On Going", "task": "Travel  Security", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": ""}], "R11": [{"definition": "There would be signals if a significant customer (like THD or AMZ) would pull our lines. There would need to be a good reason regarding poor sales, quality, etc. We would see through POS, cuts in product line reviews (PLRs), feedback from from merchants or Top 2 Top conversations.", "gov_compliance": "", "likelihood": 1.0, "managers": "Brent Rosen, Mark Vigren, Scott McNamara", "mitigation_strategy": "Allegion Home - Daily conversations with merchants, montioring POS performance, reviewing quality data, participating in PLRs and Top 2 Top Conversations.", "mitigation_type": "", "progress": 75, "responsible": "McNamara", "severity": 5.0, "start_date": "", "status": "Green", "target_date": "Ongoing", "task": "Allegion Home - Sales performance, Line Reviews, Merchant \u0026 Top to Top Conversations", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "We haven\u0027t seen big moves like this in the hardware category. We\u0027ve seen the expansion of private label brands during product line reviews, but we continually monitor the performance of our items. We have  heard about Fortune losing $140M worth of business with Moen and Fibercon at THD, but don\u0027t know the details of why that occurred."}, {"definition": "Major customers such as WalMart and Home Depot have regular, typically quarterly, business reviews where any slip in performance would be discussed and addressed prior to significant lost sales.", "gov_compliance": "", "likelihood": 2.0, "managers": "Brent Rosen, Mark Vigren, Scott McNamara", "mitigation_strategy": "Americas: (Access Technologies) Continue diversification in the distribuition channel to lock in other major national auto door service providerswith our products when they bid into national account work.  As well as diversify our customer base either in our core verticals or other arenas such as transit, clean room, etc.", "mitigation_type": "", "progress": 75, "responsible": "Rosen/Trcka", "severity": 2.0, "start_date": "", "status": "Green", "target_date": "Ongoing", "task": "Americas: (Access Technologies) sales perfromance, customer SLAs and general business reviews", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "Customer SLAs have been improving and we monitor weekly internally.  Sales with major customers have actually increased with our dual distribution model.  WalMart in particular is increasing their 2026 CapEx plans with our doors, with exact numbers to be given to us by end of Q1."}], "R12": [{"definition": "Interpretation of essential characteristics, requiring USMCA sourcing Essential characteristics components to preserve non-tariff status and to avoid potential fines.   Clear, stringent interpretation must be consistently applied for both production sites/regions.", "gov_compliance": "", "likelihood": 4.0, "managers": "Rick Zajchowski", "mitigation_strategy": "Trade Compliance - projects underway to near-shore supply, and exit China for USMCA destined product, nearshoring opportunities being pursued.  Tracking yearly reduction in China spend, multi-year program.", "mitigation_type": "", "progress": 50, "responsible": "GSM Management\nPMO", "severity": 2.0, "start_date": "", "status": "On-track", "target_date": "On-going", "task": "Increased trade Compliance requirements and thresholds.  Evolving and more stringent Country Of Origin (COO) requirements put Allegion at risk due to essential characteristics definitions and impact on maintaing tariff free USMCA designation on products.", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "Essential characteristic ssues and risks.    Sourcing Council - quarterly review to assure suppliers that are presenting risk, and that do not fit into other programs, are highlighted and managed. Coupa implementation will provide better supplier tracking and metrics.  Supplier on-boarding process lowers risk, and is now globally available.", "mitigation_type": "", "progress": 50, "responsible": "GSM Management\nSupplier Quality", "severity": 3.5, "start_date": "", "status": "On-track", "target_date": "On-going", "task": "M\u0026A Risk - supply base impact.", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "Improved integration discipline, processes and timelines.  GSM is becoming more engaged in the post close supply base integration.  This will vary on an acquisition by acquisition basis.  Tools and processes are now available to share and to leverage across new businesses."}, {"definition": "Disruption of second and third tier suppliers could prevent availability of components and assemblies for Allegion\u0027s prime suppliers.  Lack of supply could impact our production, delivery and reputational risk.", "gov_compliance": "", "likelihood": 2.0, "managers": "Rick Zajchowski", "mitigation_strategy": "Project Pivot: cross-functional, Americas-wide program to risk mitigate China supply.  Movement form China to other  appropriate regions.", "mitigation_type": "", "progress": 50, "responsible": "GSM Management\nPMO", "severity": 2.0, "start_date": "", "status": "On-track", "target_date": "On-going", "task": "Lack of visibility into the Tier 2/Tier 3 supply chain", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "Improved tracking and increased visibility into our second tier suppliers now available.  Third tier suppler visibility now being developed and expanded."}, {"definition": "Definition TBD", "gov_compliance": "", "likelihood": 3.0, "managers": "Rick Zajchowski", "mitigation_strategy": "Standardization globally of key tools: MSAs, OSA (On Site Asses  "mitigation_type": "", "progress": 0, "responsible": "M. Schulenburg", "severity": 1.5, "start_date": "", "status": "In Progress", "target_date": "Q4 2026", "task": "Key Risk Indicator RBD", "task_status": "Not Started/Planning", "trend": "\u23f8", "trend_analysis": ""}], "R15": [{"definition": "Integration of newly acquired company puts Allegion at risk until we can get these companies to Allegion corporate security standards.", "gov_compliance": "", "likelihood": 1.0, "managers": "Justin Scheitlin", "mitigation_strategy": "Ransomware Resiliency - Increase Allegion\u0027s ability to recover from a Ransomware attack that\u0027s impacting production operations. In 2026, working at Allegion\u0027s top 5 manufacturing sites to clearly document the DRP and understand what the return to operations timing needs to be. Investments in additional ransomware recovery tools may be necessary. This will include network segmentation at all top 20 manufacturing sites both from a WAN perspective but also separating OT and IT networks. In addition, finalizing Allegion\u0027s Local Admin Control implementation of ABR at Interflex.", "mitigation_type": "", "progress": 50, "responsible": "R.Joyce\nA. Erdos\nC.Dodson", "severity": 4.0, "start_date": "", "status": "", "target_date": "", "task": "M\u0026A", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "The most recently acquired companies the team has been able to get Crowdstrike installed early in the integration process giving the team visibility and protection on these newly acquired assets. Team has created an M\u0026A cybersecurity dashboard to track open risks and communicate easily with leadership teams."}, {"definition": "Allegion assets are ransomed due to the installation of malware on corporate assets leading to disruption in operations or compromised data.", "gov_compliance": "", "likelihood": 4.0, "managers": "Justin Scheitlin", "mitigation_strategy": "Cyber Standards - Developed cybersecurity standards for acquisitions to rapidly deploy cybersecurity tools and define a low water mark for acquisitions that must be met in order to patch and support the business properly. M\u0026A dashboard has been developed to review with executive leadership.", "mitigation_type": "", "progress": 75, "responsible": "R.Joyce\nA. Erdos", "severity": 1.0, "start_date": "", "status": "", "target_date": "", "task": "Ransomware", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "Investments have been made over the last years in Proofpoint for account takeover to automatically revoke access if an account appears to be compromised. The installation of Crowdstrike and addition of Overwatch is a managed service used to take action on Allegion\u0027s behalf 24/7"}, {"definition": "Allegion continually has exposure to 3rd parties through direct or indirect connections, software purchase, code sharing, or access to Allegion assets.", "gov_compliance": "", "likelihood": 1.0, "managers": "Justin Scheitlin", "mitigation_strategy": "Modernize Identity and Access Management - The implmentation of Okta gives Allegion the ability to automate both onboarding and offboarding access. It will also allow more options for frontline workers and employees to improve the authentication and access experience. Additionally, Allegion will be exploring options for secure remote access for vendors needing access to Allegion assets inside the network. The goal is to better control, monitor, and audit this 3rd party access.", "mitigation_type": "", "progress": 50, "responsible": "J.Pyle\nC.Dodson", "severity": 1.0, "start_date": "", "status": "", "target_date": "", "task": "3rd Party Risk", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "3rd party risk management and the software assessment process have helped to understand Allegion\u0027s overall 3rd party risk."}, {"definition": "Definition TBD", "gov_compliance": "", "likelihood": 2.0, "managers": "Justin Scheitlin", "mitigation_strategy": "Third Party Risk Management - Continue to conduct solution assessments on 3rd parties that Allegion does business with. This includes understanding their relationship with Allegion. Are they connected to the network, do they house sensitive data, or do they hold Allegion IP information.", "mitigation_type": "", "progress": 0, "responsible": "R. Joyce", "severity": 2.0, "start_date": "", "status": "", "target_date": "", "task": "Key Risk Indicator TBD", "task_status": "Not Started/Planning", "trend": "\u23f8", "trend_analysis": ""}], "R16": [{"definition": "Higher than normal turnover of incumbents, or retirements in a concentrated time frame creates imminent succession pressure and strain on succession plans.", "gov_compliance": "", "likelihood": 1.0, "managers": "Christina Chapman", "mitigation_strategy": "Retention Risk Assessment conducted on an annual basis as part of the Talent Review Process.  Stay interviews are encouraged with incumbents and successor candidates to identify any potential attrition risk or pending retirement plans.", "mitigation_type": "", "progress": 75, "responsible": "Managers/HR", "severity": 2.5, "start_date": "", "status": "On track", "target_date": "Q2 Annually", "task": "Retirement or attrition concentration among incumbents", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": ""}, {"definition": "If development plans are not actioned, then development gaps will persist and mean that identified successors will not be ready when needed.", "gov_compliance": "", "likelihood": 3.0, "managers": "Christina Chapman", "mitigation_strategy": "Task launched to all salaried  employees to create their IDP (Individual Development Plan) in Workday.  IDP\u0027s are required for all Successor candidates.  For ELT Successor candidates, Development Focus areas are highlighted and discussed with the BOD.  Leaders are encouraged to follow up on IDP progress in scheduled 1:1 conversations.", "mitigation_type": "", "progress": 50, "responsible": "Managers/HR", "severity": 3.0, "start_date": "", "status": "On track", "target_date": "Q2 Annually", "task": "Low completion rate of development plans for identified successors", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": ""}, {"definition": "If we have too few successors identified  as \"ready now\" or \"ready near term\", then we will not have sucessors ready to move into role when needed.  We strive for at least 2 ready Now or Ready Near Term candidates per incumbent.", "gov_compliance": "", "likelihood": 2.0, "managers": "Christina Chapman", "mitigation_strategy": "We have an annual Talent Review Process in which all salaried employees are evaluated on their Contribution over time, Potential, Risk of Loss, and Loss Impact.  The data from this process is an input into our annual Succession Planning Process where we launch the task for Succession Plan to be created/updated for all SLT-1 and identified critical roles in the business.  We have accountability measures in place. The ELT Succession plans are reviewed with the BOD at the June BOD Meeting, and the SLT and SLT -1 succession planning data is reviewed in our Q4 QBR session.", "mitigation_type": "", "progress": 50, "responsible": "Managers/HR", "severity": 2.5, "start_date": "", "status": "On track", "target_date": "Q2 Annually", "task": "Low Succession Bench Strength", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": ""}, {"definition": "Without an ongoing way to build succession plans for key roles and to keep them updated, valid successors will not be available when needed", "gov_compliance": "", "likelihood": 3.0, "managers": "Christina Chapman", "mitigation_strategy": "We have an annual Talent Review Process in which all salaried employees are evaluated on their Contribution over time, Potential, Risk of Loss, and Loss Impact.  The data from this process is an input into our annual Succession Planning Process where we launch the such as Tech Talent, Specificiation Apprentice, SAT Technicians, etc", "mitigation_type": "", "progress": 75, "responsible": "Leadership/HR/ Global Talent", "severity": 1.0, "start_date": "", "status": "on track", "target_date": "On going", "task": "Market demand for key skills - skill scarcity", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": ""}, {"definition": "Any issues with employee engagement that could impact organizational reputation, ability to meet needs of candidates (e.g., workplace flexibility, scheduling ); less than optimal candidate experience.", "gov_compliance": "", "likelihood": 2.5, "managers": "Christina Chapman", "mitigation_strategy": "Leveraging Total Rewards and Career Framework to demonstrate career paths and opportunities. Launch the IDP (Individual Development Plan) as a task to all salaried employees, along with Manager tools to facilitate career conversations with employees. Robust Development programs and resources for all all employees on Allegion Academy and via our Leadership Unlocked Programming.", "mitigation_type": "", "progress": 50, "responsible": "Leadership/HR", "severity": 3.0, "start_date": "", "status": "on track", "target_date": "On going", "task": "Company Culture/Employer Brand issues", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": ""}, {"definition": "External candidates not seeing a clear career path at Allegion or development opportunities.", "gov_compliance": "", "likelihood": 4.0, "managers": "Christina Chapman", "mitigation_strategy": "", "mitigation_type": "", "progress": 50, "responsible": "", "severity": 1.5, "start_date": "", "status": "", "target_date": "", "task": "Lack of career path clarity and internal development opportunities", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": ""}], "R19": [{"definition": "Tone at the top defines the ethical climate of an organization\u0027s senior managers, leadership, board of directors and audit committee. It includes prevailing attitudes towards fiduciary duty, financial diligence, risk, compliance with laws, employees, communities and the environment.", "gov_compliance": "Ethics and Compliance Culture", "likelihood": 2.0, "managers": "Alli Martinson, Maria Gomez", "mitigation_strategy": "Comprehensive training program on an online and off-line basis. This includes various training sessioons for recent acquisitions as soon as they are on Allegion networks. (Complaince, contracts, Incident response team traing)", "mitigation_type": "", "progress": 100, "responsible": "Maria", "severity": 2.0, "start_date": "", "status": "On track", "target_date": "2025-12-31", "task": "Poor tone at the top", "task_status": "Completed", "trend": "\u2714", "trend_analysis": "The observed trend indicates that we have a solid and robust tone at the top culture led primarily by Allegion values and with robust mechanisms of control and alert. Allegion\u0027s Performance Management Plan and culture also evaluates infividuals against our company values to measure whether the leaders are displaying the expected behaviours. We rate this as green/completed but this is also continued/in progress work through business units and geographies."}, {"definition": "Refers to a group culture/mentality where individuals are encouraged to pursuing financial gain or increased profits with complete disregard for ethical standards, legal boundaries, social responsibility, environmental impact or the well-being of others.", "gov_compliance": "Ethics and Compliance Culture", "likelihood": 1.0, "managers": "Alli Martinson, Maria Gomez", "mitigation_strategy": "Compliance onboarding for new acquisitions (delivered face to face) or on an remote basis.", "mitigation_type": "", "progress": 75, "responsible": "Maria", "severity": 1.0, "start_date": "", "status": "On track", "target_date": "2025-12-31", "task": "Profit at any cost mentality", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "The trend for profit at any cost is monitored, in particular for areas of the business that might present poorer performance against plan. We believe this is largely under control with the established corporate mechanisms nevertheless the organization remains vigilant and proactive to continue reinforcing a culture of values where these type of instances can be erradicated or minimised."}, {"definition": "Unethical conduct refers to actions that violate moral principles or accepted standards of behaviour even if they are not against the law. Illegal conduct refers to actions that violate the law.", "gov_compliance": "Ethics and Compliance Culture", "likelihood": 2.0, "managers": "Alli Martinson, Maria Gomez", "mitigation_strategy": "Ethics and Complaince program including hotline/whistleblower ethics line through Convercent, roll-out of Code of Conduct online training (August 2025), maintaining and elevating a culture of compliance (specific intiiatives such a E\u0026C week and related communication strategies).", "mitigation_type": "", "progress": 75, "responsible": "Maria/Alli", "severity": 2.0, "start_date": "", "status": "On track", "target_date": "2025-12-31", "task": "Unethical/Illegal Conduct without Accountability", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "We continue to take determined actions against demonstrated unethical or illegal conduct by our associates. We believe the trend is to remain vigilant and decisive in the resolution of ethical dilemmas for the corporation and instilling \"lead by example\" and \"tone at the top\" to Allegion\u0027s company culture."}, {"definition": "Poor communication refers to the ineffective exchange of information, where the message is misunderstood, incomplete, unclear, or not delivered at all, leading to confusion, errors or conflict.", "gov_compliance": "Ethics and Compliance Culture", "likelihood": 3.0, "managers": "Alli Martinson, Maria Gomez", "mitigation_strategy": "Third Party Vetting policy - this involves elevating the training of Allegion subsidiaries to execute on Third Party Intermediary Vetting where applicable. IT also involves the renewals of previous vetted parties, with the aim oif desigining a cadence where this is done every three years. Internal audit will support us in evaluating this risk through integrating in the audit activities in 2026.", "mitigation_type": "", "progress": 50, "responsible": "Maria", "severity": 3.0, "start_date": "", "status": "Behind schedule", "target_date": "2025-12-31", "task": "Poor Communication (top-down, bottom-up, cross-functional)", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "This risk indicator  is categorized as in progress in consideration of Allegion\u0027s fast growth trajectory in particular related to inorganic growth through acquisitions. We are welcoming and blending into the new corporate cultures of the organizations acquired in the last 18 months, therefore perceiving a higher risk for communication ineficiencies."}, {"definition": "Lack of transparency refers to a situation where information is intentionally or unintentionally hidden, withheld or not openly shared, making it difficult for others to understand what is happening, why decisions are made or how outcomes are determined.", "gov_compliance": "Ethics and Compliance Culture", "likelihood": 4.0, "managers": "Alli Martinson, Maria Gomez", "mitigation_strategy": "Additional targeted compliance sessions for any teams with deficient audit reports (as required)", "mitigation_type": "", "progress": 75, "responsible": "Maria", "severity": 4.0, "start_date": "", "status": "", "target_date": "", "task": "Lack of Transparency", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "Similar to the above highlighted risk, the risk of lack of transparency is monitored in consideration of the inorganic growth trajectory of the last 18 months."}, {"definition": "Definition TBD", "gov_compliance": "Ethics and Compliance Culture", "likelihood": 1.0, "managers": "Alli Martinson, Maria Gomez", "mitigation_strategy": "Additional targeted communication campaigns involving ELT members if required (earlier this year, some were produced on an ad-how basis due to heightened cybcersecurity and phishing/scams risks", "mitigation_type": "", "progress": 0, "responsible": "Maria", "severity": 3.0, "start_date": "", "status": "From October 2024 to October 2025 we see great progress overall but we have maintained the risk rating in particular due to the heightened risks when integrating several organziations into Allegion at the same time.", "target_date": "", "task": "Key Risk Identicator TBD", "task_status": "Not Started/Planning", "trend": "\u23f8", "trend_analysis": ""}], "R20": [{"definition": "As Allegion acquires privately held companies, these companies do not have internal control environments as is necessary for a US, publicly traded company.", "gov_compliance": "Internal Control/Compliance with Regulatory Reporting Policies", "likelihood": 2.0, "managers": "Nick Musial", "mitigation_strategy": "Management has a quarterly compliance program. SOX testing is performed regularly throughout the year, and any issues identified are monitored through remediation.", "mitigation_type": "", "progress": 50, "responsible": "G. Stewart", "severity": 5.0, "start_date": "", "status": "On Track", "target_date": "2026-12-31", "task": "Significant acquisition activity of privately held companies with inadequate internal controls", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": ""}, {"definition": "Allegion has ~70 statutory financial statements that must be filed annually. Fines and penalties may be incurred if the financial statements are not filed timely", "gov_compliance": "Internal Control/Compliance with Regulatory Reporting Policies", "likelihood": 4.0, "managers": "Nick Musial", "mitigation_strategy": "As part of acquisition integration, a compliance review llion/week for imported goods and at least $20MM associated to inventory on-hand.  VAT paid on imported goods can be recovered later (cash flow issue).", "gov_compliance": "Trade Compliance", "likelihood": 1.0, "managers": "Kelly Guzman", "mitigation_strategy": "a) Engaged MX consultant (following June 2024 government audit) to perform an exhaustive review of each plant\u0027s compliance with IMMEX and VAT credit certification rules (as well as our internal databases).  \nb) In July 2025, the consultants issued their findings.  We are evaluating their findings to confirm applicability or consider actions required. \nc) Filed additional submissions to the MX government relating to their exit report (provided at end of on-site audits in May 2024).  We have not received feedback from MX government, and believe our audit is still open.", "mitigation_type": "", "progress": 50, "responsible": "Monica Cobian, Manager, MX Trade Compliance\nKelly Guzman, Director, Trade Compliance", "severity": 1.0, "start_date": "", "status": "", "target_date": "", "task": "Mexican government removes Schlage de Mexico\u0027s VAT credit certification", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": ""}, {"definition": "As part of the \"America First Trade Policy\", the US DOJ and DHS created a Trade Fraud Task Force to ramp up enforcement of compliance with US trade laws and the payment of US tariffs.", "gov_compliance": "Trade Compliance", "likelihood": 2.0, "managers": "Kelly Guzman", "mitigation_strategy": "a) we are adding a headcount to support the process of managing compliance with the 232 tariffs (in particular collecting documentary evidence from suppliers to support the values of ST and AL content as well as origin of ST and AL)\nb) we are auditing customs entries weekly now and advising customs brokers of errors and seeking corrections needed (either within 10 day filing window or via Post Summary Correction process).\nc) if we find significant issues of non-compliance we file prior disclosures with the US government and correct the entry data (ie Trimco prior disclosure for 2025).", "mitigation_type": "", "progress": 50, "responsible": "Yesenia Gallegos, Manager, US Trade Compliance\nKelly Guzman, Director, Trade Compliance", "severity": 2.0, "start_date": "", "status": "", "target_date": "", "task": "US government takes an enforcement action related to tariff compliance", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": ""}, {"definition": "Pursuant to the UFLPA, the US government expects companies to be able to prove with documentary evidence in English that there is no forced labor in their supply chain.  The risk is US CBP determines our imported goods are made with forced labor and prohibits their importation until we can demonstrate proof of admissability (ie proof there is no forced labor).", "gov_compliance": "Trade Compliance", "likelihood": 2.5, "managers": "Kelly Guzman", "mitigation_strategy": "a) A  process has been documented on the steps to be taken in the event CBP detains our goods, but gaining an exception from a detention will require collection of documentation in English from suppliers proving no forced labor in their supply chain going back to the mining and smelting of metals (which may not be readily possibe).  \nb) In 2024, Trade Compliance solicited 20 foreign suppliers to obtain manufacturer\u0027s affidavit documentation (exploded bill of material data and tracing of souring). Largely futile exercise and not repeated in 2025 due to lower prioritization.\nc) We need a technology solution that vet suppliers, trace materials used by Tier 1 suppliers, and collect evidence of no forced labor.  \nd) We would like to add the Kharon solution to our E2Open screening software to screen Tier 1 suppliers to detect any known/documented indictors of forced labor (point C above speaks to screening lower tiers in supply chain).", "mitigation_type": "", "progress": 0, "responsible": "Yesenia function _applyFilterWithAnimation(prevVisibleIds) {
  const STAGGER = 35;
  _updateLegendRowVisibility(); // instant list feedback — no expensive DOM rebuild
  const nowVisible = new Set(RISKS.filter(r => _isRiskVisible(r)).map(r => r.id));
  if (!_filterRerenderTimer) _filterPrevVisible = new Set(prevVisibleIds);
  const prevSnap = prevVisibleIds, nowSnap = nowVisible;

  const toExit = [];
  const seen = new Set();
  Object.entries(dotGroupByRiskId).forEach(([id, dg]) => {
    if (seen.has(dg)) return; seen.add(dg);
    if (dg._exiting) return; // already animating out
    const grp = dotRisksGroupById[id] || [];
    if (grp.some(r => prevSnap.has(r.id)) && grp.every(r => !nowSnap.has(r.id))) {
      dg._exiting = true;
      toExit.push(dg);
    }
  });

  if (toExit.length) {
    // Class on dotG (.dot-hover): keyframes include filter:none so filter is removed
    // from the very first frame — no separate mutation, no extra style recalculation.
    toExit.forEach((dg, i) => {
      dg.style.animationDelay = Math.min(i * STAGGER, 200) + 'ms';
      dg.classList.remove('dot-cat-enter');
      dg.classList.add('dot-cat-exit');
    });
  }

  clearTimeout(_filterRerenderTimer);
  _filterRerenderTimer = setTimeout(() => {
    const baseline = new Set(_filterPrevVisible);
    _filterRerenderTimer = null; _filterPrevVisible = new Set();
    rerender();
    requestAnimationFrame(() => {
      renderLegend(); // full rebuild once at debounce end — restores correct row heights/counts
      const toEnter = [];
      const seen2 = new Set(); let enterIdx = 0;
      Object.entries(dotGroupByRiskId).forEach(([id, dg]) => {
        if (seen2.has(dg)) return; seen2.add(dg);
        const grp = dotRisksGroupById[id] || [];
        if (grp.some(r => !baseline.has(r.id))) toEnter.push({ dg, i: enterIdx++ });
      });
      if (toEnter.length) {
        toEnter.forEach(({ dg, i }) => {
          dg.style.animationDelay = Math.min(i * STAGGER, 200) + 'ms';
          dg.classList.add('dot-cat-enter');
          dg.addEventListener('animationend', () => {
            dg.classList.remove('dot-cat-enter'); dg.style.animationDelay = '';
          }, { once: true });
        });
      }
    });
  }, 600);
}

function updateCatFilter(col, isHiding) {
  // Instant legend feedback via CSS class toggle (no DOM rebuild)
  Object.entries(catKeyElByColor).forEach(([c, el]) =>

  RISKS.forEach(r => {
    const row = legendRowByRiskId[r.id];
    if (row) row.classList.toggle('legend-row-cat-off', _hiddenCatColors.has(catColor(r.category || '')));
  });

  if (isHiding) {
    // Animate hiding dots — uses the SAME shared _filterRerenderTimer as multi-filter.
    // This guarantees no independent timer fires rerender mid-animation.
    const seen = new Set(), toAnimate = [];
    Object.entries(dotGroupByRiskId).forEach(([id, dg]) => {
      if (seen.has(dg)) return; seen.add(dg);
      if (dg._exiting) return; // skip already-animating dots
      const grp = dotRisksGroupById[id] || [];
      if (grp.every(r => _hiddenCatColors.has(catColor(r.category || '')))) {
        dg._exiting = true;
        toAnimate.push({ dg });
      }
    });
    if (!toAnimate.length) {
      // Nothing to animate — still reset shared debounce so rerender fires
      clearTimeout(_filterRerenderTimer);
      _filterRerenderTimer = setTimeout(() => {
        _filterRerenderTimer = null; _filterPrevVisible = new Set();
        rerender(); requestAnimationFrame(() => renderLegend());
      }, 600);
      return;
    }
    const STAGGER = 45;
    toAnimate.forEach(({ dg }, i) => {
      dg.style.animationDelay = Math.min(i * STAGGER, 250) + 'ms';
      dg.classList.remove('dot-cat-enter');
      dg.classList.add('dot-cat-exit');
    });
    // Shared debounce — resets on EVERY filter click so rerender always waits
    clearTimeout(_filterRerenderTimer);
    _filterRerenderTimer = setTimeout(() => {
      _filterRerenderTimer = null; _filterPrevVisible = new Set();
      rerender(); requestAnimationFrame(() => renderLegend());
    }, 600);

  } else {
    // Show: rerender dots + rebuild legend so newly visible rows reappear in the list.
    // renderLegend() is needed because the 600ms hide-timer called renderLegend() WITHOUT
    // these risks, clearing their legendRowByRiskId entries — the CSS class toggle alone
    // can't restore rows that no longer exist in the DOM.
    rerender();
    renderLegend();
    const seen = new Set(), toAnimate = [];
    RISKS.filter(r => catColor(r.category || '') === col).forEach(r => {
      const dg = dotGroupByRiskId[r.id];
      if (dg && !seen.has(dg)) { seen.add(dg); toAnimate.push(dg); }
    });
    const STAGGER = 45;
    toAnimate.forEach((dg, i) => {
      dg.style.animationDelay = Math.min(i * STAGGER, 250) + 'ms';
      dg.classList.add('dot-cat-enter');
      dg.addEventListener('animationend', () => {
        dg.classList.remove('dot-cat-enter'); dg.style.animationDelay = '';
      }, { once: true });
    });
  }
}

function panToRisk(risk) {
  const tx = snap(risk.likelihood), ty = snap(risk.severity);
  const pad = 0.15;
  if (tx > VR.xMin + pad && tx < VR.xMax - pad && ty > VR.yMin + pad && ty < VR.yMax - pad) return;
  const rW = VR.xMax - VR.xMin, rH = VR.yMax - VR.yMin;
  const tXMin = Math.max(0, Math.min(5 - rW, tx - rW / 2));
  const tYMin = Math.max(0, Math.min(5 - rH, ty - rH / 2));
  const tXMax = tXMin + rW, tYMax = tYMin + rH;
  if (Math.abs(tXMin - VR.xMin) < 0.01 && Math.abs(tYMin - VR.yMin) < 0.01) return;
  const sXMin = VR.xMin, sXMax = VR.xMax, sYMin = VR.yMin, sYMax = VR.yMax;
  const dur = 380, t0 = performance.now();
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    VR.xMin = sXMin + (tXMin - sXMin) * e;  VR.xMax = sXMax + (tXMax - sXMax) * e;
    VR.yMin = sYMin + (tYMin - sYMin) * e;  VR.yMax = sYMax + (tYMax - sYMax) * e;
    if (p < 1) { _fastRerender(); _panAnim = requestAnimationFrame(step); }
    else { VR.xMin=tXMin; VR.xMax=tXMax; VR.yMin=tYMin; VR.yMax=tYMax; rerender(); _panAnim=null; }
  }
  _panAnim = requestAnimationFrame(step);
}

function mk(tag, a, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(a)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
function mktxt(content, a, parent) {
  const e = mk('text', a, parent);
  e.textContent = content;
  return e;
}

// ── Category colour system ────────────────────────────────────────────
// All colours verified WCAG AA (>=4.5:1 contrast with black text), which also
// guarantees they are bright enough to read clearly against the black dot fill.
// Hues spread ~50 degrees apart around the full colour wheel for maximum
// perceptual distance: Coral(16) Amber(49) Lime(76) Emerald(151) Teal(171) Periwinkle(218) Pink(337)
const CAT_MAP = {
  'strategic':                '#FF6B35',  // coral-orange  contrast 7.9:1
  'operational':              '#00BFA5',  // vivid teal    contrast 9.1:1
  'technology/cybersecurity': '#C6FF00',  // electric lime contrast 17.8:1
  'technology':               '#C6FF00',
  'human capital':            '#00E676',  // emerald green contrast 12.7:1
  'governance/compliance':    '#FF80AB',  // bright pink   contrast 9.3:1
  'governance':               '#FF80AB',
  'environmental/external':   '#82B1FF',  // periwinkle    contrast 10.1:1
  'environmental':            '#82B1FF',
  'financial':                '#FFD740',  // warm amber    contrast 15.1:1
};

const CAT_LABELS = [
  ['Strategic Risks',                '#FF6B35'],
  ['Operational Risks',              '#00BFA5'],
  ['Technology/Cybersecurity Risks', '#C6FF00'],
  ['Human Capital Risks',            '#00E676'],
  ['Governance / Compliance Risks',  '#FF80AB'],
  ['Environmental / External Risks', '#82B1FF'],
  ['Financial Risks',                '#FFD740'],

];

function catColor(cat) {
  if (!cat) return '#555';
  const k = cat.toLowerCase().trim().replace(/\s*risks?\s*$/, '').trim();
  return CAT_MAP[k] || '#555';
}

// Lookup: risk id → category
const ID_TO_CAT = {};
RISKS.forEach(r => { ID_TO_CAT[r.id] = r.category || ''; });

// ── Grouping / label sizing ───────────────────────────────────────────────────
function snap(v) { return Math.round(v * 2) / 2; }

function groupRisks(risks) {
  const map = new Map();
  risks.forEach(r => {
    if (!_isRiskVisible(r)) return;
    const sl = snap(r.likelihood), ss = snap(r.severity);
    if (sl < VR.xMin-0.26 || sl > VR.xMax+0.26) return;
    if (ss < VR.yMin-0.26 || ss > VR.yMax+0.26) return;
    const key = sl+','+ss;
    if (!map.has(key)) map.set(key, { risks: [], likelihood: sl, severity: ss });
    map.get(key).risks.push(r);
  });
  return [...map.values()];
}

const MAX_PER_ROW = 3, CHAR_W = 6, ROW_H = 14, PAD_X = 4, PAD_Y = 3;

function getLabelLayout(ids) {
  const rows = [];
  for (let i = 0; i < ids.length; i += MAX_PER_ROW)
    rows.push(ids.slice(i, i + MAX_PER_ROW));
  const maxChars = Math.max(...rows.map(r => r.join('  ').length));
  return { rows, w: Math.max(32, maxChars * CHAR_W + PAD_X * 2), h: rows.length * ROW_H + PAD_Y * 2 };
}

// ── clearY: bubble label past blocking dots ───────────────────────────────────
const DOT_R = 10, VGAP = 11;

// ── Multi-colour pie-chart dot stroke ─────────────────────────────────────────
// Draws the black dot with arc-segments around it, one per category colour.
// Uses stroke-dasharray so each arc covers 1/N of the circumference.
function drawPieDot(cx, cy, categories, parent) {
  const R  = DOT_R;
  const SW = 3;                          // stroke width
  const C  = 2 * Math.PI * (R + SW / 2); // circumference at stroke mid-point
  const unique = [...new Set(categories.map(c => catColor(c || '')))];
  const N  = unique.length;
  const seg = C / N;

  // Thin black outer border drawn FIRST (behind everything).
  // SW+2 makes it 1px wider each side than the coloured ring, so exactly 1px
  // of black peeks outside the colours while the inner part is covered by them.
  mk('circle', { cx, cy, r: R, fill: 'none', stroke: '#000', 'stroke-width': SW + 2 }, parent);

  // Black filled centre
  mk('circle', { cx, cy, r: R, fill: '#111827' }, parent);

  // White base ring so colours show clearly
  mk('circle', { cx, cy, r: R, fill: 'none', stroke: 'rgba(255,255,255,0.25)', 'stroke-width': SW }, parent);

  // One arc per colour, rotated so first arc starts at 12 o'clock
  unique.forEach((col, i) => {
    mk('circle', {
      cx, cy, r: R,
      fill: 'none',
      stroke: col,
      'stroke-width': SW,
      'stroke-dasharray': `${seg.toFixed(2)} ${(C - seg).toFixed(2)}`,
      'stroke-dashoffset': (C / 4 - i * seg).toFixed(2),
    }, parent);
  });
}

function buildItems(groups) {
  const allDots = groups.map(g => ({ cx: svgX(g.likelihood), cy: svgY(g.severity) }));
  const GAP = 5;  // minimum gap between any two elements
  const placedRects = [];

  // ── Exact collision checks ─────────────────────────────────────────────────

  // Rect-rect overlap
  function rectsOverlap(a, b) {
    return Math.min(a.x+a.w, b.x+b.w) - Math.max(a.x, b.x) > GAP &&
           Math.min(a.y+a.h, b.y+b.h) - Math.max(a.y, b.y) > GAP;
  }

  // Circle-rect overlap (nearest point on rect to circle centre)
  function circleRectOverlap(dcx, dcy, r, rect) {
    const nx = Math.max(rect.x, Math.min(rect.x+rect.w, dcx));
    const ny = Math.max(rect.y, Math.min(rect.y+rect.h, dcy));
    return (nx-dcx)**2 + (ny-dcy)**2 < (r+GAP)**2;
  }

  // Vertical line (at x=cx, y from y1 to y2) crossing a rect
  function lineRectCross(cx, y1, y2, rect) {
    const yLo = Math.min(y1,y2)+2, yHi = Math.max(y1,y2)-2;
    return cx > rect.x-1 && cx < rect.x+rect.w+1 && yHi > rect.y && yLo < rect.y+rect.h;
  }

  // Vertical line passing within DOT_R of a dot circle
  function lineDotCross(cx, y1, y2, dcx, dcy) {
    if (Math.abs(dcx-cx) >= DOT_R+GAP) return false;
    const yLo = Math.min(y1,y2)+2, yHi = Math.max(y1,y2)-2;
    return yHi > dcy-DOT_R && yLo < dcy+DOT_R;
  }

  // Is this rect position fully valid? (no label, no dot, connector clear)
  function isValid(rect, cx, cy) {
    // 1. label-label
    for (const r of placedRects) {
      if (rectsOverlap(rect, r)) return false;
    }
    // 2. label-dot (other dots only, using exact circle-rect check)
    for (const { cx: dcx, cy: dcy } of allDots) {
      if (dcx===cx && dcy===cy) continue;
      if (circleRectOverlap(dcx, dcy, DOT_R, rect)) return false;
    }
    // 3. connector clearance (straight vertical line at x=cx)
    const above  = rect.y + rect.h <= cy;
    const dotEdge   = above ? cy - DOT_R : cy + DOT_R;
    const labelEdge = above ? rect.y + rect.h : rect.y;
    const yMin = Math.min(dotEdge, labelEdge)+2, yMax = Math.max(dotEdge, labelEdge)-2;
    if (yMin < yMax) {
      for (const r of placedRects) {
        if (lineRectCross(cx, yMin, yMax, r)) return false;
      }
      for (const { cx: dcx, cy: dcy } of allDots) {
        if (dcx===cx && dcy===cy) continue;
        if (lineDotCross(cx, yMin, yMax, dcx, dcy)) return false;
      }
    }
    return true;
  }

  // Scan outward from dot in one direction until a valid position is found.
  // Step size = lh so we check one label-height slot at a time.
  function findValidY(cx, lw, lh, cy, dir) {
    const lx    = Math.max(LB.xMin, Math.min(LB.xMax-lw, cx-lw/2));
    const start = dir==='below' ? cy+DOT_R+VGAP : cy-DOT_R-VGAP-lh;
    const limit = dir==='below' ? LB.yMax-lh    : LB.yMin;
    const step  = dir==='below' ? 1 : -1;
    let   y     = start;
    let   iters = 0;
    while ((dir==='below' ? y<=limit : y>=limit) && iters++ < 800) {
      const rect = { x:lx, y, w:lw, h:lh };
      if (isValid(rect, cx, cy)) return y;
      // Jump past the nearest conflicting blocker in this direction
      let jump = lh + GAP;
      for (const r of placedRects) {
        if (Math.min(lx+lw, r.x+r.w) - Math.max(lx, r.x) <= GAP) continue;
        if (dir==='below' && r.y >= y && r.y < y+lh+GAP)
          jump = Math.min(jump, r.y+r.h+GAP - y);
        if (dir==='above' && r.y+r.h <= y+lh && r.y+r.h > y-GAP)
          jump = Math.min(jump, (y+lh) - r.y + GAP);
      }
      for (const { cx: dcx, cy: dcy } of allDots) {
        if (dcx===cx && dcy===cy) continue;
        if (Math.min(lx+lw, dcx+DOT_R+GAP) - Math.max(lx, dcx-DOT_R-GAP) <= 0) continue;
        if (dir==='below' && dcy >= y-DOT_R-GAP && dcy < y+lh+DOT_R+GAP)
          jump = Math.min(jump, dcy+DOT_R+GAP - y);
        if (dir==='above' && dcy+DOT_R+GAP >= y && dcy-DOT_R-GAP < y+lh)
          jump = Math.min(jump, (y+lh) - (dcy-DOT_R-GAP));
      }
      y += step * Math.max(1, Math.ceil(jump));
    }
    return null;
  }

  // Process highest severity first (most constrained labels place early)
  const ordered = [...groups].sort((a,b) => b.severity - a.severity);

  const placed = ordered.map(({ risks, likelihood, severity }) => {
    const cx  = svgX(likelihood), cy = svgY(severity);
    const ids = risks.map(r => r.id);
    const { rows, w: lw, h: lh } = getLabelLayout(ids);
    const lx  = Math.max(LB.xMin, Math.min(LB.xMax-lw, cx-lw/2));

    const yA = findValidY(cx, lw, lh, cy, 'above');
    const yB = findValidY(cx, lw, lh, cy, 'below');

    let ly;
    if (yA !== null && yB !== null) {
      ly = Math.abs(yA+lh/2-cy) <= Math.abs(yB+lh/2-cy) ? yA : yB;
    } else {
      ly = yA ?? yB ?? Math.max(LB.yMin, cy-DOT_R-VGAP-lh);
    }

    const rect = { x:lx, y:ly, w:lw, h:lh };
    placedRects.push(rect);
    return { groups:[{risks,cx,cy}], rows, rect };
  });

  return groups.map(g =>
    placed.find(it => it.groups[0].cx===svgX(g.likelihood) && it.groups[0].cy===svgY(g.severity))
  );
}

// ── Force resolution ──────────────────────────────────────────────────────────
function resolveCollisions(items) {
  const GAP = 5, MAX_ITER = 500;
  for (let iter = 0; iter < MAX_ITER; iter++) {
    let moved = false;
    for (let i = 0; i < items.length; i++) {
      for (let j = i + 1; j < items.length; j++) {
        const a = items[i].rect, b = items[j].rect;
        const ox = Math.min(a.x+a.w, b.x+b.w) - Math.max(a.x, b.x) + GAP;
        const oy = Math.min(a.y+a.h, b.y+b.h) - Math.max(a.y, b.y) + GAP;
        if (ox <= 0 || oy <= 0) continue;
        moved = true;
        if (ox <= oy) {
          const p = ox/2;
          if (a.x+a.w/2 < b.x+b.w/2) { a.x -= p; b.x += p; } else { a.x += p; b.x -= p; }
        } else {
          const p = oy/2;
          if (a.y+a.h/2 < b.y+b.h/2) { a.y -= p; b.y += p; } else { a.y += p; b.y -= p; }
        }
        for (const r of [a, b]) {
          r.x = Math.max(LB.xMin, Math.min(LB.xMax - r.w, r.x));
          r.y = Math.max(LB.yMin, Math.min(LB.yMax - r.h, r.y));
        }
      }
    }
    if (!moved) break;
  }
  // Horizontal dot clearance
  const DEXCL = DOT_R + 4;
  for (const item of items) {
    const r = item.rect;
    for (const other of items) {
      if (other === item) continue;
      for (const { cx: dcx, cy: dcy } of other.groups) {
        if (!(dcy+DEXCL > r.y && dcy-DEXCL < r.y+r.h)) continue;
        if (!(dcx+DEXCL > r.x && dcx-DEXCL < r.x+r.w)) continue;
        r.x = r.x+r.w/2 < dcx ? dcx-DEXCL-r.w : dcx+DEXCL;
        r.x = Math.max(LB.xMin, Math.min(LB.xMax-r.w, r.x));
      }
    }
  }
}

// ── Proximity merge ───────────────────────────────────────────────────────────
// Only merge pairs of adjacent labels (gap < MERGE_DIST) where the combined
// risk count stays ≤ MAX_MERGE_IDS. This prevents runaway cluster growth.
function mergeClose(items) {
  const MERGE_DIST    = 4;   // gap between label boxes to trigger merge
  const MAX_MERGE_IDS = 6;  // cap merged label at 6 risk IDs
  // Dots at different 0.5-unit snap positions are at least 60px apart (horizontal)
  // or 68px apart (vertical). Diagonal adjacent = ~91px. Cap below that so only
  // labels for horizontally or vertically adjacent dots (not diagonal) can merge.
  const MAX_DOT_DIST  = 80;

  function gap(a, b) {
    const gx = Math.max(0, Math.max(a.x, b.x) - Math.min(a.x+a.w, b.x+b.w));
    const gy = Math.max(0, Math.max(a.y, b.y) - Math.min(a.y+a.h, b.y+b.h));
    return Math.sqrt(gx*gx + gy*gy);
  }

  function countIds(item) {
    return item.groups.reduce((n, g) => n + g.risks.length, 0);
  }

  function buildMerged(a, b) {
    const allGroups = [...a.groups, ...b.groups];
    const allRisks  = allGroups.flatMap(g => g.risks);
    const { rows, w: lw, h: lh } = getLabelLayout(allRisks.map(r => r.id));
    const avgX = (a.rect.x + a.rect.w/2 + b.rect.x + b.rect.w/2) / 2;
    const avgY = (a.rect.y + a.rect.h/2 + b.rect.y + b.rect.h/2) / 2;
    const lx   = Math.max(LB.xMin, Math.min(LB.xMax-lw, avgX - lw/2));
    const ly   = Math.max(LB.yMin, Math.min(LB.yMax-lh, avgY - lh/2));
    return { groups: allGroups, rows, rect: { x: lx, y: ly, w: lw, h: lh } };
  }

  // Single pass: for each unmerged item, check if it can merge with the
  // next unmerged item that is close enough and within the ID cap.
  let current = [...items];
  let changed  = true;
  while (changed) {
    changed = false;
    const next = [];
    const used = new Set();
    for (let i = 0; i < current.length; i++) {
      if (used.has(i)) continue;
      let merged = false;
      for (let j = i + 1; j < current.length; j++) {
        if (used.has(j)) continue;
        if (gap(current[i].rect, current[j].rect) < MERGE_DIST &&
            countIds(current[i]) + countIds(current[j]) <= MAX_MERGE_IDS &&
            current[i].groups.every(ga => current[j].groups.every(gb => {
              const dx = ga.cx - gb.cx, dy = ga.cy - gb.cy;
              return Math.sqrt(dx*dx + dy*dy) <= MAX_DOT_DIST;
            }))) {
          next.push(buildMerged(current[i], current[j]));
          used.add(i); used.add(j);
          merged = true; changed = true;
          break;
        }
      }
      if (!merged) next.push(current[i]);
    }
    current = next;
  }
  return current;
}

// Nearest label-edge point to a dot
function connAnchor(cx, cy, rect) {
  const { x: lx, y: ly, w: lw, h: lh } = rect;
  const dx = (lx+lw/2) - cx, dy = (ly+lh/2) - cy;
  if (Math.abs(dy) >= Math.abs(dx))
    return dy > 0 ? { x: Math.max(lx, Math.min(lx+lw,cx)), y: ly }
                  : { x: Math.max(lx, Math.min(lx+lw,cx)), y: ly+lh };
  return dx > 0 ? { x: lx,    y: Math.max(ly, Math.min(ly+lh,cy)) }
                : { x: lx+lw, y: Math.max(ly, Math.min(ly+lh,cy)) };
}

// ── Gradient coords (anchored to data space so zoom/pan moves the colours) ────
function updateGradientCoords() {
  const g = document.getElementById('gDiag');
  // Anchor green at data(0,0) and red at data(5,5) in SVG pixel space
  g.setAttribute('x1', svgX(0).toFixed(1));
  g.setAttribute('y1', svgY(0).toFixed(1));
  g.setAttribute('x2', svgX(5).toFixed(1));
  g.setAttribute('y2', svgY(5).toFixed(1));
}

// Lite render — dots only, no label recalculation. Used during drag for
// smooth 60fps pan without the expensive buildItems/resolveCollisions pass.
function liteRender() {
  updateGradientCoords();
  const layer = document.getElementById('risks-layer');
  while (layer.firstChild) layer.removeChild(layer.firstChild);
  groupRisks(RISKS).forEach(({ risks, likelihood, severity }) => {
    const cx = svgX(likelihood), cy = svgY(severity);
    const dotG = mk('g', {}, layer);
    drawPieDot(cx, cy, risks.map(r => r.category || ''), dotG);
  });
}

// Per-corner rounded rect path. tl/tr/br/bl = corner radii (0 = square).
function roundedRectPath(x, y, w, h, tl, tr, br, bl) {
  const p = [`M ${x+tl},${y}`];
  p.push(`L ${x+w-tr},${y}`);
  p.push(tr ? `Q ${x+w},${y} ${x+w},${y+tr}` : `L ${x+w},${y}`);
  p.push(`L ${x+w},${y+h-br}`);
  p.push(br ? `Q ${x+w},${y+h} ${x+w-br},${y+h}` : `L ${x+w},${y+h}`);
  p.push(`L ${x+bl},${y+h}`);
  p.push(bl ? `Q ${x},${y+h} ${x},${y+h-bl}` : `L ${x},${y+h}`);
  p.push(`L ${x},${y+tl}`);
  p.push(tl ? `Q ${x},${y} ${x+tl},${y}` : `L ${x},${y}`);
  return p.join(' ') + ' Z';
}

// ── Static chart ──────────────────────────────────────────────────────────────
function renderStatic() {
  updateGradientCoords();
  const layer = document.getElementById('static-layer');
  const { x, y, w, h } = P;
  // Right corners are square when connected to the list; rounded when graph is alone
  const rRight = _graphAllRounded ? 20 : 0;
  mk('path', { d: roundedRectPath(x,y,w,h, 20,rRight,rRight,20), fill: 'url(#gDiag)' }, layer);

  // Allegion logo watermark — 80% of plot size, centred, above gradient, below grid lines
  const logoW = w * 0.8, logoH = h * 0.8;
  mk('image', {
    href: LOGO_SRC,
    x: x + (w - logoW) / 2, y: y + (h - logoH) / 2,
    width: logoW, height: logoH,
    opacity: 0.20,
    preserveAspectRatio: 'xMidYMid meet'
  }, layer);

  // Dynamic grid lines and labels for current VR (data view range)
  const STEP = 0.5;
  function rangeTicks(lo, hi) {
    const out = [], s = Math.ceil(lo/STEP)*STEP;
    for (let v=s; v<=hi+0.001; v+=STEP) out.push(parseFloat(v.toFixed(2)));
    return out;
  }
  const gcol = 'rgba(255,255,255,0.5)';
  rangeTicks(VR.xMin, VR.xMax).forEach(v => {
    const sx = svgX(v);
    if (sx < x-1 || sx > x+w+1) return;
    mk('line',{x1:sx,y1:y,x2:sx,y2:y+h,stroke:gcol,'stroke-width':v===Math.round(v)?1.0:0.4},layer);
    if (v >= 0.99)
      mktxt(v.toFixed(1),{x:sx,y:y+h+16,'text-anchor':'middle','font-size':10,fill:'#444','font-family':AXIS_FONT},layer);
  });
  rangeTicks(VR.yMin, VR.yMax).forEach(v => {
    const sy = svgY(v);
    if (sy < y-1 || sy > y+h+1) return;
    mk('line',{x1:x,y1:sy,x2:x+w,y2:sy,stroke:gcol,'stroke-width':v===Math.round(v)?1.0:0.4},layer);
    if (v >= 0.99)
      mktxt(v.toFixed(1),{x:x-8,y:sy+4,'text-anchor':'end','font-size':10,fill:'#444','font-family':AXIS_FONT},layer);
  });
  if (VR.xMin<=2.5 && VR.xMax>=2.5)
    mk('line',{x1:svgX(2.5),y1:y,x2:svgX(2.5),y2:y+h,stroke:'rgba(0,0,0,0.45)','stroke-width':2},layer);
  if (VR.yMin<=2.5 && VR.yMax>=2.5)
    mk('line',{x1:x,y1:svgY(2.5),x2:x+w,y2:svgY(2.5),stroke:'rgba(0,0,0,0.45)','stroke-width':2},layer);
  // Graph border — open path (no right edge); card draws the matching right+top+bottom border
  const BSTROKE = 'rgba(0,0,0,0.45)';
  if (_graphAllRounded) {
    mk('path',{d:roundedRectPath(x,y,w,h,20,20,20,20),fill:'none',stroke:BSTROKE,'stroke-width':1.5},layer);
  } else {
    const gBorder = `M ${x+w},${y} L ${x+20},${y} Q ${x},${y} ${x},${y+20} L ${x},${y+h-20} Q ${x},${y+h} ${x+20},${y+h} L ${x+w},${y+h}`;
    mk('path',{d:gBorder,fill:'none',stroke:BSTROKE,'stroke-width':1.5},layer);
  }
  mktxt('Likelihood',{x:x+w/2,y:y+h+34,'text-anchor':'middle','font-size':13,'font-weight':600,fill:'#333','font-family':AXIS_FONT},layer);
  const sev=mktxt('Severity',{'text-anchor':'middle','font-size':13,'font-weight':600,fill:'#333','font-family':AXIS_FONT,transform:`rotate(-90,${x-44},${y+h/2})`},layer);
  sev.setAttribute('x',x-44); sev.setAttribute('y',y+h/2);
  // Subtle "data as of" timestamp — bottom-right of chart area
  if (LAST_UPDATED && LAST_UPDATED !== 'Unknown') {
    mktxt(`Data as of ${LAST_UPDATED}`, {
      x: x + w, y: y + h + 50, 'text-anchor': 'end',
      'font-size': 9.5, fill: '#666', 'font-family': AXIS_FONT, opacity: 0.7
    }, layer);
  }
}

// ── Render risks ──────────────────────────────────────────────────────────────
function renderRisks() {
  // Reset dim state — old dotG elements are about to be destroyed so mouseleave won't fire
  _dimCount = 0;
  document.getElementById('legend-layer').classList.remove('legend-dimmed');
  Object.keys(dotGroupByRiskId).forEach(k => delete dotGroupByRiskId[k]);
  Object.keys(dotRisksGroupById).forEach(k => delete dotRisksGroupById[k]);
  const layer  = document.getElementById('risks-layer');
  const groups = groupRisks(RISKS);
  let items    = buildItems(groups);
  resolveCollisions(items);
  items = mergeClose(items);

  items.forEach(({ groups: grps, rows, rect }) => {
    const { x: lx, y: ly, w: lw, h: lh } = rect;

    // Dominant category for border colour (most common in this label)
    const cats = grps.flatMap(g => g.risks.map(r => r.category || ''));
    const freq = {}; cats.forEach(c => { freq[c] = (freq[c]||0)+1; });
    const domCat = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';
    const borderCol = catColor(domCat);

    const g = mk('g', { class: 'risk-group' }, layer);

    // Label box (drawn first so connectors and dots appear on top)
    mk('rect', { class: 'label-box', x: lx, y: ly, width: lw, height: lh, rx: 3,
                 fill: '#2D2D2E', stroke: borderCol, 'stroke-width': 1.5 }, g);

    // Text: each ID coloured by its category using tspan elements
    const allIds = grps.flatMap(gr => gr.risks.map(r => r.id));
    const layout = getLabelLayout(allIds);
    layout.rows.forEach((row, i) => {
      const textEl = mk('text', {
        class: 'label-text',
        x: lx + lw / 2, y: ly + PAD_Y + (i + 0.82) * ROW_H,
        'text-anchor': 'middle', 'font-size': 9.5, 'font-weight': 700, 'font-family': FONT
      }, g);
      row.forEach((id, idx) => {
        const span = document.createElementNS(NS, 'tspan');
        span.textContent = id;
        span.setAttribute('fill', catColor(ID_TO_CAT[id] || ''));
        textEl.appendChild(span);
        if (idx < row.length - 1) {
          const sep = document.createElementNS(NS, 'tspan');
          sep.textContent = '  '; sep.setAttribute('fill', '#aaa');
          textEl.appendChild(sep);
        }
      });
    });

    // Per-dot: connector + dot + individual tooltip (only that dot's risks)
    grps.forEach(({ risks: grpRisks, cx, cy }) => {
      const col    = catColor(grpRisks[0]?.category || '');
      const anchor = connAnchor(cx, cy, rect);
      const dotG   = mk('g', { class: 'dot-hover' }, g);

      grpRisks.forEach(r => { dotGroupByRiskId[r.id] = dotG; dotRisksGroupById[r.id] = grpRisks; });

      // Thicker, more visible connector with category colour
      // Bezier connector when dot sits exactly on the 2.5 quadrant line
      // (straight connector would fuse visually with the thick axis)
      if (Math.abs(cx - svgX(2.5)) < 3) {
        const mid = { x: cx + 32, y: (cy + anchor.y) / 2 };
        mk('path', {
          class: 'conn-line',
          d: 'M '+cx+' '+cy+' Q '+mid.x+' '+mid.y+' '+anchor.x+' '+anchor.y,
          stroke: col, 'stroke-width': 1.8, fill: 'none', opacity: 0.85
        }, dotG);
      } else {
        mk('line', { class: 'conn-line', x1: cx, y1: cy, x2: anchor.x, y2: anchor.y,
                     stroke: col, 'stroke-width': 1.8, opacity: 0.85 }, dotG);
      }

      // ── Status ring (overdue review or poor mitigation health) ─────────────
      const isOverdue   = grpRisks.some(r => String(r.review_overdue).toLowerCase() === 'true');
      const isPoorHealth = grpRisks.some(r => {
        const h = (r.mitigation_health || '').toLowerCase();
        return h.includes('risk') || h.includes('behind');
      });
      if (isOverdue || isPoorHealth) {
        const ringCol  = isOverdue ? '#E53935' : '#FF9800';
        const ringGlow = isOverdue ? 'rgba(229,57,53,0.7)' : 'rgba(255,152,0,0.7)';
        const ringR    = DOT_R + 5;
        const C3 = 2 * Math.PI * ringR;
        mk('circle', { cx, cy, r:ringR, fill:'none', stroke:ringCol,
          'stroke-width':1.5,
          'stroke-dasharray':`${(C3/10).toFixed(1)} ${(C3/10).toFixed(1)}`,
          class:'status-ring', 'pointer-events':'none',
          style:`--ring-glow:${ringGlow}` }, g);
      }

      const scaleG = mk('g', { class: 'dot-scale-wrapper' }, dotG);
      dotG._sw = scaleG;
      const spinG = mk('g', { class: 'dot-spin' }, scaleG);
      drawPieDot(cx, cy, grpRisks.map(r => r.category || ''), spinG);

      dotG.addEventListener('mouseenter', e => {
        showTip(e, grpRisks);
        grpRisks.forEach(r => {
          const row = legendRowByRiskId[r.id];
          if (row) row.classList.add('legend-row-hl');
        });
        if (!_spotlightOwner) dimLegend(true); // spotlight owns dim state exclusively
      });
      dotG.addEventListener('mousemove',  moveTip);
      dotG.addEventListener('mouseleave', () => {
        hideTip();
        grpRisks.forEach(r => {
          const row = legendRowByRiskId[r.id];
          // Keep highlight if spotlight is active for this risk
          if (row && !_isSpotlightRisk(r)) row.classList.remove('legend-row-hl');
        });
        // Don't un-dim if spotlight is active — it manages the dim state
        if (!_spotlightOwner) dimLegend(false);
      });
      dotG.addEventListener('click', e => {
        e.stopPropagation();
        // If spotlight is active and this dot has no spotlighted risk, clear spotlight first
        if (_spotlightOwner && !grpRisks.some(r => _isSpotlightRisk(r))) clearSpotlight();
        openModal(grpRisks);
      });
    });
  });
}
