// ── Data-range Zoom / Pan ────────────────────────────────────────────────────
// The plot square stays fixed in size. Zoom changes VR (the visible data range).
// svgX/svgY automatically map the new range into the same plot pixels.
// Re-rendering updates axis ticks, dots, and labels.
const hm = document.getElementById('hm');

// Pin zoom pill directly below "Likelihood" label in SVG space
function positionCtrl() {
  const r = hm.getBoundingClientRect();
  if (!r.width || !r.height) return;
  const scale   = Math.min(r.width / 1300, r.height / 780);
  const offsetX = (r.width  - 1300 * scale) / 2;
  const offsetY = (r.height - 780  * scale) / 2;
  const ctrl = document.getElementById('zoom-ctrl');
  const pillLeft = r.left + offsetX + 430 * scale;
  const pillTop  = Math.min(r.top + offsetY + 734 * scale + 10, window.innerHeight - 50);
  ctrl.style.left      = pillLeft + 'px';
  ctrl.style.top       = pillTop + 'px';
  ctrl.style.bottom    = 'auto';
  ctrl.style.transform = 'translateX(-50%)';
  // Position the chips container — centred on the pill, stacks upward
  const chips = document.getElementById('active-chips');
  chips.style.left      = (pillLeft - ctrl.offsetWidth / 2) + 'px';
  chips.style.top       = 'auto';
  chips.style.bottom    = (window.innerHeight - pillTop + 10) + 'px';
}

function updateResetBtn() {
  const atDefault = Math.abs(VR.xMin) < 0.001 && Math.abs(VR.xMax - 5) < 0.001 &&
                    Math.abs(VR.yMin) < 0.001 && Math.abs(VR.yMax - 5) < 0.001;
  document.getElementById('zoom-reset').classList.toggle('reset-active', !atDefault);
}

function rerender() {
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  hideTip();
  updateResetBtn();
  _dimCount = 0;
  document.getElementById('legend-layer').classList.remove('legend-dimmed');
  ['static-layer','risks-layer'].forEach(id => {
    const el = document.getElementById(id);
    while (el.firstChild) el.removeChild(el.firstChild);
  });
  renderStatic();
  renderRisks();
  positionCtrl();
  _reapplyLegendHighlights();
  _reapplySpotlight();
}

// Labels fade out at zoom start; 50ms debounce before fade-in so rapid scroll
// events don't flicker them in and out between each 180ms animation.
let _zoomFadeIn = null;
const _zoomRL = () => document.getElementById('risks-layer');

function doZoom(factor, pivDX, pivDY, dur = 300) {
  const cx = (pivDX != null) ? pivDX : (VR.xMin + VR.xMax) / 2;
  const cy = (pivDY != null) ? pivDY : (VR.yMin + VR.yMax) / 2;
  const nxMin = cx - (cx - VR.xMin) / factor;
  const nxMax = cx + (VR.xMax - cx) / factor;
  const nyMin = cy - (cy - VR.yMin) / factor;
  const nyMax = cy + (VR.yMax - cy) / factor;
  if (nxMax - nxMin > 5.001 || nyMax - nyMin > 5.001) return;

  let tXMin = nxMin, tXMax = nxMax, tYMin = nyMin, tYMax = nyMax;
  const _xrz = tXMax - tXMin, _yrz = tYMax - tYMin;
  if (tXMin < 0) { tXMin = 0; tXMax = _xrz; }
  if (tXMax > 5) { tXMax = 5; tXMin = 5 - _xrz; }
  if (tYMin < 0) { tYMin = 0; tYMax = _yrz; }
  if (tYMax > 5) { tYMax = 5; tYMin = 5 - _yrz; }

  _zoomRL().classList.add('zooming');  // labels start fading out (CSS transition)
  clearTimeout(_zoomFadeIn);           // cancel any pending fade-in
  const aXMin = VR.xMin, aXMax = VR.xMax, aYMin = VR.yMin, aYMax = VR.yMax;
  const t0 = performance.now();
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    VR.xMin = aXMin + (tXMin - aXMin) * e;  VR.xMax = aXMax + (tXMax - aXMax) * e;
    VR.yMin = aYMin + (tYMin - aYMin) * e;  VR.yMax = aYMax + (tYMax - aYMax) * e;
    _fastRerender();
    if (p < 1) { _panAnim = requestAnimationFrame(step); }
    else {
      VR.xMin=tXMin; VR.xMax=tXMax; VR.yMin=tYMin; VR.yMax=tYMax;
      rerender();  // places labels at correct positions (still opacity:0)
      _panAnim = null;
      _zoomFadeIn = setTimeout(() => _zoomRL().classList.remove('zooming'), 50);
    }
  }
  _panAnim = requestAnimationFrame(step);
}

function resetView() {
  _zoomRL().classList.add('zooming');
  clearTimeout(_zoomFadeIn);
  const aXMin=VR.xMin, aXMax=VR.xMax, aYMin=VR.yMin, aYMax=VR.yMax;
  const tXMin=0, tXMax=5, tYMin=0, tYMax=5;
  const dur = 420; const t0 = performance.now();
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    VR.xMin = aXMin+(tXMin-aXMin)*e; VR.xMax = aXMax+(tXMax-aXMax)*e;
    VR.yMin = aYMin+(tYMin-aYMin)*e; VR.yMax = aYMax+(tYMax-aYMax)*e;
    _fastRerender();
    if (p < 1) { _panAnim = requestAnimationFrame(step); }
    else {
      VR={xMin:0,xMax:5,yMin:0,yMax:5}; rerender(); _panAnim=null;
      _zoomFadeIn = setTimeout(() => _zoomRL().classList.remove('zooming'), 50);
    }
  }
  _panAnim = requestAnimationFrame(step);
}

function screenToData(clientX, clientY) {
  const r = hm.getBoundingClientRect();
  const sx = (clientX - r.left) / r.width  * 1300;
  const sy = (clientY - r.top)  / r.height * 780;
  return { x: dataX(sx), y: dataY(sy) };
}

// Scroll wheel zoom: rAF accumulation batches rapid events into one doZoom() per frame.
// doZoom() runs the same 180ms animated zoom as button clicks, using _renderVR as origin.
let _wheelAcc = 1, _wheelPivX = null, _wheelPivY = null, _wheelRafId = null;
hm.addEventListener('wheel', e => {
  e.preventDefault();
  const r = hm.getBoundingClientRect();
  const sx = (e.clientX - r.left) / r.width * 1300;
  if (sx < P.x || sx > P.x + P.w) return;
  const pt = screenToData(e.clientX, e.clientY);
  _wheelAcc *= e.deltaY < 0 ? 1.25 : 0.8;
  _wheelAcc  = Math.max(0.5, Math.min(2.0, _wheelAcc));
  _wheelPivX = pt.x;
  _wheelPivY = pt.y;
  if (!_wheelRafId) {
    _wheelRafId = requestAnimationFrame(() => {
      doZoom(_wheelAcc, _wheelPivX, _wheelPivY, 180);
      _wheelAcc = 1;
      _wheelRafId = null;
    });
  }
}, { passive: false });

// Pan: update VR on mousemove but throttle rerender to ~20fps so the data
// inside the chart square updates smoothly without flickering label recalc.
let panState    = null;
let panThrottle = null;

hm.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const r = hm.getBoundingClientRect();
  const sx = (e.clientX - r.left) / r.width * 1300;
  if (sx < P.x || sx > P.x + P.w) return;
  panState = { clientX: e.clientX, clientY: e.clientY, vr: {...VR}, moved: false };
  hm.classList.add('panning');
  e.preventDefault();
});

const risksLayer = document.getElementById('risks-layer');

window.addEventListener('mousemove', e => {
  if (!panState) return;
  const r = hm.getBoundingClientRect();
  // Data-space delta
  const dDataX = -(e.clientX - panState.clientX) / r.width  * (panState.vr.xMax - panState.vr.xMin);
  const dDataY =  (e.clientY - panState.clientY) / r.height * (panState.vr.yMax - panState.vr.yMin);
  // Update VR then clamp to default 0–5 bounds
  VR.xMin = panState.vr.xMin + dDataX;
  VR.xMax = panState.vr.xMax + dDataX;
  VR.yMin = panState.vr.yMin + dDataY;
  VR.yMax = panState.vr.yMax + dDataY;
  const _xr = VR.xMax - VR.xMin, _yr = VR.yMax - VR.yMin;
  if (VR.xMin < 0) { VR.xMin = 0; VR.xMax = _xr; }
  if (VR.xMax > 5) { VR.xMax = 5; VR.xMin = 5 - _xr; }
  if (VR.yMin < 0) { VR.yMin = 0; VR.yMax = _yr; }
  if (VR.yMax > 5) { VR.yMax = 5; VR.yMin = 5 - _yr; }
  panState.moved = true;

  // SVG-pixel offset using clamped VR (not raw delta)
  const dxSVG = -(VR.xMin - panState.vr.xMin) / (panState.vr.xMax - panState.vr.xMin) * P.w;
  const dySVG =  (VR.yMin - panState.vr.yMin) / (panState.vr.yMax - panState.vr.yMin) * P.h;

  if (!panThrottle) {
    panThrottle = requestAnimationFrame(() => {
      // Static layer re-renders (fast: gradient + grid + axis ticks update to new VR)
      const sl = document.getElementById('static-layer');
      while (sl.firstChild) sl.removeChild(sl.firstChild);
      renderStatic();
      // Risks layer just gets a translate — zero label recalculation, zero flicker
      risksLayer.setAttribute('transform',
        'translate('+dxSVG.toFixed(2)+','+dySVG.toFixed(2)+')');
      panThrottle = null;
    });
  }
});

window.addEventListener('mouseup', () => {
  if (!panState) return;
  if (panThrottle) { cancelAnimationFrame(panThrottle); panThrottle = null; }
  risksLayer.setAttribute('transform', '');  // clear visual offset
  const wasDrag = panState.moved;
  panState = null;
  hm.classList.remove('panning');
  // Only rerender if user actually dragged — a plain click must NOT destroy
  // dot elements before the click event fires on the dot group.
  if (wasDrag) rerender();
});

// Pin pill below "Likelihood" and cat-filter button
window.addEventListener('resize', () => { positionCtrl(); positionRiskHeader(); });

// ── Page-load entrance animation ─────────────────────────────────────────────
function runEntranceAnimation() {
  const GRAPH_OFFSET = 220;   // SVG units — shifts graph to center initially
  const PAUSE_MS     = 1000;  // hold centered state before animation begins
  const P1_DUR       = 950;   // graph slides to final position
  const P2_DELAY     = 550;   // list starts expanding (graph is ~97% home)
  const P2_DUR       = 580;   // list card reveals
  const P3_DELAY     = 1080;  // rows start after list bounce settles (must be < P2_DELAY+P2_DUR)
  const STAGGER_DUR  = 980;   // total spread for all rows
  const ITEM_DUR     = 400;   // each row / dot animation

  const easeGraph   = t => 1 - (1 - t) ** 4;  // quartic: fast start, long settle
  // easeOutBack: overshoots to ~1.10x then settles — gives the overstretch bounce
  const c1 = 1.70158, c3 = c1 + 1;
  const easeList    = t => 1 + c3 * (t - 1) ** 3 + c1 * (t - 1) ** 2;

  const chartInner  = document.getElementById('chart-inner');
  const legendLayer = document.getElementById('legend-layer');
  const zoomCtrl    = document.getElementById('zoom-ctrl');
  const headerBar   = document.getElementById('risk-header-bar');

  // SVG attribute transform: translate-scale-translate anchors scale to x=730 (graph right edge)
  // This is immune to CSS-pixel vs SVG-unit mismatch that causes left-edge drift with CSS scaleX
  const SCALE_ORIGIN = P.x + P.w;  // = 730
  legendLayer.setAttribute('transform',
    `translate(${SCALE_ORIGIN} 0) scale(0 1) translate(${-SCALE_ORIGIN} 0)`);

  zoomCtrl.style.opacity  = '0';
  headerBar.style.opacity = '0';

  const sortedIds = [...RISKS]
    .sort((a, b) => parseInt(a.id.replace(/\D/g,'')) - parseInt(b.id.replace(/\D/g,'')))
    .map(r => r.id);
  const STAGGER_PER = STAGGER_DUR / sortedIds.length;

  // ── Set initial visual state NOW (before the 1s pause) ───────────────────
  const revealedRiskGroups = new Set();
  sortedIds.forEach(id => {
    const row = legendRowByRiskId[id];
    if (row) {
      row.style.opacity        = '0';
      row.style.transform      = 'translateX(-20px)';
      row.style.transformBox   = 'view-box';
      row.style.transformOrigin = '50% 50%';
    }
    const dotG = dotGroupByRiskId[id];
    if (dotG) {
      const rg = dotG.parentElement;
      if (rg && !revealedRiskGroups.has(rg)) { rg.style.opacity = '0'; revealedRiskGroups.add(rg); }
      const sw = dotG.querySelector('.dot-scale-wrapper');
      if (sw) { sw.style.transform = 'scale(0)'; sw.style.transition = 'none'; }
    }
  });
  revealedRiskGroups.clear();

  // Graph centered from the very first frame — user sees this for PAUSE_MS
  chartInner.setAttribute('transform', `translate(${GRAPH_OFFSET},0)`);

  // ── Start ticker after 1-second pause ────────────────────────────────────
  setTimeout(() => {
    const t0 = performance.now();
    let phase2CornerSwitched = false;
    let phase3Fired          = false;

    function tick(now) {
      const elapsed = now - t0;

      // Phase 1: graph slides to final position
      const p1 = Math.min(1, elapsed / P1_DUR);
      const gx = GRAPH_OFFSET * (1 - easeGraph(p1));
      if (p1 < 1) chartInner.setAttribute('transform', `translate(${gx.toFixed(2)},0)`);
      else        chartInner.removeAttribute('transform');

      // Switch to open-path border just as list starts appearing
      if (!phase2CornerSwitched && elapsed >= P2_DELAY) {
        phase2CornerSwitched = true;
        _graphAllRounded = false;
        const sl = document.getElementById('static-layer');
        while (sl.firstChild) sl.removeChild(sl.firstChild);
        renderStatic();
      }

      // Phase 2: SVG transform scale anchored to x=730 — easeOutBack gives overstretch bounce
      const p2raw = (elapsed - P2_DELAY) / P2_DUR;
      const p2    = Math.max(0, Math.min(1, p2raw));
      const sx    = Math.max(0, easeList(p2)).toFixed(4);
      legendLayer.setAttribute('transform',
        `translate(${SCALE_ORIGIN} 0) scale(${sx} 1) translate(${-SCALE_ORIGIN} 0)`);

      if (p2 > 0.4) {
        headerBar.style.transition = 'opacity 0.35s ease';
        headerBar.style.opacity    = '1';
        zoomCtrl.style.transition  = 'opacity 0.35s ease';
        zoomCtrl.style.opacity     = '1';
      }

      // Phase 3: stagger rows and dots
      if (!phase3Fired && elapsed >= P3_DELAY) {
        phase3Fired = true;
        sortedIds.forEach((id, idx) => {
          setTimeout(() => {
            const row = legendRowByRiskId[id];
            if (row) {
              row.style.transition = `opacity ${ITEM_DUR}ms cubic-bezier(0.16,1,0.3,1), transform ${ITEM_DUR}ms cubic-bezier(0.16,1,0.3,1)`;
              row.style.opacity    = '1';
              row.style.transform  = 'translateX(0px)';
              setTimeout(() => {
                // Clear ALL inline styles — leftover values override CSS hover/dim rules
                row.style.opacity = ''; row.style.transform = ''; row.style.transformBox = '';
                row.style.transformOrigin = ''; row.style.transition = '';
              }, ITEM_DUR + 60);
            }
            const dotG = dotGroupByRiskId[id];
            if (dotG) {
              const rg = dotG.parentElement;
              if (rg && !revealedRiskGroups.has(rg)) {
                revealedRiskGroups.add(rg);
                rg.style.transition = `opacity ${Math.round(ITEM_DUR * 0.55)}ms ease`;
                rg.style.opacity    = '1';
                setTimeout(() => { rg.style.opacity = ''; rg.style.transition = ''; }, ITEM_DUR + 60);
              }
              const sw = dotG.querySelector('.dot-scale-wrapper');
              if (sw) {
                sw.style.transition = 'none';
                sw.style.transform  = 'scale(0)';
                requestAnimationFrame(() => {
                  sw.style.transition = `transform ${ITEM_DUR}ms cubic-bezier(0.34,1.56,0.64,1)`;
                  sw.style.transform  = 'scale(1)';
                  // Clear inline styles after bounce so CSS hover rules take over
                  setTimeout(() => {
                    sw.style.transform = '';
                    sw.style.transition = '';
                  }, ITEM_DUR + 60);
                });
              }
            }
          }, idx * STAGGER_PER);
        });
      }

      // Keep ticking until p1 done, p2 done, AND phase3 has fired
      if (p1 < 1 || (p2raw > 0 && p2 < 1) || !phase3Fired) {
        requestAnimationFrame(tick);
      } else {
        setTimeout(() => legendLayer.removeAttribute('transform'), STAGGER_DUR + ITEM_DUR + 100);
      }
    }

    requestAnimationFrame(tick);
  }, PAUSE_MS);
}

// Renders run LAST — after all event listeners are registered so a render
// error can never prevent zoom/pan/labels from working
try { renderStatic(); renderRisks(); renderLegend(); } catch(e) { console.error('render error', e); }

// ── Extended search: tasks + people ──────────────────────────────────────────

let _peopleIndex = null;

function _buildEmail(name) {
  const parts = name.trim().split(/\s+/).filter(p => p.length > 1 && !/^\w\.$/.test(p));
  if (parts.length < 2) return null;
  const first = parts[0].replace(/[^a-zA-Z]/g, '');
  const last  = parts[parts.length - 1].replace(/[^a-zA-Z]/g, '');
  if (!first || !last) return null;
  return `${first}.${last}@allegion.com`.toLowerCase();
}

function _getPeopleIndex() {
  if (_peopleIndex) return _peopleIndex;
  _peopleIndex = new Map(); // key=normalizedName → {display, email, ownerOf[], eltOwnerOf[], managerOf[], tasksOf[]}

  function _addPerson(rawNames, confirmedEmail, role, riskId, taskRef) {
    if (!rawNames) return;
    // Split on comma or slash (handles "Bilyeu/Spitz" and "Nick Musial, Paul Bilyeu")
    const names = rawNames.split(/[,\/]/).map(n => n.trim()).filter(Boolean);
    names.forEach(name => {
      const key = name.toLowerCase();
      if (!_peopleIndex.has(key)) {
        const email = confirmedEmail && confirmedEmail.includes('@') ? confirmedEmail
                      : _buildEmail(name);
        _peopleIndex.set(key, { display: name, email: email || '', ownerOf: [], eltOwnerOf: [], managerOf: [], tasksOf: [] });
      }
      const p = _peopleIndex.get(key);
      if (confirmedEmail && !p.email) p.email = confirmedEmail;
      if (role === 'owner')   p.ownerOf.push(riskId);
      if (role === 'elt')     p.eltOwnerOf.push(riskId);
      if (role === 'manager') { if (!p.managerOf.includes(riskId)) p.managerOf.push(riskId); }
      if (role === 'task')    p.tasksOf.push(taskRef);
    });
  }

  RISKS.forEach(r => {
    if (r.owner)          _addPerson(r.owner,          r.owner_email,   'owner',   r.id);
    if (r.elt_owner)      _addPerson(r.elt_owner,       '',              'elt',     r.id);
    if (r.managers)       _addPerson(r.managers,        r.manager_email, 'manager', r.id);
    if (r.other_managers) _addPerson(r.other_managers,  '',              'manager', r.id);
  });
  Object.entries(TASKS).forEach(([riskId, tasks]) => {
    tasks.forEach(t => {
      const ref = { riskId, taskName: t.task, taskStatus: t.task_status };
      if (t.responsible) _addPerson(t.responsible, '', 'task', riskId, ref);
      if (t.managers)    _addPerson(t.managers,    '', 'task', riskId, ref);
    });
  });
  return _peopleIndex;
}

function _hlHtml(text, query) {
  if (!query || !text) return text || '';
  const lo = text.toLowerCase(), qi = lo.indexOf(query.toLowerCase());
  if (qi < 0) return text;
  return text.slice(0, qi) +
    `<span style="color:#FF671F;font-weight:600">${text.slice(qi, qi + query.length)}</span>` +
    text.slice(qi + query.length);
}

function _srpStatusClass(status) {
  if (!status) return 'tss-not-started';
  const s = status.toLowerCase();
  if (s.includes('complete'))  return 'tss-completed';
  if (s.includes('progress'))  return 'tss-in-progress';
  if (s.includes('monitor'))   return 'tss-monitoring';
  if (s.includes('risk'))      return 'tss-at-risk';
  return 'tss-not-started';
}

function _runExtendedSearch(query) {
  const panel = document.getElementById('search-results-panel');
  const q = query.toLowerCase().trim();
  if (q.length < 2) { panel.classList.remove('srp-visible'); return; }

  // Task search — quick panel matches NAMES only (definition matches shown in full modal)
  const taskMatches = [];
  Object.entries(TASKS).forEach(([riskId, tasks]) => {
    tasks.forEach(t => {
      if (!t.task) return;
      if ((t.task||'').toLowerCase().includes(q))
        taskMatches.push({ riskId, t });
    });
  });

  // People search — match display name
  const idx = _getPeopleIndex();
  const peopleMatches = [...idx.values()].filter(p => p.display.toLowerCase().includes(q));

  if (!taskMatches.length && !peopleMatches.length) { panel.classList.remove('srp-visible'); return; }

  // Build tasks section
  const MAX = 5;
  const tasksEl  = document.getElementById('srp-tasks-list');
  const peopleEl = document.getElementById('srp-people-list');
  document.getElementById('srp-tasks-section').style.display  = taskMatches.length  ? '' : 'none';
  document.getElementById('srp-people-section').style.display = peopleMatches.length ? '' : 'none';

  tasksEl.innerHTML = taskMatches.slice(0, MAX).map(({ riskId, t }) => {
    const risk = RISKS.find(r => r.id === riskId);
    const col  = risk ? catColor(risk.category || '') : '#666';
    return `<div class="srp-row" data-srp-task-risk="${riskId}" data-srp-task-name="${(t.task||'').replace(/"/g,'&quot;')}">
      <span class="srp-row-name">${_hlHtml(t.task, query)}</span>
      <div class="srp-row-right">
        <span class="srp-risk-badge" style="color:${col}">${riskId}</span>
        ${t.task_status ? `<span class="srp-status-badge ${_srpStatusClass(t.task_status)}">${t.task_status}</span>` : ''}
      </div>
    </div>`;
  }).join('');
  const qEnc = query.replace(/"/g, '&quot;');
  if (taskMatches.length > MAX)
    tasksEl.innerHTML += `<div class="srp-more srp-more-link" onclick="openSearchModal('${qEnc}')">Show all ${taskMatches.length} tasks →</div>`;

  peopleEl.innerHTML = peopleMatches.slice(0, MAX).map(p =>
    `<div class="srp-row" data-srp-person="${p.display.replace(/"/g,'&quot;')}">
      <span class="material-symbols-outlined" style="font-size:16px;color:var(--allegion-muted);font-family:'Material Symbols Outlined';font-weight:300;font-variation-settings:'wght' 300">person</span>
      <span class="srp-row-name">${_hlHtml(p.display, query)}</span>
    </div>`
  ).join('');
  if (peopleMatches.length > MAX)
    peopleEl.innerHTML += `<div class="srp-more srp-more-link" onclick="openSearchModal('${qEnc}')">Show all ${peopleMatches.length} people →</div>`;

  // Position panel to the LEFT of the search bar (over chart area, not risk list)
  const bar = document.getElementById('rh-search-bar');
  if (bar) {
    const rect = bar.getBoundingClientRect();
    panel.style.top  = (rect.bottom + 6) + 'px';
    panel.style.right = (window.innerWidth - rect.left + 8) + 'px';
  }
  panel.classList.add('srp-visible');
}

// Delegated click handler for search results panel
document.getElementById('search-results-panel').addEventListener('click', e => {
  const row = e.target.closest('.srp-row');
  if (!row) return;

  if (row.dataset.srpTaskRisk) {
    const risk  = RISKS.find(r => r.id === row.dataset.srpTaskRisk);
    const query = document.getElementById('rh-search-input').value.trim();
    if (risk) openModal([risk], 0, 3, row.dataset.srpTaskName || '', query);
    closeSearch();
    return;
  }
  if (row.dataset.srpPerson !== undefined) {
    openPersonModal(row.dataset.srpPerson);
    return;
  }
});

// ── Person profile modal ──────────────────────────────────────────────────────

function openPersonModal(personName) {
  const idx   = _getPeopleIndex();
  const key   = personName.toLowerCase();
  const p     = idx.get(key);
  if (!p) return;

  const content = document.getElementById('person-modal-content');

  function _riskRow(riskId, onClick) {
    const r = RISKS.find(r => r.id === riskId);
    if (!r) return '';
    const col = catColor(r.category || '') || '#666';
    return `<div class="pm-row" onclick="${onClick}">
      <span class="pm-row-badge" style="color:${col}">${r.id}</span>
      <span class="pm-row-name">${r.name}</span>
    </div>`;
  }

  const ownerRows   = [...new Set(p.ownerOf)].map(id   => _riskRow(id, `openModal([RISKS.find(r=>r.id==='${id}')],0,2);closePersonModal()`)).join('');
  const eltRows     = [...new Set(p.eltOwnerOf)].map(id => _riskRow(id, `openModal([RISKS.find(r=>r.id==='${id}')],0,2);closePersonModal()`)).join('');
  const managerRows = [...new Set(p.managerOf)].map(id  => _riskRow(id, `openModal([RISKS.find(r=>r.id==='${id}')],0,2);closePersonModal()`)).join('');

  const taskRows = p.tasksOf.map(ref => {
    const risk = RISKS.find(r => r.id === ref.riskId);
    const col  = risk ? catColor(risk.category || '') : '#666';
    return `<div class="pm-row" onclick="openModal([RISKS.find(r=>r.id==='${ref.riskId}')],0,3);closePersonModal()">
      <span class="pm-row-badge" style="color:${col}">${ref.riskId}</span>
      <span class="pm-row-name">${ref.taskName || '—'}</span>
    </div>`;
  }).slice(0, 12).join('');

  const emailHtml = p.email
    ? `<a class="pm-email-link" href="mailto:${p.email}">
        <span class="material-symbols-outlined" style="font-size:14px;font-family:'Material Symbols Outlined';font-weight:300;font-variation-settings:'wght' 300">mail</span>
        ${p.email}
       </a>`
    : '';

  content.innerHTML = `
    <div class="pm-name">${p.display}</div>
    ${emailHtml}
    ${ownerRows  ? `<div class="pm-section-head">Risk Owner</div>${ownerRows}` : ''}
    ${eltRows    ? `<div class="pm-section-head">ELT Owner</div>${eltRows}` : ''}
    ${managerRows? `<div class="pm-section-head">Managing</div>${managerRows}` : ''}
    ${taskRows   ? `<div class="pm-section-head">Mitigation Tasks</div>${taskRows}` : ''}
    ${!ownerRows && !eltRows && !managerRows && !taskRows
      ? `<div class="pm-no-data">No linked risks or tasks found.</div>` : ''}
  `;

  document.getElementById('person-modal').classList.add('open');
}

function closePersonModal() {
  document.getElementById('person-modal').classList.remove('open');
}

// ── Task detail modal ─────────────────────────────────────────────────────────

let _tdmRiskId   = null;
let _tdmTaskIdx  = 0;

function _tdmTaskList() {
  const r = RISKS.find(r => r.id === _tdmRiskId);
  return r ? _sortedTasks(r) : [];
}

function _buildTaskDetailHTML(t, riskId) {
  const risk    = RISKS.find(r => r.id === riskId);
  const col     = risk ? catColor(risk.category || '') : '#FF671F';
  const trend   = _trendLabel(t.trend || '');
  const pct     = t.progress   != null ? Math.min(100, Math.max(0, t.progress)) : null;
  const sevNum  = t.severity   != null ? parseFloat(t.severity).toFixed(1)   : null;
  const likeNum = t.likelihood != null ? parseFloat(t.likelihood).toFixed(1) : null;

  const stats = [
    sevNum   ? { label: 'Severity',          value: sevNum }      : null,
    likeNum  ? { label: 'Likelihood',         value: likeNum }     : null,
    t.responsible     ? { label: 'Responsible',      value: t.responsible,     wide: true  } : null,
    t.target_date     ? { label: 'Target Date',       value: t.target_date }    : null,
    t.start_date      ? { label: 'Start Date',        value: t.start_date }     : null,
    trend.label       ? { label: 'Trend',             value: `<span style="${trend.cls}">${trend.icon} ${trend.label}</span>`, raw: true } : null,
    t.managers        ? { label: 'Manager(s)',         value: t.managers,        wide: true  } : null,
    t.mitigation_type ? { label: 'Mitigation Type',   value: t.mitigation_type } : null,
    t.gov_compliance  ? { label: 'Gov/Compliance',    value: t.gov_compliance }  : null,
    t.status          ? { label: 'Status',             value: t.status }         : null,
  ].filter(Boolean);

  const statsHtml = stats.length ? `
    <div class="tdm-stats">
      ${stats.map(s => `<div class="tdm-stat">
        <div class="tdm-stat-label">${s.label}</div>
        <div class="tdm-stat-value${s.wide ? ' wide' : ''}">${s.value}</div>
      </div>`).join('')}
    </div>` : '';

  const progressHtml = pct != null ? `
    <div class="tdm-progress-section">
      <div class="tdm-progress-label"><span>Completion</span><span class="tdm-progress-pct">${pct}%</span></div>
      <div class="tdm-progress-track">
        <div class="tdm-progress-fill ${_taskProgressFillClass(t.task_status)}" style="width:${pct}%"></div>
      </div>
    </div>` : '';

  const sec = (label, text) => text ? `
    <div class="tdm-section">
      <div class="tdm-section-label">${label}</div>
      <div class="tdm-section-text">${text}</div>
    </div>` : '';

  return `
    <div class="tdm-risk-line">
      <span class="tdm-risk-badge" style="color:${col}">${riskId}</span>
      ${risk ? `<span class="tdm-risk-name">${risk.name}</span>` : ''}
    </div>
    <div class="tdm-header">
      <div class="tdm-task-name">${t.task}</div>
      ${t.task_status ? `<span class="tdm-status-badge ${_taskStatusClass(t.task_status)}">${t.task_status}</span>` : ''}
    </div>
    ${progressHtml}${statsHtml}
    ${sec('Definition', t.definition)}
    ${sec('Mitigation Strategy', t.mitigation_strategy)}
    ${sec('Trend Analysis', t.trend_analysis)}`;
}

function _updateTdmScroll() {
  // Only enable scroll if content is genuinely taller than the viewport (>4px tolerance
  // prevents spurious scrollbars from sub-pixel rounding differences)
  const vp = document.getElementById('task-detail-viewport');
  if (!vp) return;
  vp.style.overflowY = (vp.scrollHeight > vp.clientHeight + 4) ? 'auto' : 'hidden';
}

function _updateTdmArrows() {
  const tasks = _tdmTaskList();
  const prev  = document.getElementById('tdm-prev');
  const next  = document.getElementById('tdm-next');
  const ctr   = document.getElementById('tdm-counter');
  prev.disabled = _tdmTaskIdx <= 0;
  next.disabled = _tdmTaskIdx >= tasks.length - 1;
  ctr.textContent = tasks.length > 1 ? `${_tdmTaskIdx + 1} / ${tasks.length}` : '';
  // Hide nav entirely if only one task
  document.getElementById('task-detail-nav').style.display = tasks.length > 1 ? '' : 'none';
}

function _renderTdmContent(direction) {
  const tasks   = _tdmTaskList();
  const t       = tasks[_tdmTaskIdx];
  if (!t) return;
  const content = document.getElementById('task-detail-content');

  if (!direction) {
    // Initial open — no animation
    content.style.cssText = '';
    content.innerHTML = _buildTaskDetailHTML(t, _tdmRiskId);
    requestAnimationFrame(() => _updateTdmScroll());
  } else {
    const outX = direction === 'next' ? '-36px' : '36px';
    const inX  = direction === 'next' ?  '36px' : '-36px';
    // Slide out
    content.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
    content.style.transform  = `translateX(${outX})`;
    content.style.opacity    = '0';
    setTimeout(() => {
      content.innerHTML = _buildTaskDetailHTML(t, _tdmRiskId);
      content.scrollTop = 0;
      // Snap to entry position (no transition)
      content.style.transition = 'none';
      content.style.transform  = `translateX(${inX})`;
      content.style.opacity    = '0';
      void content.offsetWidth;
      // Slide in
      content.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.22s ease';
      content.style.transform  = 'translateX(0)';
      content.style.opacity    = '1';
      // Clear inline transform after animation completes, then re-check scroll need
      setTimeout(() => {
        content.style.cssText = '';
        _updateTdmScroll();
      }, 320);
    }, 170);
  }
  _updateTdmArrows();
}

function openTaskDetail(riskId, taskName) {
  _tdmRiskId  = riskId;
  const tasks = _tdmTaskList();
  _tdmTaskIdx = Math.max(0, tasks.findIndex(t => t.task === taskName));
  _renderTdmContent(null);
  document.getElementById('task-detail-modal').classList.add('open');
}

function prevTaskDetail() {
  if (_tdmTaskIdx <= 0) return;
  _tdmTaskIdx--;
  _renderTdmContent('prev');
}

function nextTaskDetail() {
  if (_tdmTaskIdx >= _tdmTaskList().length - 1) return;
  _tdmTaskIdx++;
  _renderTdmContent('next');
}

function closeTaskDetail() {
  document.getElementById('task-detail-modal').classList.remove('open');
}

function _closeSearchPanel() {
  document.getElementById('search-results-panel').classList.remove('srp-visible');
}

// ── Full search modal ─────────────────────────────────────────────────────────

let _smcSearchContent = false; // when true, also searches definition/strategy/analysis

function _toggleSmcContent() {
  _smcSearchContent = !_smcSearchContent;
  const btn = document.getElementById('smc-content-toggle');
  btn.classList.toggle('smc-toggle-on', _smcSearchContent);
  _renderSearchModalResults(document.getElementById('search-modal-input').value.trim());
}

function _smcAllTaskMatches(q) {
  const matches = [];
  Object.entries(TASKS).forEach(([riskId, tasks]) => {
    tasks.forEach(t => {
      if (!t.task) return;
      const nameMatch = (t.task||'').toLowerCase().includes(q);
      const defMatch  = _smcSearchContent && !nameMatch &&
                        !!(t.definition||'').toLowerCase().includes(q);
      if (nameMatch || defMatch) matches.push({ riskId, t, nameMatch, defMatch });
    });
  });
  return matches;
}

function _smcAllPeopleMatches(q) {
  const idx = _getPeopleIndex();
  return [...idx.values()].filter(p => p.display.toLowerCase().includes(q));
}

function _renderSearchModalResults(query) {
  const content = document.getElementById('search-modal-content');
  const q = (query || '').toLowerCase().trim();

  if (!q) {
    content.innerHTML = `
      <div class="smc-col" style="display:flex;align-items:center;justify-content:center">
        <div class="smc-empty">Start typing to search tasks and people…</div>
      </div>
      <div class="smc-col"></div>`;
    return;
  }

  const taskMatches   = _smcAllTaskMatches(q);
  const peopleMatches = _smcAllPeopleMatches(q);

  // ── Tasks column ──────────────────────────────────────────────────────────
  let tasksHtml = `<div class="smc-section-head">Tasks${taskMatches.length ? ` (${taskMatches.length})` : ''}</div>`;
  if (taskMatches.length) {
    tasksHtml += taskMatches.map(({ riskId, t, nameMatch, defMatch }) => {
      const risk = RISKS.find(r => r.id === riskId);
      const col  = risk ? catColor(risk.category || '') : '#666';
      let snippet = '';
      if (!nameMatch && defMatch && t.definition) {
        const di    = (t.definition||'').toLowerCase().indexOf(q);
        const start = Math.max(0, di - 35);
        const end   = Math.min(t.definition.length, di + q.length + 55);
        const raw   = (start > 0 ? '…' : '') + t.definition.slice(start, end) + (end < t.definition.length ? '…' : '');
        snippet = `<div class="smc-snippet">${_hlHtml(raw, query)}</div>`;
      }
      const safeTask = (t.task||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="smc-row" onclick="openModal([RISKS.find(r=>r.id==='${riskId}')],0,3,'${safeTask}',document.getElementById('search-modal-input').value.trim());closeSearchModal()">
        <div style="flex:1;min-width:0">
          <div class="smc-name">${_hlHtml(t.task, query)}</div>${snippet}
        </div>
        <div class="smc-right">
          <span class="smc-risk-badge" style="color:${col}">${riskId}</span>
          ${t.task_status ? `<span class="smc-status-badge ${_srpStatusClass(t.task_status)}">${t.task_status}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    tasksHtml += `<div class="smc-empty">No matching tasks</div>`;
  }

  // ── People column ─────────────────────────────────────────────────────────
  let peopleHtml = `<div class="smc-section-head">People${peopleMatches.length ? ` (${peopleMatches.length})` : ''}</div>`;
  if (peopleMatches.length) {
    peopleHtml += peopleMatches.map(p =>
      `<div class="smc-row" onclick="openPersonModal('${p.display.replace(/'/g,"\\'")}');closeSearchModal()">
        <span class="material-symbols-outlined" style="font-size:18px;color:var(--allegion-muted);font-family:'Material Symbols Outlined';font-weight:300;font-variation-settings:'wght' 300;flex-shrink:0;margin-top:1px">person</span>
        <span class="smc-name">${_hlHtml(p.display, query)}</span>
      </div>`
    ).join('');
  } else {
    peopleHtml += `<div class="smc-empty">No matching people</div>`;
  }

  content.innerHTML = `
    <div class="smc-col">${tasksHtml}</div>
    <div class="smc-col">${peopleHtml}</div>`;
}

function openSearchModal(query) {
  const modal = document.getElementById('search-modal');
  const input = document.getElementById('search-modal-input');
  // Reset content toggle to off each time modal opens
  _smcSearchContent = false;
  const toggleBtn = document.getElementById('smc-content-toggle');
  if (toggleBtn) toggleBtn.classList.remove('smc-toggle-on');
  input.value = query || '';
  _renderSearchModalResults(query || '');
  modal.classList.add('open');
  setTimeout(() => input.focus(), 80);
}

function closeSearchModal() {
  document.getElementById('search-modal').classList.remove('open');
}

// Bidirectional sync: modal input ↔ main search input
document.getElementById('search-modal-input').addEventListener('input', e => {
  const q = e.target.value;
  // Sync to main bar
  document.getElementById('rh-search-input').value = q;
  // Update risk list highlights + quick panel + modal results
  applySearchFilter(q.trim());
  _runExtendedSearch(q.trim());
  _renderSearchModalResults(q.trim());
});

// close search modal when person modal or risk modal opens
function _syncModalSearchIfOpen(query) {
  const modal = document.getElementById('search-modal');
  if (!modal || !modal.classList.contains('open')) return;
  document.getElementById('search-modal-input').value = query;
  _renderSearchModalResults(query);
}
</script>
</body>
