<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Heat Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300..500,0,0&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #e2f1fc; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
    #wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 6px; }
    svg { width: 100%; height: 100%; }
    .risk-group { cursor: pointer; }
    .risk-group:hover .r-dot { opacity: 0.7; }
    /* ── Allegion grey — solid, no transparency ─────────────────────────────── */
    :root {
      --allegion-grey: #2D2D2E; --allegion-border: #3F3F40; --allegion-text: #E8EAED; --allegion-muted: #A8A8AA;
      --antenna: Antenna, Roboto, 'Segoe UI', Arial, sans-serif;
    }

    /* ── Tooltip (2× size for iframe legibility) ───────────────────────────── */
    #tooltip {
      position: fixed; z-index: 999; pointer-events: none;
      background: rgba(28, 28, 30, 0.68);
      backdrop-filter: blur(15px) saturate(180%) brightness(1.06);
      -webkit-backdrop-filter: blur(15px) saturate(180%) brightness(1.06);
      color: var(--allegion-text);
      border: 1px solid rgba(255,255,255,0.14);
      border-top-color: rgba(255,255,255,0.44);
      border-radius: 20px; padding: 20px 28px; font-size: 26px;
      max-width: 580px; line-height: 1.6;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 1px 0 0 rgba(255,255,255,0.09),
        inset -1px 0 0 rgba(255,255,255,0.09),
        inset 0 -1px 0 rgba(0,0,0,0.24),
        0 12px 40px rgba(0,0,0,0.55);
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    #tooltip.tt-visible {
      opacity: 1;
      transition: opacity 0.38s ease;
    }
    #tooltip::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 19px; pointer-events: none;
      background:
        radial-gradient(ellipse 90% 42% at 50% 0%,
          rgba(255,255,255,0.15) 0%,
          rgba(255,255,255,0.04) 55%,
          transparent 80%),
        linear-gradient(90deg,
          rgba(255,255,255,0.07) 0px, transparent 24px,
          transparent calc(100% - 80px), rgba(255,255,255,0.07) 100%);
      mix-blend-mode: screen;
    }
    .tt-row { display: flex; gap: 12px; align-items: baseline; }
    .tt-id  { font-weight: 700; color: #fff; font-size: 26px; white-space: nowrap; }
    .tt-nm  { color: #fff; font-size: 23px; }
    .tt-div { margin: 10px 0 8px; border-top: 2px solid var(--allegion-border); }
    .tt-stat { font-size: 22px; color: #ccd6ff; }
    .tt-alert {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 19px; font-weight: 700; padding: 4px 12px;
      border-radius: 999px; margin-top: 8px;
    }
    .tt-alert.overdue { background: rgba(229,57,53,0.22); color: #ef9a9a; border: 1px solid rgba(229,57,53,0.45); }
    .tt-alert.health  { background: rgba(255,152,0,0.22);  color: #ffcc80; border: 1px solid rgba(255,152,0,0.45); }
    .tt-val  { color: #ffd060; font-weight: 600; }

    /* ── Status ring pulse ───────────────────────────────────────────────────── */
    @keyframes statusRingPulse {
      0%, 100% { transform: scale(1);    opacity: 0.65; filter: drop-shadow(0 0 2px var(--ring-glow)); }
      50%       { transform: scale(1.22); opacity: 1;    filter: drop-shadow(0 0 7px var(--ring-glow)); }
    }
    .status-ring {
      transform-box: fill-box; transform-origin: center;
      animation: statusRingPulse 2.6s ease-in-out infinite;
    }

    /* ── Dot spin animation ─────────────────────────────────────────────────── */
    @keyframes dotSpin {
      0%   { transform: rotate(0deg);   }
      62%  { transform: rotate(360deg); }  /* spin with ease */
      100% { transform: rotate(360deg); }  /* hold ~1s */
    }
    .dot-spin { transform-box: fill-box; transform-origin: center; }
    .dot-hover:hover .dot-spin,
    .dot-force-highlight .dot-spin {
      animation: dotSpin 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
    }
    .dot-scale-wrapper {
      transform-box: fill-box; transform-origin: center;
      transition: transform 0.15s;
      will-change: transform, opacity;  /* no filter here — keeps compositor path clean */
    }
    .dot-hover:hover .dot-scale-wrapper,
    .dot-force-highlight .dot-scale-wrapper { transform: scale(1.5); }
    .dot-hover { filter: drop-shadow(-1.8px 1.8px 1.8px rgba(0,0,0,0.85)); transition: filter 0.15s;
                 transform-box: fill-box; transform-origin: center; }
    .dot-hover:hover, .dot-force-highlight { filter: drop-shadow(-6.75px 6.75px 6.75px rgba(0,0,0,0.85)); }
    /* Scope to risks-layer — much cheaper style recalc than body-level class */
    #risks-layer.filter-animating .dot-hover { filter: none !important; transition: none !important; }

    /* ── Category filter key card ───────────────────────────────────────────── */
    .legend-row-cat-off { opacity: 0.25 !important; pointer-events: none; }

    /* ── Legend row hover ───────────────────────────────────────────────────── */
    .legend-row { cursor: pointer; transition: opacity 0.15s, transform 0.15s; transform-box: fill-box; transform-origin: left center; }
    .legend-row-hl { transform: scale(1.08); }
    .legend-dimmed .legend-row:not(.legend-row-hl) { opacity: 0.25; }
    /* Chevron indicator */
    .legend-chevron { transform-box: fill-box; transform-origin: center; transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1); }
    .legend-row-hl .legend-chevron { transform: rotate(180deg); }

    /* ── Risk detail modal ──────────────────────────────────────────────────── */
    #risk-modal {
      display: none; position: fixed; inset: 0; z-index: 1000;
      align-items: center; justify-content: center;
      /* No opacity animation here — keeping opacity:1 so backdrop-filter on the
         modal box can reach through to the chart content below */
    }
    #risk-modal.open    { display: flex; }
    #risk-modal.closing { display: flex; }
    #risk-modal.open    #risk-modal-overlay { animation: modalBackdropIn  0.22s cubic-bezier(0.16,1,0.3,1) both; }
    #risk-modal.closing #risk-modal-overlay { animation: modalBackdropOut 0.20s cubic-bezier(0.4,0,1,1)    both; }
    #risk-modal.open    #risk-modal-box { animation: modalBoxIn  0.34s cubic-bezier(0.16,1,0.3,1) both; }
    #risk-modal.closing #risk-modal-box { animation: modalBoxOut 0.18s cubic-bezier(0.4,0,1,1)    both; }
    #risk-modal-overlay {
      position: fixed; background: rgba(0,0,0,0.45); cursor: pointer;
      /* left/top/width/height/border-radius set by positionRiskHeader() */
    }
    #risk-modal-box {
      position: relative; z-index: 1; box-sizing: border-box;
      background: rgba(28, 28, 30, 0.68);
      backdrop-filter: blur(15px) saturate(180%) brightness(1.06);
      -webkit-backdrop-filter: blur(15px) saturate(180%) brightness(1.06);
      color: var(--allegion-text);
      border: 1px solid rgba(255,255,255,0.14);
      border-top-color: rgba(255,255,255,0.44);  /* bright top — thick glass edge */
      border-radius: 20px; padding: 36px 44px; width: 90%; max-width: 740px;
      max-height: calc(100vh - 60px); display: flex; flex-direction: column; overflow: hidden;
      transition: width 0.35s cubic-bezier(0.16,1,0.3,1), max-width 0.35s cubic-bezier(0.16,1,0.3,1);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),    /* inner top rim */
        inset 1px 0 0 rgba(255,255,255,0.09),    /* left side glint */
        inset -1px 0 0 rgba(255,255,255,0.09),   /* right side glint */
        inset 0 -1px 0 rgba(0,0,0,0.24),         /* inner bottom shadow */
        0 24px 64px rgba(0,0,0,0.58);             /* outer depth */
      font-family: 'Roboto', sans-serif;
    }
    /* Specular arc — simulates light catching the top curved surface of the glass */
    #risk-modal-box::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 19px; pointer-events: none;
      background:
        radial-gradient(ellipse 90% 42% at 50% 0%,
          rgba(255,255,255,0.15) 0%,
          rgba(255,255,255,0.04) 55%,
          transparent 80%),
        linear-gradient(90deg,
          rgba(255,255,255,0.07) 0px, transparent 24px,
          transparent calc(100% - 80px), rgba(255,255,255,0.07) 100%);
      mix-blend-mode: screen;
    }
    /* Tasks tab width is set dynamically via JS inline style based on task count */
    #risk-modal-close {
      position: absolute; top: 16px; right: 20px; background: none; border: none;
      color: var(--allegion-muted); font-size: 28px; cursor: pointer; line-height: 1;
      transition: color 0.18s;
    }
    #risk-modal-close:hover { color: #E53935; }
    #risk-modal-id   { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    #risk-modal-name { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    /* ── Overdue indicators in modal ────────────────────────────────────────── */
    .mpn-btn.tab-overdue::after {
      content: ''; display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #E53935; margin-left: 6px;
      vertical-align: middle; box-shadow: 0 0 6px rgba(229,57,53,0.7);
    }
    .modal-value.overdue-date { color: #ef5350 !important; font-weight: 600; }
    .overdue-tri {
      display: inline-flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; padding: 0;
      margin-left: 8px; vertical-align: middle; position: relative;
    }
    .overdue-tri svg { display: block; }
    .overdue-tip {
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: rgba(183,28,28,0.95); color: #ffcdd2;
      font-family: var(--antenna); font-size: 13px; font-weight: 500;
      padding: 8px 14px; border-radius: 10px; white-space: nowrap;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 10;
    }
    .overdue-tri:hover .overdue-tip,
    .overdue-tri:focus .overdue-tip { opacity: 1; pointer-events: auto; }
    .overdue-tip::after {
      content: ''; position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent; border-top-color: rgba(183,28,28,0.95);
    }

    /* ── Page navigation strip ──────────────────────────────────────────────── */
    #modal-page-nav {
      display: flex; gap: 2px; margin-bottom: 20px;
      border-bottom: 1px solid var(--allegion-border);
      position: relative; /* anchor for the sliding indicator */
    }
    .mpn-btn {
      background: none; border: none; border-bottom: none;
      padding: 6px 14px 8px; cursor: pointer;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      font-family: var(--antenna); color: var(--allegion-muted);
      transition: color 0.15s;
    }
    .mpn-btn:hover { color: #E8EAED; }
    .mpn-btn.active { color: var(--mpn-color, #FF671F); }
    /* Sliding indicator line */
    #mpn-indicator {
      position: absolute; bottom: -1px; height: 2px;
      background: var(--mpn-color, #FF671F);
      transition: left 0.28s cubic-bezier(0.16,1,0.3,1), width 0.28s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none;
    }
    #mpn-indicator.instant { transition: none; }
    /* ── Sort bar — slides out from behind Tasks tab ─────────────────────────── */
    #task-sort-bar {
      display: flex; align-items: center; gap: 5px;
      max-width: 0; overflow: hidden; opacity: 0; white-space: nowrap;
      padding-left: 0;
      transition: max-width 0.42s cubic-bezier(0.16,1,0.3,1),
                  opacity 0.22s ease,
                  padding-left 0.42s cubic-bezier(0.16,1,0.3,1);
    }
    #task-sort-bar.visible {
      max-width: 300px; opacity: 1; padding-left: 10px;
    }
    .sort-btn {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      font-family: var(--antenna); padding: 3px 10px; border-radius: 999px; cursor: pointer;
      background: rgba(255,255,255,0.07); color: var(--allegion-muted);
      border: 1px solid rgba(255,255,255,0.1);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .sort-btn:hover { background: rgba(255,255,255,0.13); color: var(--allegion-text); }
    .sort-btn.active {
      background: rgba(255,255,255,0.12); color: var(--mpn-color, #FF671F);
      border-color: rgba(255,255,255,0.18);
    }
    /* ── Page area ───────────────────────────────────────────────────────────── */
    /* Make modal-tab-content fill remaining box height and allow page-area to scroll */
    #modal-tab-content {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0;
    }
    #modal-page-area {
      flex: 1; overflow-y: auto; min-height: 0; padding: 2px 0;
    }
    #modal-page-area::-webkit-scrollbar { width: 5px; }
    #modal-page-area::-webkit-scrollbar-track { background: transparent; }
    #modal-page-area::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2); border-radius: 999px;
    }
    @keyframes pageAreaIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #modal-page-area.page-in { animation: pageAreaIn 0.22s cubic-bezier(0.16,1,0.3,1) both; }
    /* ── Data grid (risk scores) ─────────────────────────────────────────────── */
    .modal-data-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px;
    }
    .modal-data-cell {
      background: rgba(255,255,255,0.05); border-radius: 10px;
      padding: 10px 12px; text-align: center;
    }
    .modal-data-cell .modal-label { margin-bottom: 4px; }
    .modal-data-cell .modal-value { font-size: 22px; font-weight: 700; color: #fff; }
    /* ── Section subheader ───────────────────────────────────────────────────── */
    .modal-section-head {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.28); margin: 18px 0 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .modal-section-head::after {
      content: ''; flex: 1; height: 1px; background: var(--allegion-border);
    }
    /* ── Progress bar ────────────────────────────────────────────────────────── */
    .modal-progress-track {
      height: 6px; background: rgba(255,255,255,0.1); border-radius: 999px;
      overflow: hidden; margin-top: 6px;
    }
    .modal-progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #8BC34A, #FF9800);
      transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    /* ── Task cards (Tasks tab) ──────────────────────────────────────────────── */
    .tasks-scroll-row {
      display: flex; flex-direction: row; gap: 14px;
      overflow-x: auto; overflow-y: visible;
      /* Extra padding gives the pulse box-shadow room on all sides before the
         scroll container clips it */
      padding: 8px 10px 18px 4px;
      align-items: flex-start;
    }
    /* Scrollbar — thick enough to grab, thin enough to stay subtle */
    .tasks-scroll-row::-webkit-scrollbar { height: 7px; }
    .tasks-scroll-row::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 999px; }
    .tasks-scroll-row::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.28); border-radius: 999px;
    }
    .tasks-scroll-row::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.45); }
    .task-card {
      flex: 0 0 340px;          /* fixed width — doesn't grow or shrink */
      background: rgba(255,255,255,0.05); border: 1px solid var(--allegion-border);
      border-radius: 12px; padding: 18px 20px; box-sizing: border-box;
    }
    .task-card-header {
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px;
      flex-wrap: wrap;          /* lets long badge drop to next line if needed */
    }
    .task-card-name {
      flex: 1; min-width: 120px; font-size: 16px; font-weight: 600;
      color: var(--allegion-text); line-height: 1.4;
    }
    .task-status-badge {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; border-radius: 999px; padding: 4px 11px;
      font-family: var(--antenna); white-space: nowrap;
    }
    .tss-completed   { background: rgba(139,195,74,0.18);  color: #8BC34A; }
    .tss-in-progress { background: rgba(255,152,0,0.18);   color: #FF9800; }
    .tss-monitoring  { background: rgba(100,180,255,0.18); color: #74B8F5; }
    .tss-at-risk     { background: rgba(229,57,53,0.18);   color: #EF5350; }
    .tss-not-started { background: rgba(168,168,170,0.14); color: var(--allegion-muted); }
    .task-progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .task-progress-label { font-size: 14px; color: var(--allegion-muted); white-space: nowrap; }
    .task-meta { display: grid; grid-template-columns: auto 1fr; gap: 5px 14px; margin-bottom: 12px; }
    .task-meta-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--allegion-muted); font-family: var(--antenna); white-space: nowrap;
      padding-top: 2px;
    }
    .task-meta-value { font-size: 15px; color: var(--allegion-text); line-height: 1.5; }
    .task-detail-block {
      border-top: 1px solid var(--allegion-border); margin-top: 10px; padding-top: 10px;
    }
    /* In-card content tabs: Strategy / Analysis / Definition */
    .task-content-tabs { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
    .tct-btn {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      font-family: var(--antenna); padding: 4px 12px; border-radius: 999px; border: none;
      background: rgba(255,255,255,0.07); color: var(--allegion-muted);
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .tct-btn:hover { background: rgba(255,255,255,0.12); color: var(--allegion-text); }
    .tct-btn.active {
      background: rgba(255,255,255,0.13);
      color: var(--mpn-color, #FF671F);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .task-content-panel {
      font-size: 14px; color: rgba(232,234,237,0.82); line-height: 1.65;
      max-height: 160px; overflow-y: auto;
    }
    .task-content-panel::-webkit-scrollbar { width: 4px; }
    .task-content-panel::-webkit-scrollbar-track { background: transparent; }
    .task-content-panel::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2); border-radius: 999px;
    }
    .task-trend-icon { font-size: 16px; line-height: 1; margin-right: 4px; }
    .task-no-data {
      text-align: center; color: var(--allegion-muted); font-size: 16px;
      padding: 32px 0;
    }
    /* ── Task card expand button — fixed in top-right corner, header padded to avoid overlap ─ */
    .task-expand-btn {
      position: absolute; top: 8px; right: 8px;
      width: 26px; height: 26px; border-radius: 7px; border: none;
      background: rgba(255,255,255,0.08); color: var(--allegion-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; z-index: 1;
    }
    .task-expand-btn:hover { background: rgba(255,255,255,0.18); color: var(--allegion-text); }
    /* ── Task detail modal ───────────────────────────────────────────────── */
    #task-detail-modal {
      display: none; position: fixed; inset: 0; z-index: 1100;
      align-items: center; justify-content: center;
    }
    #task-detail-modal.open { display: flex; }
    #task-detail-overlay { position: fixed; inset: 0; z-index: 0; background: rgba(0,0,0,0.5); cursor: pointer; }
    #task-detail-box {
      position: relative; z-index: 1; box-sizing: border-box;
      background: rgba(22,22,24,0.80);
      backdrop-filter: blur(20px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(1.08);
      border: 1px solid rgba(255,255,255,0.14); border-top-color: rgba(255,255,255,0.44);
      border-radius: 20px; padding: 0;
      max-width: min(92vw, 900px); width: min(92vw, 900px);
      max-height: calc(100vh - 60px); display: flex; flex-direction: column; overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 24px 64px rgba(0,0,0,0.65);
      animation: modalBoxIn 0.30s cubic-bezier(0.16,1,0.3,1) both;
    }
    #task-detail-close {
      position: absolute; top: 14px; right: 18px; background: none; border: none;
      color: var(--allegion-muted); font-size: 26px; cursor: pointer; z-index: 2;
      transition: color 0.18s;
    }
    #task-detail-close:hover { color: #E53935; }
    /* Viewport: clips horizontal slide animation, scrolls vertically */
    #task-detail-viewport {
      flex: 1; overflow-x: hidden; overflow-y: hidden; min-height: 0; position: relative;
    }
    #task-detail-viewport::-webkit-scrollbar { width: 5px; }
    #task-detail-viewport::-webkit-scrollbar-track { background: transparent; }
    #task-detail-viewport::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 999px; }
    /* Content is a plain block — no overflow needed, viewport handles scrolling */
    #task-detail-content { padding: 36px 44px 40px; }
    /* Navigation footer */
    #task-detail-nav {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      padding: 14px 24px; border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
    }
    #tdm-prev, #tdm-next {
      width: 38px; height: 38px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07); color: var(--allegion-text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s, opacity 0.15s;
    }
    #tdm-prev:hover, #tdm-next:hover { background: rgba(255,255,255,0.16); }
    #tdm-prev:disabled, #tdm-next:disabled { opacity: 0.18; cursor: default; pointer-events: none; }
    #tdm-counter {
      font-size: 13px; color: var(--allegion-muted); font-family: var(--antenna);
      font-weight: 700; letter-spacing: 0.05em; min-width: 56px; text-align: center;
    }
    /* Hero — risk context + task name */
    .tdm-risk-line { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .tdm-risk-badge {
      font-size: 13px; font-weight: 700; font-family: var(--antenna);
      padding: 3px 11px; border-radius: 999px; background: rgba(255,255,255,0.1);
    }
    .tdm-risk-name { font-size: 14px; color: var(--allegion-muted); }
    .tdm-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .tdm-task-name { font-size: 26px; font-weight: 700; color: #fff; line-height: 1.3; flex: 1; }
    .tdm-status-badge {
      flex-shrink: 0; margin-top: 4px; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--antenna);
      padding: 5px 14px; border-radius: 999px;
    }
    /* Progress bar */
    .tdm-progress-section { margin-bottom: 28px; }
    .tdm-progress-label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      font-family: var(--antenna); color: var(--allegion-muted); margin-bottom: 8px;
    }
    .tdm-progress-pct { font-size: 18px; font-weight: 700; color: var(--allegion-text); }
    .tdm-progress-track {
      height: 10px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden;
    }
    .tdm-progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #8BC34A, #FF9800);
    }
    /* Stats grid */
    .tdm-stats {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      overflow: hidden; margin-bottom: 28px;
    }
    .tdm-stat {
      background: rgba(255,255,255,0.04); padding: 16px 18px;
    }
    .tdm-stat-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--allegion-muted); font-family: var(--antenna); margin-bottom: 6px;
    }
    .tdm-stat-value { font-size: 17px; color: var(--allegion-text); line-height: 1.4; }
    .tdm-stat-value.wide { font-size: 14px; }
    /* Text sections */
    .tdm-section { margin-bottom: 24px; }
    .tdm-section:last-child { margin-bottom: 0; }
    .tdm-section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--allegion-muted); font-family: var(--antenna);
      margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .tdm-section-text {
      font-size: 16px; color: rgba(232,234,237,0.88); line-height: 1.7;
      background: rgba(255,255,255,0.03); border-radius: 10px; padding: 16px 18px;
    }
    /* Task card highlight pulse (from search result click) ─────────────── */
    /* outline is used for the main stroke because it bypasses overflow:hidden
       clipping on ancestor containers; box-shadow provides the inner glow. */
    @keyframes taskCardPulse {
      0%   { outline: 2px solid transparent;                   outline-offset: 1px; }
      15%  { outline: 3px solid var(--card-pulse,#FF671F);     outline-offset: 3px;
             box-shadow: 0 0 14px 3px var(--card-pulse,#FF671F); }
      32%  { outline: 2px solid var(--card-pulse,#FF671F);     outline-offset: 1px;
             box-shadow: 0 0 4px  1px var(--card-pulse,#FF671F); }
      50%  { outline: 3px solid var(--card-pulse,#FF671F);     outline-offset: 3px;
             box-shadow: 0 0 14px 3px var(--card-pulse,#FF671F); }
      68%  { outline: 2px solid var(--card-pulse,#FF671F);     outline-offset: 1px;
             box-shadow: 0 0 4px  1px var(--card-pulse,#FF671F); }
      84%  { outline: 3px solid var(--card-pulse,#FF671F);     outline-offset: 3px;
             box-shadow: 0 0 12px 2px var(--card-pulse,#FF671F); }
      100% { outline: 2px solid transparent;                   outline-offset: 1px;
             box-shadow: none; }
    }
    .task-card-pulse { animation: taskCardPulse 5s ease-in-out forwards; }
    /* Matching characters inside the highlighted card also pulse */
    @keyframes taskCharPulse {
      0%   { color: var(--card-pulse,#FF671F); text-shadow: none;                                opacity: 0.55; }
      15%  { color: var(--card-pulse,#FF671F); text-shadow: 0 0 7px var(--card-pulse,#FF671F);  opacity: 1;    }
      32%  { color: var(--card-pulse,#FF671F); text-shadow: none;                                opacity: 0.55; }
      50%  { color: var(--card-pulse,#FF671F); text-shadow: 0 0 7px var(--card-pulse,#FF671F);  opacity: 1;    }
      68%  { color: var(--card-pulse,#FF671F); text-shadow: none;                                opacity: 0.55; }
      84%  { color: var(--card-pulse,#FF671F); text-shadow: 0 0 7px var(--card-pulse,#FF671F);  opacity: 1;    }
      100% { color: inherit;                   text-shadow: none;                                opacity: 1;    }
    }
    .task-char-pulse { animation: taskCharPulse 5s ease-in-out forwards; font-weight: 700; }
    /* Progress fill color overrides by task status */
    .task-progress-fill-completed   { background: #8BC34A; }
    .task-progress-fill-at-risk     { background: #EF5350; }
    .task-progress-fill-monitoring  { background: #74B8F5; }
    .task-progress-fill-in-progress { background: linear-gradient(90deg, #FF9800, #FFB74D); }
    /* ── Badge (overdue / health) ────────────────────────────────────────────── */
    .modal-badge {
      display: inline-block; padding: 2px 9px; border-radius: 999px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
    }
    .modal-badge.red    { background: rgba(229,57,53,0.22);  color: #ef9a9a; }
    .modal-badge.green  { background: rgba(139,195,74,0.22); color: #aed581; }
    .modal-badge.yellow { background: rgba(255,238,88,0.22); color: #fff176; }
    .modal-badge.grey   { background: rgba(255,255,255,0.10); color: var(--allegion-muted); }
    /* ── Fields ──────────────────────────────────────────────────────────────── */
    .modal-field { margin-bottom: 20px; }
    .modal-label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
                   color: var(--allegion-muted); margin-bottom: 5px; }
    .modal-value { font-size: 20px; color: var(--allegion-text); line-height: 1.55; }
    .spotlight-btn {
      background: none; border: none; padding: 0; cursor: pointer;
      color: #FF671F; font: inherit; font-weight: 600;
      text-decoration: underline dotted rgba(255,103,31,0.45);
      transition: color 0.15s, text-decoration-color 0.15s;
    }
    .spotlight-btn:hover { color: #fff; text-decoration-color: rgba(255,255,255,0.5); }
    /* ── Status chips — float above the zoom pill ───────────────────────────── */
    #active-chips {
      position: fixed; z-index: 500;
      display: flex; flex-direction: column; gap: 7px; align-items: flex-start;
    }
    .status-chip {
      display: none; align-items: center; gap: 10px;
      background: rgba(28,28,30,0.90);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,103,31,0.55); border-radius: 999px;
      padding: 10px 14px 10px 18px;
      font-family: var(--antenna); font-size: 16px; font-weight: 600; color: #FF671F;
      box-shadow: 0 6px 24px rgba(0,0,0,0.55);
      white-space: nowrap;
    }
    .status-chip.visible { display: flex; animation: chipIn 0.28s cubic-bezier(0.16,1,0.3,1) both; }
    #reset-all-chip { padding: 10px 18px; border-color: rgba(229,57,53,0.6); color: #EF5350; }
    #reset-all-chip:hover { opacity: 0.82; }
    .chip-icon {
      font-size: 15px; line-height: 1;
      font-family: 'Material Symbols Outlined'; font-weight: 400; flex-shrink: 0;
    }
    .chip-close {
      background: none; border: none; cursor: pointer; padding: 2px 4px;
      color: rgba(255,255,255,0.40); font-size: 16px; line-height: 1;
      transition: color 0.15s; flex-shrink: 0;
    }
    .chip-close:hover { color: #E53935; }
    /* Clickable chip state — when chip shows generic count */
    #filter-chip.clickable { cursor: pointer; }
    #filter-chip.clickable:hover { filter: brightness(1.18); }
    /* Active filters detail menu */
    #filter-chip-menu {
      position: fixed; z-index: 501; display: none; flex-direction: column; gap: 5px;
      background: rgba(26,26,28,0.94);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,103,31,0.42); border-top-color: rgba(255,103,31,0.68);
      border-radius: 16px; padding: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 40px rgba(0,0,0,0.65);
      min-width: 220px;
    }
    #filter-chip-menu.open { display: flex; animation: chipIn 0.22s cubic-bezier(0.16,1,0.3,1) both; }
    .fcm-header {
      font-family: var(--antenna); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,103,31,0.65); padding: 4px 8px 2px;
    }
    .fcm-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      font-family: var(--antenna); font-size: 15px; color: #E8EAED; font-weight: 500;
    }
    .fcm-label { flex: 1; }
    .fcm-x {
      background: none; border: none; cursor: pointer; padding: 2px 4px;
      color: rgba(255,255,255,0.38); font-size: 15px; line-height: 1;
      transition: color 0.15s; flex-shrink: 0;
    }
    .fcm-x:hover { color: #E53935; }
    @keyframes chipIn {
      from { opacity: 0; transform: translateY(6px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .modal-value a.contact-link {
      color: #FF671F; text-decoration: none; border-bottom: 1px solid rgba(255,103,31,0.35);
      transition: border-color 0.15s, color 0.15s;
    }
    .modal-value a.contact-link:hover { color: #fff; border-bottom-color: rgba(255,255,255,0.5); }
    /* Tabs */
    #risk-modal-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0;
                       padding-bottom: 0; }
    /* Animated separator line — flush against tab bottoms, sweeps to active colour */
    #modal-sep {
      height: 2px; position: relative; margin-top: 0; margin-bottom: 22px;
      background: var(--sep-color, var(--allegion-border)); border-radius: 1px;
    }
    #modal-sep-sweep {
      position: absolute; inset: 0; border-radius: 1px;
      transform: scaleX(0); transform-origin: left;
      /* base state — inline style cleared after sweep so this CSS rule takes over */
    }
    #modal-sep-sweep.sweeping {
      transform: scaleX(1);
      transition: transform 1.08s cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Directional content transition */
    @keyframes tabExitLeft   { from{opacity:1;transform:translateX(0)}    to{opacity:0;transform:translateX(-16px)} }
    @keyframes tabExitRight  { from{opacity:1;transform:translateX(0)}    to{opacity:0;transform:translateX(16px)}  }
    @keyframes tabEnterRight { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)}    }
    @keyframes tabEnterLeft  { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)}   }
    #modal-tab-content[data-dir="1"].tab-exit   { animation: tabExitLeft   0.23s ease forwards; }
    #modal-tab-content[data-dir="-1"].tab-exit  { animation: tabExitRight  0.23s ease forwards; }
    #modal-tab-content[data-dir="1"].tab-enter  { animation: tabEnterRight 0.47s cubic-bezier(0.16,1,0.3,1) forwards; }
    #modal-tab-content[data-dir="-1"].tab-enter { animation: tabEnterLeft  0.47s cubic-bezier(0.16,1,0.3,1) forwards; }
    .modal-tab {
      padding: 8px 18px; border: 2px solid transparent; border-bottom: none;
      border-radius: 8px 8px 0 0; background: transparent;
      cursor: pointer; font-size: 16px; font-weight: 700; margin-bottom: -2px;
      transition: filter 0.15s, box-shadow 0.15s;
    }
    .modal-tab:hover { filter: brightness(1.2); }
    .modal-tab.active {
      color: #000 !important;
      box-shadow: 0 -4px 14px rgba(0,0,0,0.55), -2px -2px 6px rgba(0,0,0,0.3);
      border-bottom-color: transparent;
    }

    /* ── Category filter dot exit / enter animations ───────────────────────── */
    @keyframes dotCatExit {
      0%   { filter: none; transform: scale(1);   opacity: 1; }
      20%  { filter: none; transform: scale(1.1); opacity: 1; }
      100% { filter: none; transform: scale(0);   opacity: 0; }
    }
    @keyframes dotCatEnter {
      0%   { filter: none; transform: scale(0);   opacity: 0; }
      75%  { filter: none; transform: scale(1.1); opacity: 1; }
      100% { filter: none; transform: scale(1);   opacity: 1; }
    }
    /* Animate on dotG (.dot-hover) — filter:none in keyframes eliminates per-frame
       filter re-composition from the very first frame, within the single classList.add */
    .dot-hover.dot-cat-exit  { animation: dotCatExit  0.32s ease-in  both; }
    .dot-hover.dot-cat-enter { animation: dotCatEnter 0.36s ease-out both; }

    /* ── Zoom: labels fade out at start, fade in 50ms after zoom stops ─────── */
    .label-box, .label-text, .conn-line { transition: opacity 150ms ease; }
    #risks-layer.zooming .label-box,
    #risks-layer.zooming .label-text,
    #risks-layer.zooming .conn-line  { opacity: 0; }

    /* ── Label toggle — hide label boxes + connectors, keep dots ────────────── */
    .labels-off .label-box,
    .labels-off .label-text,
    .labels-off .conn-line { display: none; }


    /* ── Controls ───────────────────────────────────────────────────────────── */
    #zoom-ctrl {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 200;
      background: #363637; padding: 5px 8px; border-radius: 26px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.55);
      border: 1px solid #3F3F40;
    }
    #zoom-ctrl button {
      height: 34px; border: 1px solid rgba(255,255,255,0.1); border-radius: 17px;
      background: rgba(255,255,255,0.07); cursor: pointer; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: #FF671F; padding: 0 14px; font-size: 15px; white-space: nowrap;
      font-family: var(--antenna); transition: filter 0.15s, border-color 0.15s;
    }
    #zoom-ctrl button.icon-btn { width: 34px; padding: 0; font-size: 19px; border-radius: 50%; }
    #zoom-ctrl button:hover { filter: brightness(1.25); border-color: rgba(255,103,31,0.45); }
    #zoom-ctrl button.active { background: rgba(255,103,31,0.14); border-color: #FF671F; }
    @keyframes resetBtnPulse {
      0%, 100% { color: #FF671F; border-color: rgba(255,103,31,0.25); box-shadow: none; }
      50%      { color: #FF671F; border-color: rgba(255,103,31,0.85); box-shadow: 0 0 10px rgba(255,103,31,0.32); }
    }
    #zoom-reset.reset-active {
      color: #FF671F !important;
      animation: resetBtnPulse 2.2s ease-in-out infinite;
    }
    #hm { cursor: grab; }
    #hm.panning { cursor: grabbing; }

    /* ── Menu animations ───────────────────────────────────────────────────── */
    @keyframes menuSlideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)     scale(1);    }
    }
    @keyframes menuSlideOut {
      from { opacity: 1; transform: translateY(0)    scale(1);    }
      to   { opacity: 0; transform: translateY(-7px) scale(0.96); }
    }
    /* Directional morph — used when switching between the two dropdowns */
    @keyframes menuSwitchOut {
      from { opacity: 1; transform: scale(1)    translateX(0); }
      to   { opacity: 0; transform: scale(0.82) translateX(var(--sw-x, 28px)); }
    }
    @keyframes menuSwitchIn {
      from { opacity: 0; transform: scale(0.82) translateX(var(--sw-x-in, -28px)); }
      to   { opacity: 1; transform: scale(1)    translateX(0); }
    }
    #cat-dropdown.switch-out { display: flex; animation: menuSwitchOut 0.16s ease-in      both; }
    #cat-dropdown.switch-in  { display: flex; animation: menuSwitchIn  0.22s cubic-bezier(0.16,1,0.3,1) both; }
    #mf-dropdown.switch-out  { display: flex; animation: menuSwitchOut 0.16s ease-in      both; }
    #mf-dropdown.switch-in   { display: flex; animation: menuSwitchIn  0.22s cubic-bezier(0.16,1,0.3,1) both; }
    /* During morph crossfade: dropdown is invisible (overlay covers it), then fades in */
    #cat-dropdown.morph-reveal,
    #mf-dropdown.morph-reveal {
      animation: none !important;
      opacity: 0;
      transition: opacity 0.1s ease !important;
    }
    @keyframes modalBackdropIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes modalBackdropOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    @keyframes modalBoxIn {
      from { opacity: 0; transform: scale(0.92) translateY(22px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }
    @keyframes modalBoxOut {
      from { opacity: 1; transform: scale(1)    translateY(0);    }
      to   { opacity: 0; transform: scale(0.95) translateY(10px); }
    }

    /* ── Multi-filter dropdown ───────────────────────────────────────────────── */
    #mf-dropdown {
      display: none; position: absolute; top: calc(100% + 6px);
      left: 50%; margin-left: calc(var(--rh-dd-min-w, 240px) * -0.5);
      flex-direction: column; gap: 5px;
      background: rgba(20,20,22,0.97);
      border: 1px solid rgba(255,103,31,0.38); border-top-color: rgba(255,103,31,0.65);
      border-radius: 20px; padding: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 16px 48px rgba(0,0,0,0.72);
      min-width: var(--rh-dd-min-w, 240px); z-index: 300; transform-origin: top left;
    }
    #mf-dropdown.open    { display: flex; animation: menuSlideIn  0.30s cubic-bezier(0.16,1,0.3,1) both; }
    #mf-dropdown.closing { display: flex; animation: menuSlideOut 0.16s cubic-bezier(0.4,0,1,1)    both; }
    .mf-section-label {
      font-size: var(--rh-dd-font, 11px); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: rgba(255,255,255,0.3);
      padding: var(--rh-dd-pad-v, 6px) var(--rh-dd-pad-h, 10px) 2px;
      font-family: var(--antenna);
    }
    .mf-row {
      display: flex; align-items: center; gap: 10px;
      padding: var(--rh-dd-pad-v, 8px) var(--rh-dd-pad-h, 12px);
      border-radius: 20px; cursor: pointer;
      transition: background 0.12s, opacity 0.18s;
    }
    .mf-row:hover { background: rgba(255,255,255,0.07); }
    .mf-swatch {
      width: var(--rh-dd-dot, 10px); height: var(--rh-dd-dot, 10px);
      border-radius: 50%; flex-shrink: 0; box-sizing: border-box;
      border: 2px solid rgba(255,255,255,0.35);
      transition: background 0.15s, border-color 0.15s;
    }
    .mf-row.active .mf-swatch { background: #FF671F; border-color: #FF671F; }
    .mf-label { flex: 1; font-size: var(--rh-dd-font, 13px); font-weight: 500;
                font-family: var(--antenna); color: #E8EAED; }
    #mf-sort-btn {
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--rh-btn-r, 10px); padding: var(--rh-btn-pad-v,5px) var(--rh-btn-pad-h,11px);
      color: #FF671F; font-size: var(--rh-btn-font,13px); font-weight: 600;
      font-family: var(--antenna); cursor: pointer; flex-shrink: 0; gap: 5px;
      transition: filter 0.15s, border-color 0.15s;
    }
    #mf-sort-btn:hover { filter: brightness(1.22); border-color: rgba(255,255,255,0.28); }
    #mf-sort-btn.active { border-color: #FF671F; background: rgba(255,103,31,0.14); }
    #rh-mf-btn {
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--rh-btn-r, 10px); padding: var(--rh-btn-pad-v,5px) var(--rh-btn-pad-h,11px);
      color: #FF671F; font-size: var(--rh-btn-font,13px); font-weight: 600;
      font-family: var(--antenna); cursor: pointer; flex-shrink: 0; gap: 5px;
      transition: filter 0.15s, border-color 0.15s;
    }
    #rh-mf-btn:hover { filter: brightness(1.22); border-color: rgba(255,255,255,0.28); }
    #rh-mf-btn.filtered { border-color: #FF671F; }
    #rh-mf-badge {
      display: none; background: #FF671F; color: #fff;
      font-size: 9px; font-weight: 800; line-height: 1;
      padding: 2px 5px; border-radius: 999px;
      min-width: 14px; text-align: center; flex-shrink: 0;
    }
    #rh-mf-badge.visible { display: inline-block; }

    /* ── Risk list body overlay — darkens list when dropdown is open ─────────── */
    #cat-list-overlay {
      position: fixed; z-index: 150; pointer-events: none;
      background: rgba(0,0,0,0.62);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #cat-list-overlay.dd-open { opacity: 1; }

    /* ── Search bar ─────────────────────────────────────────────────────────── */
    @keyframes rhItemExit {
      0%   { transform: scale(1);   opacity: 1; }
      20%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0);   opacity: 0; }
    }
    @keyframes rhItemEnter {
      0%   { transform: scale(0);   opacity: 0; }
      75%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .rh-exit  { animation: rhItemExit  0.22s cubic-bezier(0.4,0,1,1)      both !important; }
    .rh-enter { animation: rhItemEnter 0.28s cubic-bezier(0.16,1,0.3,1)   both !important; }

    #rh-search-btn {
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--rh-btn-r, 10px);
      padding: var(--rh-btn-pad-v, 5px) var(--rh-btn-pad-v, 5px);
      color: #FF671F; cursor: pointer; flex-shrink: 0;
      transition: filter 0.15s, border-color 0.15s;
    }
    #rh-search-btn:hover { filter: brightness(1.22); border-color: rgba(255,255,255,0.28); }

    #rh-search-bar {
      position: absolute; left: 16px; right: 16px; top: 10px; bottom: 10px;
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px;
      background: rgba(28,28,30,0.72);
      backdrop-filter: blur(15px) saturate(180%) brightness(1.06);
      -webkit-backdrop-filter: blur(15px) saturate(180%) brightness(1.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-top-color: rgba(255,255,255,0.44);
      border-radius: 999px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22),
                  inset 1px 0 0 rgba(255,255,255,0.08),
                  inset -1px 0 0 rgba(255,255,255,0.08);
      transform: scaleX(0); opacity: 0; pointer-events: none;
      transition: transform 0.38s cubic-bezier(0.16,1,0.3,1),
                  opacity   0.22s ease;
      transform-origin: center;
      z-index: 10;
    }
    #rh-search-bar.open {
      transform: scaleX(1); opacity: 1; pointer-events: all;
    }
    #rh-search-input {
      flex: 1; min-width: 0; background: none; border: none; outline: none;
      color: #FF671F; font-family: var(--antenna);
      font-size: var(--rh-btn-font, 13px); font-weight: 500;
      caret-color: rgba(255,103,31,0.85); /* explicit so it doesn't bleed into icon area */
    }
    #rh-search-input::placeholder { color: rgba(255,255,255,0.32); }
    /* Thin divider separating the icon from the input — makes the caret visually distinct */
    #rh-search-icon-sep {
      width: 1px; height: 16px; background: rgba(255,255,255,0.18); flex-shrink: 0;
    }
    #rh-search-advanced {
      background: none; border: 1px solid rgba(255,255,255,0.18); border-radius: 999px;
      color: var(--allegion-muted); font-size: 11px; font-family: var(--antenna);
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 3px 10px; cursor: pointer; flex-shrink: 0; white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    #rh-search-advanced:hover { color: var(--allegion-text); border-color: rgba(255,255,255,0.35); }
    #rh-search-close {
      background: none; border: none; cursor: pointer; padding: 2px;
      color: rgba(255,255,255,0.45); font-size: var(--rh-btn-font, 13px);
      line-height: 1; display: flex; align-items: center;
      transition: color 0.15s;
    }
    #rh-search-close:hover { color: #E53935; }
    /* ── Extended search results panel ──────────────────────────────────── */
    #search-results-panel {
      display: none; position: fixed; z-index: 180;
      background: rgba(22, 22, 24, 0.72);
      backdrop-filter: blur(20px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(1.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-top-color: rgba(255,255,255,0.44);
      border-radius: 18px; padding: 8px 0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 1px 0 0 rgba(255,255,255,0.07),
        inset -1px 0 0 rgba(255,255,255,0.07),
        inset 0 -1px 0 rgba(0,0,0,0.22),
        0 16px 48px rgba(0,0,0,0.6);
      max-height: calc(100vh - 80px); overflow-y: auto; width: 380px;
    }
    #search-results-panel.srp-visible { display: block; }
    #search-results-panel::-webkit-scrollbar { width: 4px; }
    #search-results-panel::-webkit-scrollbar-track { background: transparent; }
    #search-results-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); border-radius: 999px; }
    .srp-section + .srp-section { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 6px; padding-top: 2px; }
    .srp-header {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--allegion-muted); font-family: var(--antenna); padding: 8px 16px 5px;
    }
    .srp-row {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 8px 16px; cursor: pointer;
      transition: background 0.12s;
    }
    .srp-row:hover { background: rgba(255,255,255,0.09); }
    /* Task name wraps naturally — no truncation */
    .srp-row-name { flex: 1; font-size: 15px; color: var(--allegion-text); line-height: 1.45; }
    .srp-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .srp-risk-badge {
      font-size: 11px; font-weight: 700; font-family: var(--antenna);
      padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,0.1);
      color: var(--allegion-muted); white-space: nowrap;
    }
    .srp-status-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; font-family: var(--antenna);
      padding: 2px 8px; border-radius: 999px; white-space: nowrap;
    }
    .srp-more { padding: 5px 16px 8px; font-size: 12px; color: var(--allegion-muted); cursor: default; }
    .srp-more-link { cursor: pointer; color: #FF671F; transition: opacity 0.15s; }
    .srp-more-link:hover { opacity: 0.75; }
    /* ── Person profile modal ────────────────────────────────────────────── */
    #person-modal {
      display: none; position: fixed; inset: 0; z-index: 220;
      align-items: center; justify-content: center;
    }
    #person-modal.open { display: flex; }
    #person-modal.open #person-modal-overlay { animation: modalBackdropIn  0.22s cubic-bezier(0.16,1,0.3,1) both; }
    #person-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); cursor: pointer;
    }
    #person-modal-box {
      position: relative; z-index: 1; box-sizing: border-box;
      background: rgba(28,28,30,0.82);
      backdrop-filter: blur(15px) saturate(180%) brightness(1.06);
      -webkit-backdrop-filter: blur(15px) saturate(180%) brightness(1.06);
      color: var(--allegion-text);
      border: 1px solid rgba(255,255,255,0.14); border-top-color: rgba(255,255,255,0.44);
      border-radius: 20px; padding: 32px 40px;
      max-width: 620px; width: 90%; max-height: calc(100vh - 60px);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.58);
      animation: modalBoxIn 0.34s cubic-bezier(0.16,1,0.3,1) both;
    }
    #person-modal-close {
      position: absolute; top: 14px; right: 18px; background: none; border: none;
      color: var(--allegion-muted); font-size: 26px; cursor: pointer; line-height: 1;
      transition: color 0.18s;
    }
    #person-modal-close:hover { color: #E53935; }
    #person-modal-content { overflow-y: auto; min-height: 0; }
    #person-modal-content::-webkit-scrollbar { width: 4px; }
    #person-modal-content::-webkit-scrollbar-track { background: transparent; }
    #person-modal-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 999px; }
    .pm-name { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .pm-email-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; color: var(--allegion-muted); text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 2px;
      transition: color 0.15s; margin-bottom: 20px;
    }
    .pm-email-link:hover { color: var(--allegion-text); }
    .pm-section-head {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--allegion-muted); font-family: var(--antenna); margin: 16px 0 6px;
      padding-bottom: 6px; border-bottom: 1px solid var(--allegion-border);
    }
    .pm-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 8px; border-radius: 8px; cursor: pointer;
      transition: background 0.12s;
    }
    .pm-row:hover { background: rgba(255,255,255,0.07); }
    .pm-row-badge {
      flex-shrink: 0; font-size: 11px; font-weight: 700; font-family: var(--antenna);
      padding: 3px 9px; border-radius: 999px; background: rgba(255,255,255,0.1);
    }
    .pm-row-name { font-size: 14px; color: var(--allegion-text); line-height: 1.4; }
    .pm-no-data { font-size: 13px; color: var(--allegion-muted); padding: 4px 8px; }
    /* ── Full search modal ───────────────────────────────────────────────── */
    #search-modal {
      display: none; position: fixed; inset: 0; z-index: 210;
      align-items: center; justify-content: center;
    }
    #search-modal.open { display: flex; }
    #search-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); cursor: pointer; }
    #search-modal-box {
      position: relative; z-index: 1; box-sizing: border-box;
      background: rgba(22,22,24,0.80);
      backdrop-filter: blur(20px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(1.08);
      border: 1px solid rgba(255,255,255,0.14); border-top-color: rgba(255,255,255,0.44);
      border-radius: 20px; padding: 0;
      max-width: min(92vw, 1060px); width: min(92vw, 1060px);
      max-height: calc(100vh - 60px); display: flex; flex-direction: column; overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 24px 64px rgba(0,0,0,0.6);
      animation: modalBoxIn 0.30s cubic-bezier(0.16,1,0.3,1) both;
    }
    #search-modal-close {
      position: absolute; top: 14px; right: 18px; background: none; border: none;
      color: var(--allegion-muted); font-size: 26px; cursor: pointer; line-height: 1;
      z-index: 2; transition: color 0.18s;
    }
    #search-modal-close:hover { color: #E53935; }
    #search-modal-header {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 52px 18px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    #search-modal-icon-sep {
      width: 1px; height: 18px; background: rgba(255,255,255,0.18); flex-shrink: 0;
    }
    #search-modal-input {
      flex: 1; min-width: 0; background: none; border: none; outline: none;
      color: #FF671F; font-family: var(--antenna); font-size: 16px; font-weight: 500;
      caret-color: rgba(255,103,31,0.85);
    }
    #search-modal-input::placeholder { color: rgba(255,255,255,0.28); }
    #smc-content-toggle {
      flex-shrink: 0; background: none; cursor: pointer; white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.18); border-radius: 999px;
      color: var(--allegion-muted); font-size: 11px; font-family: var(--antenna);
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 4px 12px; transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    #smc-content-toggle:hover { color: var(--allegion-text); border-color: rgba(255,255,255,0.3); }
    #smc-content-toggle.smc-toggle-on {
      background: rgba(255,103,31,0.15); color: #FF671F;
      border-color: rgba(255,103,31,0.5);
    }
    #search-modal-content { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    .smc-col {
      flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 12px;
    }
    .smc-col + .smc-col { border-left: 1px solid rgba(255,255,255,0.09); }
    .smc-col::-webkit-scrollbar { width: 4px; }
    .smc-col::-webkit-scrollbar-track { background: transparent; }
    .smc-col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 999px; }
    .smc-section-head {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--allegion-muted); font-family: var(--antenna); padding: 10px 20px 5px;
    }
    .smc-section-head + * { border-top: none; }
    .smc-row {
      display: flex; align-items: flex-start; gap: 10px; padding: 9px 20px;
      cursor: pointer; transition: background 0.12s;
    }
    .smc-row:hover { background: rgba(255,255,255,0.07); }
    .smc-name { flex: 1; font-size: 15px; color: var(--allegion-text); line-height: 1.45; }
    .smc-snippet {
      font-size: 12px; color: var(--allegion-muted); line-height: 1.5; margin-top: 3px;
    }
    .smc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .smc-risk-badge {
      font-size: 11px; font-weight: 700; font-family: var(--antenna);
      padding: 2px 9px; border-radius: 999px; background: rgba(255,255,255,0.1);
      white-space: nowrap;
    }
    .smc-status-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
      font-family: var(--antenna); padding: 2px 9px; border-radius: 999px; white-space: nowrap;
    }
    .smc-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 6px 0; }
    .smc-empty { padding: 20px 20px; font-size: 14px; color: var(--allegion-muted); text-align: center; }
    /* Search dim — independent of dot-hover dim so they can coexist */
    #legend-layer.search-active .legend-row:not(.legend-row-hl) { opacity: 0.18; transition: opacity 0.18s; }
    #legend-layer.search-active .legend-row.legend-row-hl       { opacity: 1;    transition: opacity 0.18s; }

    /* ── Risk list header bar — all inner sizes driven by JS via CSS vars ───── */
    #risk-header-bar {
      position: fixed; z-index: 200;
      display: flex; align-items: center;
      background: #363637;
      border-radius: 10px 10px 0 0; /* overridden by JS to match SVG card rx at current scale */
      border-bottom: 1px solid #3F3F40;
      overflow: visible;
      padding-left: var(--rh-pad-l, 40px);
      padding-right: var(--rh-pad-r, 10px);
    }
    .rh-col {
      font-size: var(--rh-col-font, 11px); font-weight: 700; letter-spacing: 0.09em;
      text-transform: uppercase; color: #FF671F;
      font-family: var(--antenna); white-space: nowrap; flex-shrink: 0;
    }
    #rh-id  {
      width: var(--rh-id-w, 18px); flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,0.22);
      padding-right: var(--rh-id-pr, 4px);
      margin-right: var(--rh-id-mr, 6px);
    }
    #rh-name { flex: 1; min-width: 0; }
    .rh-divider {
      width: 1px; background: rgba(255,255,255,0.22); align-self: stretch;
      margin: 20% var(--rh-div-mx, 9px); flex-shrink: 0;
    }
    #cat-filter-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--rh-btn-r, 10px);
      padding: var(--rh-btn-pad-v, 5px) var(--rh-btn-pad-h, 11px);
      color: #FF671F; font-size: var(--rh-btn-font, 13px); font-weight: 600; cursor: pointer;
      font-family: var(--antenna); transition: filter 0.15s, border-color 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    #cat-filter-btn:hover { filter: brightness(1.22); border-color: rgba(255,255,255,0.28); }
    #cat-filter-btn.filtered { border-color: #6699cc; color: #a8c0ff; }
    /* Glow when open so users know which pill owns the visible menu */
    #cat-filter-btn.open, #rh-mf-btn.open {
      background: rgba(255,103,31,0.16); border-color: rgba(255,103,31,0.7);
      box-shadow: 0 0 0 2px rgba(255,103,31,0.22);
    }
    #cat-filter-chevron { font-size: 0.75em; transition: transform 0.2s; display: inline-block; opacity: 0.7; }
    #cat-filter-btn.open #cat-filter-chevron { transform: rotate(180deg); }
    #cat-dropdown {
      display: none; position: absolute; top: calc(100% + 6px);
      left: 50%; margin-left: calc(var(--rh-dd-min-w, 240px) * -0.5);
      flex-direction: column; gap: 5px;
      background: rgba(20,20,22,0.97);
      border: 1px solid rgba(255,103,31,0.38);
      border-top-color: rgba(255,103,31,0.65);
      border-radius: 20px; padding: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10),
                  0 16px 48px rgba(0,0,0,0.72);
      min-width: var(--rh-dd-min-w, 240px); z-index: 300;
      transform-origin: top right;
    }
    #cat-dropdown.open    { display: flex; animation: menuSlideIn  0.30s cubic-bezier(0.16,1,0.3,1) both; }
    #cat-dropdown.closing { display: flex; animation: menuSlideOut 0.16s cubic-bezier(0.4,0,1,1)    both; }
    .cat-dd-row {
      display: flex; align-items: center; gap: 10px;
      padding: var(--rh-dd-pad-v, 8px) var(--rh-dd-pad-h, 12px);
      border-radius: 20px; cursor: pointer;
      transition: background 0.12s, opacity 0.2s;
    }
    .cat-dd-row:hover { background: rgba(255,255,255,0.07); }
    .cat-dd-swatch {
      width: var(--rh-dd-dot, 10px); height: var(--rh-dd-dot, 10px);
      border-radius: 50%; flex-shrink: 0; box-sizing: border-box;
      background: var(--swatch-col);
      border: 2px solid transparent;
      transition: background 0.18s, border-color 0.18s;
    }
    .cat-dd-label {
      flex: 1; font-size: var(--rh-dd-font, 13px); font-weight: 500;
      font-family: var(--antenna); color: #E8EAED;
    }
    .cat-dd-row.off { opacity: 0.45; }
    .cat-dd-row.off .cat-dd-swatch {
      background: transparent;
      border-color: var(--swatch-col);
    }
  </style>
</head>
<body>
<div id="wrap">
  <svg id="hm" viewBox="0 0 1300 780" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Gradient uses userSpaceOnUse so JS can anchor it to data coords (0,0)→(5,5).
           When zoomed/panned, updateGradientCoords() moves the anchor points so the
           green/yellow/red colours always correspond to the correct risk levels. -->
      <linearGradient id="gDiag" gradientUnits="userSpaceOnUse"
                      x1="130" y1="700" x2="730" y2="20">
        <stop offset="0%"   stop-color="#8BC34A"/>
        <stop offset="25%"  stop-color="#8BC34A"/>
        <stop offset="46%"  stop-color="#FFEE58"/>
        <stop offset="61%"  stop-color="#FF9800"/>
        <stop offset="100%" stop-color="#E53935"/>
      </linearGradient>
    <clipPath id="chartClip">
      <!-- Clip to the exact plot area (P.x=130, P.y=20, P.w=600, P.h=680) -->
      <path d="M 150,20 L 730,20 L 730,700 L 150,700 Q 130,700 130,680 L 130,40 Q 130,20 150,20 Z"/>
    </clipPath>
    </defs>
    <g id="chart-inner">
      <g id="static-layer"></g>
      <!-- Clip wrapper never transforms — keeps clip fixed in plot space -->
      <g clip-path="url(#chartClip)">
        <g id="risks-layer"></g>
      </g>
    </g>
    <g id="legend-layer"></g>
  </svg>
</div>
<div id="filter-chip-menu"></div>
<div id="active-chips">
  <div id="spotlight-chip" class="status-chip">
    <span class="chip-icon">person_search</span>
    <span id="spotlight-chip-label"></span>
    <button class="chip-close" onclick="clearSpotlight()" title="Clear spotlight">✕</button>
  </div>
  <div id="filter-chip" class="status-chip">
    <span class="chip-icon">filter_list</span>
    <span id="filter-chip-label"></span>
    <button class="chip-close" onclick="clearAllFilters()" title="Clear filters">✕</button>
  </div>
  <div id="reset-all-chip" class="status-chip" onclick="resetAllFilters()" style="cursor:pointer">
    <span class="chip-icon" style="font-size:14px">restart_alt</span>
    <span>Reset All</span>
  </div>
</div>
<div id="zoom-ctrl">
  <button class="icon-btn" onclick="doZoom(1.3)" title="Zoom in">+</button>
  <button id="zoom-reset" class="icon-btn" onclick="resetView()" title="Reset view">
    <span class="material-symbols-outlined" style="font-size:20px;line-height:1;font-family:'Material Symbols Outlined';font-weight:300">refresh</span>
  </button>
  <button class="icon-btn" onclick="doZoom(0.77)" title="Zoom out">&minus;</button>
  <button id="label-toggle" onclick="toggleLabels()" title="Toggle labels">Labels</button>
</div>
<!-- ── Task detail modal ──────────────────────────────────────────────────── -->
<div id="task-detail-modal">
  <div id="task-detail-overlay" onclick="closeTaskDetail()"></div>
  <div id="task-detail-box">
    <button id="task-detail-close" onclick="closeTaskDetail()">&#215;</button>
    <div id="task-detail-viewport">
      <div id="task-detail-content"></div>
    </div>
    <div id="task-detail-nav">
      <button id="tdm-prev" onclick="prevTaskDetail()">
        <span class="material-symbols-outlined" style="font-size:20px;font-family:'Material Symbols Outlined';font-weight:300;font-variation-settings:'wght' 300;line-height:1">chevron_left</span>
      </button>
      <span id="tdm-counter"></span>
      <button id="tdm-next" onclick="nextTaskDetail()">
        <span class="material-symbols-outlined" style="font-size:20px;font-family:'Material Symbols Outlined';font-weight:300;font-variation-settings:'wght' 300;line-height:1">chevron_right</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Extended search results panel ──────────────────────────────────── -->
<div id="search-results-panel">
  <div class="srp-section" id="srp-tasks-section">
    <div class="srp-header">Tasks</div>

const TASKS        = {"R01": [{"definition": "With the increase of Private Equity investments into our industry, coupled with the fragmented and aging ownership of channel partners, large hardware distributors are getting bigger\u2026..", "gov_compliance": "", "likelihood": 1.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, John Ward, Mark Vigren, Serge Zappone", "mitigation_strategy": "Disciplined approach to program management process for CGP rebates.  Including leadership approval in business, sales, and finance teams.  \nDemand Creation engine", "mitigation_type": "Improvement Action", "progress": 75, "responsible": "Vigren/Fellerhoff", "severity": 2.0, "start_date": "", "status": "ongoing", "target_date": "annual", "task": "Americas (Vigren): Consolidation of channel partners", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "Large private equity firms in the CHD channel such as Platinum Equity / Cook \u0026 Boardman continue to consolidate smaller distribution.   Some ramifications of these firms include: talent war in distribution is fierce and margin compression for distribution on new construction projects is intense."}, {"definition": "Our ability to service and install automatic doors for large national account retailers requires a level of partnership with 3rd party distributors and company owned branches.  Market dynamics/requirements are shfiting and our Stanley business is disrupting ourselves with opening up new distributors and dual distribution in certain geographies.", "gov_compliance": "", "likelihood": 1.5, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, John Ward, Mark Vigren, Serge Zappone", "mitigation_strategy": "Continue to diversify distributor base throughout the US and Canada with particular focus in markets where there is underperformance", "mitigation_type": "Current Control", "progress": 50, "responsible": "Krich", "severity": 1.0, "start_date": "", "status": "In progress", "target_date": "12/31/2026 (this will be a continual activity)", "task": "Americas (Krich): National Accounts and Dual Distribution Strategy", "task_status": "In Progress", "trend": "\u25b6", "trend_analysis": "Three new distributors have been added to portfolio with a half a dozen more being vetted.  These new partners have the ability to cover 16 of the 50 states for national account work if needed.  They are currently supllementing 6 as we ramp up this model."}, {"definition": "Amazon, Big Box Retail and large national builder dependencies", "gov_compliance": "", "likelihood": 2.0, "managers": "Bernhard Sommer, David A Perozzi, Jason Krich, John Ward, Mark Vigren, Serge Zappone", "mitigation_strategy": "If demand were to shift, we belive  volume would get picked up through other customers or channels. Working to diversify channels, including Res Pro in Canada, CEDIA in US, Direct to Consumer and acquistion into luxury segment of the residential.", "mitigation_type": "Current Control", "progress": 75, "responsible": "Perozzi", "severity": 3.0, "start_date": "", "status": "Not Started, Planning", "target_date": "2026-12-31", "task": "Americas (Perozzi):  Concentration in Retail \u0026 E-Commerce channels", "task_status": "Monitoring", "trend": "\ud83d\udc41", "trend_analysis": "FY 2025 - US \u0026 CA Retail represents 70% of total AH revenue with Res Pro 30% (national builder \u003c5% of total). Softer Res Pro markets in 2026 projecting to change mix 72% retail and 28% Res Pro. Need to monitor, but channel mix is within historical averages. Concerned over the futrue of Ferguson / Build.com and whether they can compete with Amazon and THD.com"}], "R02": [{"definition": "Negative Employee Engagement Surveys; Declines in Customer Satisfaction scores; Low Net Promoter Scores; Third-party reputational risk assessments \u0026 assessments against industry peers; Brand equity and customer loyalty analysis", "gov_compliance": "", "likelihood": 2.5, "managers": "Joe Blasko, Joshua Pokr
