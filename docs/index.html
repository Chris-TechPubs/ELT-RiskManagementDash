    const row = legendRowByRiskId[id];
    if (!row || row.classList.contains('legend-row-cat-off')) return;
    row.classList.add('legend-row-hl');
    const dg = dotGroupByRiskId[id]; if (dg) dg.classList.add('dot-force-highlight');
  });
}

// Animated pan — fast dot-only render during frames, full rerender at end
let _panAnim = null;
function _fastRerender() {
  updateGradientCoords();
  const sl = document.getElementById('static-layer');
  while (sl.firstChild) sl.removeChild(sl.firstChild);
  renderStatic();
  const rl = document.getElementById('risks-layer');
  while (rl.firstChild) rl.removeChild(rl.firstChild);
  groupRisks(RISKS).forEach(({ risks, likelihood, severity }) => {
    const cx = svgX(likelihood), cy = svgY(severity);
    drawPieDot(cx, cy, risks.map(r => r.category || ''), mk('g', {}, rl));
  });
}
function panToRisk(risk) {
  const tx = snap(risk.likelihood), ty = snap(risk.severity);
  const pad = 0.15;
  if (tx > VR.xMin + pad && tx < VR.xMax - pad && ty > VR.yMin + pad && ty < VR.yMax - pad) return;
  const rW = VR.xMax - VR.xMin, rH = VR.yMax - VR.yMin;
  const tXMin = Math.max(0, Math.min(5 - rW, tx - rW / 2));
  const tYMin = Math.max(0, Math.min(5 - rH, ty - rH / 2));
  const tXMax = tXMin + rW, tYMax = tYMin + rH;
  if (Math.abs(tXMin - VR.xMin) < 0.01 && Math.abs(tYMin - VR.yMin) < 0.01) return;
  const sXMin = VR.xMin, sXMax = VR.xMax, sYMin = VR.yMin, sYMax = VR.yMax;
  const dur = 380, t0 = performance.now();
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    VR.xMin = sXMin + (tXMin - sXMin) * e;  VR.xMax = sXMax + (tXMax - sXMax) * e;
    VR.yMin = sYMin + (tYMin - sYMin) * e;  VR.yMax = sYMax + (tYMax - sYMax) * e;
    if (p < 1) { _fastRerender(); _panAnim = requestAnimationFrame(step); }
    else { VR.xMin=tXMin; VR.xMax=tXMax; VR.yMin=tYMin; VR.yMax=tYMax; rerender(); _panAnim=null; }
  }
  _panAnim = requestAnimationFrame(step);
}

// ── Layout ────────────────────────────────────────────────────────────────────
const P    = { x: 130, y: 20, w: 600, h: 680 };
const MAX       = 5;
const FONT      = 'Roboto, Segoe UI, Arial, sans-serif';
const AXIS_FONT = 'Antenna, Roboto, Segoe UI, Arial, sans-serif';
const LB        = { xMin: P.x + 2, yMin: P.y + 2, xMax: P.x + P.w - 2, yMax: P.y + P.h - 2 };

const LEG_X = P.x + P.w + 40;  // card left = P.x+P.w (flush with graph right edge)
let _graphAllRounded = true;   // true only during entrance animation phase 1

// Data view range — changes on zoom/pan; svgX/svgY map data into the fixed plot square
let VR = { xMin: 0, xMax: 5, yMin: 0, yMax: 5 };

function svgX(v) { return P.x + (v - VR.xMin) / (VR.xMax - VR.xMin) * P.w; }
function svgY(v) { return P.y + (1 - (v - VR.yMin) / (VR.yMax - VR.yMin)) * P.h; }
function dataX(sx) { return VR.xMin + (sx - P.x) / P.w * (VR.xMax - VR.xMin); }
function dataY(sy) { return VR.yMin + (1 - (sy - P.y) / P.h) * (VR.yMax - VR.yMin); }

// ── SVG helpers ───────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function mk(tag, a, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(a)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
function mktxt(content, a, parent) {
  const e = mk('text', a, parent);
  e.textContent = content;
  return e;
}

// ── Category colour system ────────────────────────────────────────────
// All colours verified WCAG AA (>=4.5:1 contrast with black text), which also
// guarantees they are bright enough to read clearly against the black dot fill.
// Hues spread ~50 degrees apart around the full colour wheel for maximum
// perceptual distance: Coral(16) Amber(49) Lime(76) Emerald(151) Teal(171) Periwinkle(218) Pink(337)
const CAT_MAP = {
  'strategic':                '#FF6B35',  // coral-orange  contrast 7.9:1
  'operational':              '#00BFA5',  // vivid teal    contrast 9.1:1
  'technology/cybersecurity': '#C6FF00',  // electric lime contrast 17.8:1
  'technology':               '#C6FF00',
  'human capital':            '#00E676',  // emerald green contrast 12.7:1
  'governance/compliance':    '#FF80AB',  // bright pink   contrast 9.3:1
  'governance':               '#FF80AB',
  'environmental/external':   '#82B1FF',  // periwinkle    contrast 10.1:1
  'environmental':            '#82B1FF',
  'financial':                '#FFD740',  // warm amber    contrast 15.1:1
};

const CAT_LABELS = [
  ['Strategic Risks',                '#FF6B35'],
  ['Operational Risks',              '#00BFA5'],
  ['Technology/Cybersecurity Risks', '#C6FF00'],
  ['Human Capital Risks',            '#00E676'],
  ['Governance / Compliance Risks',  '#FF80AB'],
  ['Environmental / External Risks', '#82B1FF'],
  ['Financial Risks',                '#FFD740'],

];

function catColor(cat) {
  if (!cat) return '#555';
  const k = cat.toLowerCase().trim().replace(/\s*risks?\s*$/, '').trim();
  return CAT_MAP[k] || '#555';
}

// Lookup: risk id → category
const ID_TO_CAT = {};
RISKS.forEach(r => { ID_TO_CAT[r.id] = r.category || ''; });

// ── Grouping / label sizing ───────────────────────────────────────────────────
function snap(v) { return Math.round(v * 2) / 2; }

function groupRisks(risks) {
  const map = new Map();
  risks.forEach(r => {
    if (_hiddenCatColors.has(catColor(r.category || ''))) return;
    const sl = snap(r.likelihood), ss = snap(r.severity);
    if (sl < VR.xMin-0.26 || sl > VR.xMax+0.26) return;
    if (ss < VR.yMin-0.26 || ss > VR.yMax+0.26) return;
    const key = sl+','+ss;
    if (!map.has(key)) map.set(key, { risks: [], likelihood: sl, severity: ss });
    map.get(key).risks.push(r);
  });
  return [...map.values()];
}

const MAX_PER_ROW = 3, CHAR_W = 6, ROW_H = 14, PAD_X = 4, PAD_Y = 3;

function getLabelLayout(ids) {
  const rows = [];
  for (let i = 0; i < ids.length; i += MAX_PER_ROW)
    rows.push(ids.slice(i, i + MAX_PER_ROW));
  const maxChars = Math.max(...rows.map(r => r.join('  ').length));
  return { rows, w: Math.max(32, maxChars * CHAR_W + PAD_X * 2), h: rows.length * ROW_H + PAD_Y * 2 };
}

// ── clearY: bubble label past blocking dots ───────────────────────────────────
const DOT_R = 10, VGAP = 11;

// ── Multi-colour pie-chart dot stroke ─────────────────────────────────────────
// Draws the black dot with arc-segments around it, one per category colour.
// Uses stroke-dasharray so each arc covers 1/N of the circumference.
function drawPieDot(cx, cy, categories, parent) {
  const R  = DOT_R;
  const SW = 3;                          // stroke width
  const C  = 2 * Math.PI * (R + SW / 2); // circumference at stroke mid-point
  const unique = [...new Set(categories.map(c => catColor(c || '')))];
  const N  = unique.length;
  const seg = C / N;

  // Thin black outer border drawn FIRST (behind everything).
  // SW+2 makes it 1px wider each side than the coloured ring, so exactly 1px
  // of black peeks outside the colours while the inner part is covered by them.
  mk('circle', { cx, cy, r: R, fill: 'none', stroke: '#000', 'stroke-width': SW + 2 }, parent);

  // Black filled centre
  mk('circle', { cx, cy, r: R, fill: '#111827' }, parent);

  // White base ring so colours show clearly
  mk('circle', { cx, cy, r: R, fill: 'none', stroke: 'rgba(255,255,255,0.25)', 'stroke-width': SW }, parent);

  // One arc per colour, rotated so first arc starts at 12 o'clock
  unique.forEach((col, i) => {
    mk('circle', {
      cx, cy, r: R,
      fill: 'none',
      stroke: col,
      'stroke-width': SW,
      'stroke-dasharray': `${seg.toFixed(2)} ${(C - seg).toFixed(2)}`,
      'stroke-dashoffset': (C / 4 - i * seg).toFixed(2),
    }, parent);
  });
}

function buildItems(groups) {
  const allDots = groups.map(g => ({ cx: svgX(g.likelihood), cy: svgY(g.severity) }));
  const GAP = 5;  // minimum gap between any two elements
  const placedRects = [];

  // ── Exact collision checks ─────────────────────────────────────────────────

  // Rect-rect overlap
  function rectsOverlap(a, b) {
    return Math.min(a.x+a.w, b.x+b.w) - Math.max(a.x, b.x) > GAP &&
           Math.min(a.y+a.h, b.y+b.h) - Math.max(a.y, b.y) > GAP;
  }

  // Circle-rect overlap (nearest point on rect to circle centre)
  function circleRectOverlap(dcx, dcy, r, rect) {
    const nx = Math.max(rect.x, Math.min(rect.x+rect.w, dcx));
    const ny = Math.max(rect.y, Math.min(rect.y+rect.h, dcy));
    return (nx-dcx)**2 + (ny-dcy)**2 < (r+GAP)**2;
  }

  // Vertical line (at x=cx, y from y1 to y2) crossing a rect
  function lineRectCross(cx, y1, y2, rect) {
    const yLo = Math.min(y1,y2)+2, yHi = Math.max(y1,y2)-2;
    return cx > rect.x-1 && cx < rect.x+rect.w+1 && yHi > rect.y && yLo < rect.y+rect.h;
  }

  // Vertical line passing within DOT_R of a dot circle
  function lineDotCross(cx, y1, y2, dcx, dcy) {
    if (Math.abs(dcx-cx) >= DOT_R+GAP) return false;
    const yLo = Math.min(y1,y2)+2, yHi = Math.max(y1,y2)-2;
    return yHi > dcy-DOT_R && yLo < dcy+DOT_R;
  }

  // Is this rect position fully valid? (no label, no dot, connector clear)
  function isValid(rect, cx, cy) {
    // 1. label-label
    for (const r of placedRects) {
      if (rectsOverlap(rect, r)) return false;
    }
    // 2. label-dot (other dots only, using exact circle-rect check)
    for (const { cx: dcx, cy: dcy } of allDots) {
      if (dcx===cx && dcy===cy) continue;
      if (circleRectOverlap(dcx, dcy, DOT_R, rect)) return false;
    }
    // 3. connector clearance (straight vertical line at x=cx)
    const above  = rect.y + rect.h <= cy;
    const dotEdge   = above ? cy - DOT_R : cy + DOT_R;
    const labelEdge = above ? rect.y + rect.h : rect.y;
    const yMin = Math.min(dotEdge, labelEdge)+2, yMax = Math.max(dotEdge, labelEdge)-2;
    if (yMin < yMax) {
      for (const r of placedRects) {
        if (lineRectCross(cx, yMin, yMax, r)) return false;
      }
      for (const { cx: dcx, cy: dcy } of allDots) {
        if (dcx===cx && dcy===cy) continue;
        if (lineDotCross(cx, yMin, yMax, dcx, dcy)) return false;
      }
    }
    return true;
  }

  // Scan outward from dot in one direction until a valid position is found.
  // Step size = lh so we check one label-height slot at a time.
  function findValidY(cx, lw, lh, cy, dir) {
    const lx    = Math.max(LB.xMin, Math.min(LB.xMax-lw, cx-lw/2));
    const start = dir==='below' ? cy+DOT_R+VGAP : cy-DOT_R-VGAP-lh;
    const limit = dir==='below' ? LB.yMax-lh    : LB.yMin;
    const step  = dir==='below' ? 1 : -1;
    let   y     = start;
    let   iters = 0;
    while ((dir==='below' ? y<=limit : y>=limit) && iters++ < 800) {
      const rect = { x:lx, y, w:lw, h:lh };
      if (isValid(rect, cx, cy)) return y;
      // Jump past the nearest conflicting blocker in this direction
      let jump = lh + GAP;
      for (const r of placedRects) {
        if (Math.min(lx+lw, r.x+r.w) - Math.max(lx, r.x) <= GAP) continue;
        if (dir==='below' && r.y >= y && r.y < y+lh+GAP)
          jump = Math.min(jump, r.y+r.h+GAP - y);
        if (dir==='above' && r.y+r.h <= y+lh && r.y+r.h > y-GAP)
          jump = Math.min(jump, (y+lh) - r.y + GAP);
      }
      for (const { cx: dcx, cy: dcy } of allDots) {
        if (dcx===cx && dcy===cy) continue;
        if (Math.min(lx+lw, dcx+DOT_R+GAP) - Math.max(lx, dcx-DOT_R-GAP) <= 0) continue;
        if (dir==='below' && dcy >= y-DOT_R-GAP && dcy < y+lh+DOT_R+GAP)
          jump = Math.min(jump, dcy+DOT_R+GAP - y);
        if (dir==='above' && dcy+DOT_R+GAP >= y && dcy-DOT_R-GAP < y+lh)
          jump = Math.min(jump, (y+lh) - (dcy-DOT_R-GAP));
      }
      y += step * Math.max(1, Math.ceil(jump));
    }
    return null;
  }

  // Process highest severity first (most constrained labels place early)
  const ordered = [...groups].sort((a,b) => b.severity - a.severity);

  const placed = ordered.map(({ risks, likelihood, severity }) => {
    const cx  = svgX(likelihood), cy = svgY(severity);
    const ids = risks.map(r => r.id);
    const { rows, w: lw, h: lh } = getLabelLayout(ids);
    const lx  = Math.max(LB.xMin, Math.min(LB.xMax-lw, cx-lw/2));

    const yA = findValidY(cx, lw, lh, cy, 'above');
    const yB = findValidY(cx, lw, lh, cy, 'below');

    let ly;
    if (yA !== null && yB !== null) {
      ly = Math.abs(yA+lh/2-cy) <= Math.abs(yB+lh/2-cy) ? yA : yB;
    } else {
      ly = yA ?? yB ?? Math.max(LB.yMin, cy-DOT_R-VGAP-lh);
    }

    const rect = { x:lx, y:ly, w:lw, h:lh };
    placedRects.push(rect);
    return { groups:[{risks,cx,cy}], rows, rect };
  });

  return groups.map(g =>
    placed.find(it => it.groups[0].cx===svgX(g.likelihood) && it.groups[0].cy===svgY(g.severity))
  );
}

// ── Force resolution ──────────────────────────────────────────────────────────
function resolveCollisions(items) {
  const GAP = 5, MAX_ITER = 500;
  for (let iter = 0; iter < MAX_ITER; iter++) {
    let moved = false;
    for (let i = 0; i < items.length; i++) {
      for (let j = i + 1; j < items.length; j++) {
        const a = items[i].rect, b = items[j].rect;
        const ox = Math.min(a.x+a.w, b.x+b.w) - Math.max(a.x, b.x) + GAP;
        const oy = Math.min(a.y+a.h, b.y+b.h) - Math.max(a.y, b.y) + GAP;
        if (ox <= 0 || oy <= 0) continue;
        moved = true;
        if (ox <= oy) {
          const p = ox/2;
          if (a.x+a.w/2 < b.x+b.w/2) { a.x -= p; b.x += p; } else { a.x += p; b.x -= p; }
        } else {
          const p = oy/2;
          if (a.y+a.h/2 < b.y+b.h/2) { a.y -= p; b.y += p; } else { a.y += p; b.y -= p; }
        }
        for (const r of [a, b]) {
          r.x = Math.max(LB.xMin, Math.min(LB.xMax - r.w, r.x));
          r.y = Math.max(LB.yMin, Math.min(LB.yMax - r.h, r.y));
        }
      }
    }
    if (!moved) break;
  }
  // Horizontal dot clearance
  const DEXCL = DOT_R + 4;
  for (const item of items) {
    const r = item.rect;
    for (const other of items) {
      if (other === item) continue;
      for (const { cx: dcx, cy: dcy } of other.groups) {
        if (!(dcy+DEXCL > r.y && dcy-DEXCL < r.y+r.h)) continue;
        if (!(dcx+DEXCL > r.x && dcx-DEXCL < r.x+r.w)) continue;
        r.x = r.x+r.w/2 < dcx ? dcx-DEXCL-r.w : dcx+DEXCL;
        r.x = Math.max(LB.xMin, Math.min(LB.xMax-r.w, r.x));
      }
    }
  }
}

// ── Proximity merge ───────────────────────────────────────────────────────────
// Only merge pairs of adjacent labels (gap < MERGE_DIST) where the combined
// risk count stays ≤ MAX_MERGE_IDS. This prevents runaway cluster growth.
function mergeClose(items) {
  const MERGE_DIST    = 4;   // gap between label boxes to trigger merge
  const MAX_MERGE_IDS = 6;  // cap merged label at 6 risk IDs
  // Dots at different 0.5-unit snap positions are at least 60px apart (horizontal)
  // or 68px apart (vertical). Diagonal adjacent = ~91px. Cap below that so only
  // labels for horizontally or vertically adjacent dots (not diagonal) can merge.
  const MAX_DOT_DIST  = 80;

  function gap(a, b) {
    const gx = Math.max(0, Math.max(a.x, b.x) - Math.min(a.x+a.w, b.x+b.w));
    const gy = Math.max(0, Math.max(a.y, b.y) - Math.min(a.y+a.h, b.y+b.h));
    return Math.sqrt(gx*gx + gy*gy);
  }

  function countIds(item) {
    return item.groups.reduce((n, g) => n + g.risks.length, 0);
  }

  function buildMerged(a, b) {
    const allGroups = [...a.groups, ...b.groups];
    const allRisks  = allGroups.flatMap(g => g.risks);
    const { rows, w: lw, h: lh } = getLabelLayout(allRisks.map(r => r.id));
    const avgX = (a.rect.x + a.rect.w/2 + b.rect.x + b.rect.w/2) / 2;
    const avgY = (a.rect.y + a.rect.h/2 + b.rect.y + b.rect.h/2) / 2;
    const lx   = Math.max(LB.xMin, Math.min(LB.xMax-lw, avgX - lw/2));
    const ly   = Math.max(LB.yMin, Math.min(LB.yMax-lh, avgY - lh/2));
    return { groups: allGroups, rows, rect: { x: lx, y: ly, w: lw, h: lh } };
  }

  // Single pass: for each unmerged item, check if it can merge with the
  // next unmerged item that is close enough and within the ID cap.
  let current = [...items];
  let changed  = true;
  while (changed) {
    changed = false;
    const next = [];
    const used = new Set();
    for (let i = 0; i < current.length; i++) {
      if (used.has(i)) continue;
      let merged = false;
      for (let j = i + 1; j < current.length; j++) {
        if (used.has(j)) continue;
        if (gap(current[i].rect, current[j].rect) < MERGE_DIST &&
            countIds(current[i]) + countIds(current[j]) <= MAX_MERGE_IDS &&
            current[i].groups.every(ga => current[j].groups.every(gb => {
              const dx = ga.cx - gb.cx, dy = ga.cy - gb.cy;
              return Math.sqrt(dx*dx + dy*dy) <= MAX_DOT_DIST;
            }))) {
          next.push(buildMerged(current[i], current[j]));
          used.add(i); used.add(j);
          merged = true; changed = true;
          break;
        }
      }
      if (!merged) next.push(current[i]);
    }
    current = next;
  }
  return current;
}

// Nearest label-edge point to a dot
function connAnchor(cx, cy, rect) {
  const { x: lx, y: ly, w: lw, h: lh } = rect;
  const dx = (lx+lw/2) - cx, dy = (ly+lh/2) - cy;
  if (Math.abs(dy) >= Math.abs(dx))
    return dy > 0 ? { x: Math.max(lx, Math.min(lx+lw,cx)), y: ly }
                  : { x: Math.max(lx, Math.min(lx+lw,cx)), y: ly+lh };
  return dx > 0 ? { x: lx,    y: Math.max(ly, Math.min(ly+lh,cy)) }
                : { x: lx+lw, y: Math.max(ly, Math.min(ly+lh,cy)) };
}

// ── Gradient coords (anchored to data space so zoom/pan moves the colours) ────
function updateGradientCoords() {
  const g = document.getElementById('gDiag');
  // Anchor green at data(0,0) and red at data(5,5) in SVG pixel space
  g.setAttribute('x1', svgX(0).toFixed(1));
  g.setAttribute('y1', svgY(0).toFixed(1));
  g.setAttribute('x2', svgX(5).toFixed(1));
  g.setAttribute('y2', svgY(5).toFixed(1));
}

// Lite render — dots only, no label recalculation. Used during drag for
// smooth 60fps pan without the expensive buildItems/resolveCollisions pass.
function liteRender() {
  updateGradientCoords();
  const layer = document.getElementById('risks-layer');
  while (layer.firstChild) layer.removeChild(layer.firstChild);
  groupRisks(RISKS).forEach(({ risks, likelihood, severity }) => {
    const cx = svgX(likelihood), cy = svgY(severity);
    const dotG = mk('g', {}, layer);
    drawPieDot(cx, cy, risks.map(r => r.category || ''), dotG);
  });
}

// Per-corner rounded rect path. tl/tr/br/bl = corner radii (0 = square).
function roundedRectPath(x, y, w, h, tl, tr, br, bl) {
  const p = [`M ${x+tl},${y}`];
  p.push(`L ${x+w-tr},${y}`);
  p.push(tr ? `Q ${x+w},${y} ${x+w},${y+tr}` : `L ${x+w},${y}`);
  p.push(`L ${x+w},${y+h-br}`);
  p.push(br ? `Q ${x+w},${y+h} ${x+w-br},${y+h}` : `L ${x+w},${y+h}`);
  p.push(`L ${x+bl},${y+h}`);
  p.push(bl ? `Q ${x},${y+h} ${x},${y+h-bl}` : `L ${x},${y+h}`);
  p.push(`L ${x},${y+tl}`);
  p.push(tl ? `Q ${x},${y} ${x+tl},${y}` : `L ${x},${y}`);
  return p.join(' ') + ' Z';
}

// ── Static chart ──────────────────────────────────────────────────────────────
function renderStatic() {
  updateGradientCoords();
  const layer = document.getElementById('static-layer');
  const { x, y, w, h } = P;
  // Right corners are square when connected to the list; rounded when graph is alone
  const rRight = _graphAllRounded ? 20 : 0;
  mk('path', { d: roundedRectPath(x,y,w,h, 20,rRight,rRight,20), fill: 'url(#gDiag)' }, layer);

  // Allegion logo watermark — 80% of plot size, centred, above gradient, below grid lines
  const logoW = w * 0.8, logoH = h * 0.8;
  mk('image', {
    href: LOGO_SRC,
    x: x + (w - logoW) / 2, y: y + (h - logoH) / 2,
    width: logoW, height: logoH,
    opacity: 0.20,
    preserveAspectRatio: 'xMidYMid meet'
  }, layer);

  // Dynamic grid lines and labels for current VR (data view range)
  const STEP = 0.5;
  function rangeTicks(lo, hi) {
    const out = [], s = Math.ceil(lo/STEP)*STEP;
    for (let v=s; v<=hi+0.001; v+=STEP) out.push(parseFloat(v.toFixed(2)));
    return out;
  }
  const gcol = 'rgba(255,255,255,0.5)';
  rangeTicks(VR.xMin, VR.xMax).forEach(v => {
    const sx = svgX(v);
    if (sx < x-1 || sx > x+w+1) return;
    mk('line',{x1:sx,y1:y,x2:sx,y2:y+h,stroke:gcol,'stroke-width':v===Math.round(v)?1.0:0.4},layer);
    if (v >= 0.99)
      mktxt(v.toFixed(1),{x:sx,y:y+h+16,'text-anchor':'middle','font-size':10,fill:'#444','font-family':AXIS_FONT},layer);
  });
  rangeTicks(VR.yMin, VR.yMax).forEach(v => {
    const sy = svgY(v);
    if (sy < y-1 || sy > y+h+1) return;
    mk('line',{x1:x,y1:sy,x2:x+w,y2:sy,stroke:gcol,'stroke-width':v===Math.round(v)?1.0:0.4},layer);
    if (v >= 0.99)
      mktxt(v.toFixed(1),{x:x-8,y:sy+4,'text-anchor':'end','font-size':10,fill:'#444','font-family':AXIS_FONT},layer);
  });
  if (VR.xMin<=2.5 && VR.xMax>=2.5)
    mk('line',{x1:svgX(2.5),y1:y,x2:svgX(2.5),y2:y+h,stroke:'rgba(0,0,0,0.45)','stroke-width':2},layer);
  if (VR.yMin<=2.5 && VR.yMax>=2.5)
    mk('line',{x1:x,y1:svgY(2.5),x2:x+w,y2:svgY(2.5),stroke:'rgba(0,0,0,0.45)','stroke-width':2},layer);
  // Graph border — open path (no right edge); card draws the matching right+top+bottom border
  const BSTROKE = 'rgba(0,0,0,0.45)';
  if (_graphAllRounded) {
    mk('path',{d:roundedRectPath(x,y,w,h,20,20,20,20),fill:'none',stroke:BSTROKE,'stroke-width':1.5},layer);
  } else {
    const gBorder = `M ${x+w},${y} L ${x+20},${y} Q ${x},${y} ${x},${y+20} L ${x},${y+h-20} Q ${x},${y+h} ${x+20},${y+h} L ${x+w},${y+h}`;
    mk('path',{d:gBorder,fill:'none',stroke:BSTROKE,'stroke-width':1.5},layer);
  }
  mktxt('Likelihood',{x:x+w/2,y:y+h+34,'text-anchor':'middle','font-size':13,'font-weight':600,fill:'#333','font-family':AXIS_FONT},layer);
  const sev=mktxt('Severity',{'text-anchor':'middle','font-size':13,'font-weight':600,fill:'#333','font-family':AXIS_FONT,transform:`rotate(-90,${x-44},${y+h/2})`},layer);
  sev.setAttribute('x',x-44); sev.setAttribute('y',y+h/2);
}

// ── Render risks ──────────────────────────────────────────────────────────────
function renderRisks() {
  // Reset dim state — old dotG elements are about to be destroyed so mouseleave won't fire
  _dimCount = 0;
  document.getElementById('legend-layer').classList.remove('legend-dimmed');
  Object.keys(dotGroupByRiskId).forEach(k => delete dotGroupByRiskId[k]);
  Object.keys(dotRisksGroupById).forEach(k => delete dotRisksGroupById[k]);
  const layer  = document.getElementById('risks-layer');
  const groups = groupRisks(RISKS);
  let items    = buildItems(groups);
  resolveCollisions(items);
  items = mergeClose(items);

  items.forEach(({ groups: grps, rows, rect }) => {
    const { x: lx, y: ly, w: lw, h: lh } = rect;

    // Dominant category for border colour (most common in this label)
    const cats = grps.flatMap(g => g.risks.map(r => r.category || ''));
    const freq = {}; cats.forEach(c => { freq[c] = (freq[c]||0)+1; });
    const domCat = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';
    const borderCol = catColor(domCat);

    const g = mk('g', { class: 'risk-group' }, layer);

    // Label box (drawn first so connectors and dots appear on top)
    mk('rect', { class: 'label-box', x: lx, y: ly, width: lw, height: lh, rx: 3,
                 fill: '#2D2D2E', stroke: borderCol, 'stroke-width': 1.5 }, g);

    // Text: each ID coloured by its category using tspan elements
    const allIds = grps.flatMap(gr => gr.risks.map(r => r.id));
    const layout = getLabelLayout(allIds);
    layout.rows.forEach((row, i) => {
      const textEl = mk('text', {
        class: 'label-text',
        x: lx + lw / 2, y: ly + PAD_Y + (i + 0.82) * ROW_H,
        'text-anchor': 'middle', 'font-size': 9.5, 'font-weight': 700, 'font-family': FONT
      }, g);
      row.forEach((id, idx) => {
        const span = document.createElementNS(NS, 'tspan');
        span.textContent = id;
        span.setAttribute('fill', catColor(ID_TO_CAT[id] || ''));
        textEl.appendChild(span);
        if (idx < row.length - 1) {
          const sep = document.createElementNS(NS, 'tspan');
          sep.textContent = '  '; sep.setAttribute('fill', '#aaa');
          textEl.appendChild(sep);
        }
      });
    });

    // Per-dot: connector + dot + individual tooltip (only that dot's risks)
    grps.forEach(({ risks: grpRisks, cx, cy }) => {
      const col    = catColor(grpRisks[0]?.category || '');
      const anchor = connAnchor(cx, cy, rect);
      const dotG   = mk('g', { class: 'dot-hover' }, g);

      grpRisks.forEach(r => { dotGroupByRiskId[r.id] = dotG; dotRisksGroupById[r.id] = grpRisks; });

      // Thicker, more visible connector with category colour
      // Bezier connector when dot sits exactly on the 2.5 quadrant line
      // (straight connector would fuse visually with the thick axis)
      if (Math.abs(cx - svgX(2.5)) < 3) {
        const mid = { x: cx + 32, y: (cy + anchor.y) / 2 };
        mk('path', {
          class: 'conn-line',
          d: 'M '+cx+' '+cy+' Q '+mid.x+' '+mid.y+' '+anchor.x+' '+anchor.y,
          stroke: col, 'stroke-width': 1.8, fill: 'none', opacity: 0.85
        }, dotG);
      } else {
        mk('line', { class: 'conn-line', x1: cx, y1: cy, x2: anchor.x, y2: anchor.y,
                     stroke: col, 'stroke-width': 1.8, opacity: 0.85 }, dotG);
      }

      const scaleG = mk('g', { class: 'dot-scale-wrapper' }, dotG);
      const spinG = mk('g', { class: 'dot-spin' }, scaleG);
      drawPieDot(cx, cy, grpRisks.map(r => r.category || ''), spinG);

      dotG.addEventListener('mouseenter', e => {
        showTip(e, grpRisks);
        grpRisks.forEach(r => {
          const row = legendRowByRiskId[r.id];
          if (row) row.classList.add('legend-row-hl');
        });
        dimLegend(true);
      });
      dotG.addEventListener('mousemove',  moveTip);
      dotG.addEventListener('mouseleave', () => {
        hideTip();
        grpRisks.forEach(r => {
          const row = legendRowByRiskId[r.id];
          if (row) row.classList.remove('legend-row-hl');
        });
        dimLegend(false);
      });
      dotG.addEventListener('click', e => { e.stopPropagation(); openModal(grpRisks); });
    });
  });
}

function updateCatFilterBtn() {
  const btn = document.getElementById('cat-filter-btn');
  const lbl = document.getElementById('cat-filter-label');
  const hidden = _hiddenCatColors.size;
  if (hidden === 0) {
    lbl.textContent = 'All Categories';
    btn.classList.remove('filtered');
  } else {
    lbl.textContent = `${CAT_LABELS.length - hidden} of ${CAT_LABELS.length} shown`;
    btn.classList.add('filtered');
  }
}

function openCatDropdown() {
  const dd  = document.getElementById('cat-dropdown');
  const btn = document.getElementById('cat-filter-btn');
  dd.classList.remove('closing');
  void dd.offsetWidth; // reflow — restarts animation if mid-close
  dd.classList.add('open');
  btn.classList.add('open');
  document.getElementById('cat-list-overlay').classList.add('dd-open');
}

function closeCatDropdown() {
  const dd  = document.getElementById('cat-dropdown');
  const btn = document.getElementById('cat-filter-btn');
  if (!dd.classList.contains('open')) return;
  dd.classList.add('closing');
  btn.classList.remove('open');
  document.getElementById('cat-list-overlay').classList.remove('dd-open');
  dd.addEventListener('animationend', () => {
    dd.classList.remove('open', 'closing');
  }, { once: true });
}

function buildCatDropdown() {
  const dd = document.getElementById('cat-dropdown');
  dd.innerHTML = '';
  CAT_LABELS.forEach(([label, col]) => {
    const row = document.createElement('div');
    row.className = 'cat-dd-row' + (_hiddenCatColors.has(col) ? ' off' : '');
    row.innerHTML =
      `<span class="cat-dd-dot" style="background:${col}"></span>` +
      `<span class="cat-dd-label" style="color:${col}">${label}</span>` +
      `<span class="cat-dd-check">✓</span>`;
    catKeyElByColor[col] = row;
    row.addEventListener('click', e => {
      e.stopPropagation();
      const isHiding = !_hiddenCatColors.has(col);
      if (isHiding) _hiddenCatColors.add(col); else _hiddenCatColors.delete(col);
      updateCatFilter(col, isHiding);
      updateCatFilterBtn();
    });
    dd.appendChild(row);
  });

  // Open/close toggle
  document.getElementById('cat-filter-btn').addEventListener('click', e => {
    e.stopPropagation();
    dd.classList.contains('open') ? closeCatDropdown() : openCatDropdown();
  });
  // Click outside closes dropdown
  document.addEventListener('click', () => closeCatDropdown());
}

function positionRiskHeader() {
  const r = hm.getBoundingClientRect();
  if (!r.width || !r.height) return;
  const scale   = Math.min(r.width / 1300, r.height / 780);
  const offsetX = (r.width  - 1300 * scale) / 2;
  const offsetY = (r.height -  780  * scale) / 2;

  // Card geometry — must match renderLegend() constants
  const CARD_TPAD = 52;
  const cardLeft  = (LEG_X - 40) * scale + offsetX + r.left;
  const cardTop   = P.y * scale + offsetY + r.top;
  const cardW     = 490 * scale;
  const h         = CARD_TPAD * scale;  // header height in CSS px

  const bar = document.getElementById('risk-header-bar');
  bar.style.left         = cardLeft + 'px';
  bar.style.top          = cardTop  + 'px';
  bar.style.width        = cardW    + 'px';
  bar.style.height       = h        + 'px';
  // Match SVG card's rx=20 corner radius exactly at current scale
  const rx = Math.round(20 * scale);
  bar.style.borderRadius = `0 ${rx}px 0 0`;  // left edge flush with graph; only top-right rounded

  // Column alignment: "#" at SVG x≈777 (one "R" char past R01 start at x=770)
  //                   "RISK NAME" at SVG x=808 (= lx+38, where name text starts)
  // Total from padding-left to RISK NAME = 31 SVG units, split as:
  //   #rh-id width (border-box, includes border+padding) + margin-right
  const DIV_GAP = 6;  // px: gap between border line and RISK NAME
  bar.style.setProperty('--rh-pad-l',  Math.round(47 * scale)                               + 'px');
  bar.style.setProperty('--rh-pad-r',  Math.max(8, Math.round(h * 0.18))                    + 'px');
  bar.style.setProperty('--rh-id-w',   Math.max(14, Math.round(31 * scale) - DIV_GAP)       + 'px');
  bar.style.setProperty('--rh-id-mr',  DIV_GAP                                               + 'px');
  bar.style.setProperty('--rh-id-pr',  Math.max(3, Math.round(3 * scale))                   + 'px');
  bar.style.setProperty('--rh-col-font',  Math.max(9,  Math.round(h * 0.26)) + 'px');
  bar.style.setProperty('--rh-btn-font',  Math.max(11, Math.round(h * 0.30)) + 'px');
  bar.style.setProperty('--rh-btn-pad-v', Math.max(3,  Math.round(h * 0.14)) + 'px');
  bar.style.setProperty('--rh-btn-pad-h', Math.max(8,  Math.round(h * 0.22)) + 'px');
  bar.style.setProperty('--rh-btn-r',     Math.max(4, rx)                    + 'px');
  bar.style.setProperty('--rh-div-mx',    Math.max(5,  Math.round(h * 0.18)) + 'px');
  // Dropdown items scale with header so they're legible at any iframe size
  bar.style.setProperty('--rh-dd-font',   Math.max(12, Math.round(h * 0.36)) + 'px');
  bar.style.setProperty('--rh-dd-dot',    Math.max(10, Math.round(h * 0.26)) + 'px');
  bar.style.setProperty('--rh-dd-pad-v',  Math.max(6,  Math.round(h * 0.18)) + 'px');
  bar.style.setProperty('--rh-dd-pad-h',  Math.max(12, Math.round(h * 0.30)) + 'px');
  bar.style.setProperty('--rh-dd-min-w',  Math.max(210, Math.round(300 * scale)) + 'px');

  // Size the cat-filter overlay to cover the card body (everything below the header bar)
  const overlay = document.getElementById('cat-list-overlay');
  overlay.style.left         = cardLeft + 'px';
  overlay.style.top          = (cardTop + h) + 'px';
  overlay.style.width        = cardW + 'px';
  overlay.style.height       = Math.max(0, P.h * scale - h) + 'px';
  overlay.style.borderRadius = `0 0 ${rx}px ${rx}px`;

  // Size the modal backdrop to cover graph + risk list only (not full viewport)
  const plotLeft = P.x * scale + offsetX + r.left;
  const plotTop  = P.y * scale + offsetY + r.top;
  const mol = document.getElementById('risk-modal-overlay');
  mol.style.left         = plotLeft + 'px';
  mol.style.top          = plotTop  + 'px';
  mol.style.width        = ((P.w + 490) * scale) + 'px';  // graph width + risk list width
  mol.style.height       = (P.h * scale) + 'px';
  mol.style.borderRadius = rx + 'px';
}

// ── Legend ────────────────────────────────────────────────────────────────────
function renderLegend() {
  const layer = document.getElementById('legend-layer');
  const lx    = LEG_X;

  const sorted = [...RISKS].sort((a,b) =>
    parseInt(a.id.replace(/\D/g,''),10) - parseInt(b.id.replace(/\D/g,''),10)
  );

  // Card sizing — fills from graph-top to graph-bottom
  const CARD_PADX = 40;
  const CARD_TPAD = 52;  // header bar zone (HTML overlay covers this area)
  const CARD_BPAD = 8;   // snug below last row
  const CARD_W    = 490;
  const HDR_H     = 18;  // gap below header bar — must clear chevron circle tops
  const RISK_H    = (P.h - CARD_TPAD - HDR_H - CARD_BPAD) / sorted.length;
  const fontSize  = Math.min(11, Math.max(8.5, RISK_H * 0.78));
  const cardListH = P.h;  // always matches graph height exactly (top + bottom edges flush)

  // Backer card — left edge flush with graph right; right corners match graph's left corner rx=20
  const cx = lx - CARD_PADX, cw = CARD_W, cy = P.y, ch = cardListH, cr = 20;
  mk('path', { d: roundedRectPath(cx, cy, cw, ch, 0, cr, cr, 0), fill: '#2D2D2E' }, layer);
  // Card border — open path (no left edge); matches graph's open right+top+bottom exposed sides
  const cBorder = `M ${cx},${cy} L ${cx+cw-cr},${cy} Q ${cx+cw},${cy} ${cx+cw},${cy+cr} L ${cx+cw},${cy+ch-cr} Q ${cx+cw},${cy+ch} ${cx+cw-cr},${cy+ch} L ${cx},${cy+ch}`;
  mk('path',{d:cBorder,fill:'none',stroke:'rgba(0,0,0,0.45)','stroke-width':1.5},layer);

  // Clip path so scaled rows can't overflow the card right edge
  const defs = document.querySelector('#hm defs');
  const existingClip = document.getElementById('risk-list-clip');
  if (existingClip) existingClip.remove();
  const clipEl = mk('clipPath', { id: 'risk-list-clip' }, defs);
  mk('rect', { x: lx - CARD_PADX, y: P.y, width: CARD_W, height: cardListH }, clipEl);
  // Wrapper: clip-path on parent so row scale transforms don't carry the clip with them
  const listWrap = mk('g', { 'clip-path': 'url(#risk-list-clip)' }, layer);

  // Risk list inside card (HTML header bar covers the CARD_TPAD zone; rows start below)
  let y = P.y + CARD_TPAD + HDR_H;

  sorted.forEach((r, idx) => {
    const col  = catColor(r.category || '');
    const name = r.name.length > 72 ? r.name.slice(0,70)+'…' : r.name;

    // Hairline separator exactly halfway between rows (true center of the gap)
    if (idx > 0) {
      mk('line', {
        x1: lx - CARD_PADX + 6, y1: y - Math.round(RISK_H * 0.68),
        x2: lx - CARD_PADX + CARD_W - 6, y2: y - Math.round(RISK_H * 0.68),
        stroke: '#3A3B3C', 'stroke-width': 0.5
      }, listWrap);
    }

    const rowG = mk('g', { class: 'legend-row' }, listWrap);
    legendRowByRiskId[r.id] = rowG;
    // Transparent full-width hit rect — closes the gaps between chevron/ID/name
    // fill:"transparent" (not "none") is required; SVG treats it as painted for pointer events
    mk('rect', {
      x: lx - CARD_PADX, y: y - Math.round(RISK_H * 0.5),
      width: CARD_W,      height: RISK_H,
      fill: 'transparent'
    }, rowG);
    const chevR = Math.max(5, Math.round(fontSize * 0.62));
    const chevX = lx - CARD_PADX + chevR + 12;
    const chevCy = y - Math.round(fontSize * 0.3);
    const chevG = mk('g', { class: 'legend-chevron' }, rowG);
    mk('circle', { cx: chevX, cy: chevCy, r: chevR, fill: col }, chevG);
    const s = chevR * 0.5;
    mk('path', {
      d: `M ${(chevX-s*0.7).toFixed(1)} ${(chevCy-s).toFixed(1)} L ${(chevX+s*0.7).toFixed(1)} ${chevCy.toFixed(1)} L ${(chevX-s*0.7).toFixed(1)} ${(chevCy+s).toFixed(1)}`,
      stroke: '#2D2D2E', 'stroke-width': (Math.max(1.5, chevR*0.28)).toFixed(1),
      'stroke-linecap': 'round', 'stroke-linejoin': 'round', fill: 'none'
    }, chevG);
    // ID in category color (accent); name in neutral — corporate data-table convention
    mktxt(r.id,  {x:lx,    y,'font-size':fontSize,'font-weight':700,fill:col,      'font-family':FONT}, rowG);
    mktxt(name,  {x:lx+38, y,'font-size':fontSize,'font-weight':500,fill:'#BEC0C6','font-family':FONT}, rowG);
    rowG.addEventListener('mouseenter', () => {
      _activeLegendRows.add(r.id);
      rowG.classList.add('legend-row-hl');
      const dg = dotGroupByRiskId[r.id];
      if (dg) dg.classList.add('dot-force-highlight');
      dimLegend(true);
      _panDelay = setTimeout(() => panToRisk(r), 500);
    });
    rowG.addEventListener('mouseleave', () => {
      _activeLegendRows.delete(r.id);
      clearTimeout(_panDelay); _panDelay = null;
      rowG.classList.remove('legend-row-hl');
      const dg = dotGroupByRiskId[r.id];
      if (dg) dg.classList.remove('dot-force-highlight');
      dimLegend(false);
    });
    rowG.addEventListener('click', () => {
      const grp = dotRisksGroupById[r.id];
      const fullRisks = (grp || [r]).map(gr => RISKS.find(fr => fr.id === gr.id) || gr);
      const tab = fullRisks.findIndex(fr => fr.id === r.id);
      openModal(fullRisks, Math.max(0, tab));
    });
    y += RISK_H;
  });

}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const TIP = document.getElementById('tooltip');
// Sequence number — increment to cancel any in-flight delay
let _tipSeq = 0;

function showTip(e, risks) {
  const l = risks[0]?.likelihood ?? 0;
  const s = risks[0]?.severity   ?? 0;
  TIP.innerHTML = risks.map(r =>
    `<div class="tt-row"><span class="tt-id" style="color:${catColor(r.category||'')}">${r.id}</span><span class="tt-nm">${r.name}</span></div>`
  ).join('') + `<div class="tt-div"></div>
  <div class="tt-stat">Likelihood: <span class="tt-val">${snap(l).toFixed(1)}</span>
    &nbsp;|&nbsp; Severity: <span class="tt-val">${snap(s).toFixed(1)}</span></div>
  <div class="tt-stat">Risk Score: <span class="tt-val">${(snap(l)*snap(s)).toFixed(2)}</span></div>`;
  moveTip(e);  // position while invisible so it won't jump when it appears
  const seq = ++_tipSeq;
  // setTimeout for wall-clock delay (refresh-rate independent), then rAF to land
  // at the start of a paint frame so the CSS opacity transition fires cleanly.
  setTimeout(() => {
    if (_tipSeq !== seq) return;
    requestAnimationFrame(() => {
      if (_tipSeq !== seq) return;
      void TIP.offsetWidth;              // commit opacity:0 state before transitioning
      TIP.classList.add('tt-visible');
    });
  }, 400);
}
function getRiskListLeftPx() {
  const svgEl = document.getElementById('hm');
  if (!svgEl) return window.innerWidth * 0.56;
  const ctm = svgEl.getScreenCTM();
  if (!ctm) return window.innerWidth * 0.56;
  const pt = svgEl.createSVGPoint();
  pt.x = P.x + P.w;  // SVG x=730 — left edge of risk list card
  pt.y = 0;
  return pt.matrixTransform(ctm).x;
}
function moveTip(e) {
  const tw=TIP.offsetWidth, th=TIP.offsetHeight;
  const rightBound = getRiskListLeftPx() - 12;  // stop 12px before risk list

  // Prefer tooltip left of cursor
  let tx = e.clientX - tw - 16;
  if (tx < 8) {
    // Not enough room on left — try right side only if it clears the risk list
    const rightTx = e.clientX + 16;
    tx = (rightTx + tw <= rightBound) ? rightTx : 8;
  } else if (tx + tw > rightBound) {
    // Left-side tooltip bleeds into risk list — push it further left
    tx = Math.max(8, rightBound - tw);
  }

  let ty = e.clientY - 10;
  if (ty + th > window.innerHeight - 8) ty = e.clientY - th - 4;
  TIP.style.left=tx+'px'; TIP.style.top=ty+'px';
}
function hideTip() {
  ++_tipSeq;  // invalidates any pending rAF delay chain
  TIP.classList.remove('tt-visible');
}

// ── Risk detail modal with tabs ───────────────────────────────────────────────
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
let _modalRisks = [];  // risks currently shown in the modal

function openModal(risks, initialTab) {
  hideTip();
  _activeTabIdx = null;  // reset so first switchModalTab call skips animation
  const allRisks = risks.map(r => RISKS.find(fr => fr.id === r.id) || r);
  _modalRisks = allRisks.filter(r => !_hiddenCatColors.has(catColor(r.category || '')));
  if (!_modalRisks.length) return;
  // Adjust initialTab to point to the same risk in filtered array
  if (initialTab != null && allRisks[initialTab]) {
    const tid = allRisks[initialTab].id;
    const ni = _modalRisks.findIndex(r => r.id === tid);
    if (ni >= 0) initialTab = ni; else initialTab = 0;
  }

  // Build tabs — one per risk ID
  const tabsEl = document.getElementById('risk-modal-tabs');
  tabsEl.innerHTML = '';
  if (_modalRisks.length > 1) {
    _modalRisks.forEach((r, idx) => {
      const btn = document.createElement('button');
      const col = catColor(r.category || '') || '#666';
      btn.className   = 'modal-tab' + (idx === 0 ? ' active' : '');
      btn.textContent = r.id;
      // Inactive: subtle category tint; active styling applied in switchModalTab
      btn.style.backgroundColor = hexToRgba(col, 0.22);
      btn.style.color            = col;
      btn.style.borderColor      = hexToRgba(col, 0.5);
      btn.dataset.col            = col;  // store for later updates
      btn.onclick = () => switchModalTab(idx);
      tabsEl.appendChild(btn);
    });
    tabsEl.style.display = 'flex';
    document.getElementById('modal-sep').style.display = '';
  } else {
    tabsEl.style.display = 'none';
    document.getElementById('modal-sep').style.display = 'none';
  }

  switchModalTab(initialTab || 0);
  document.getElementById('risk-modal').classList.add('open');
}

let _activeTabIdx = null;  // null = modal not currently shown

function _updateModalContent(idx) {
  const r = _modalRisks[idx] || {};
  const idEl = document.getElementById('risk-modal-id');
  idEl.textContent = r.id || '';
  idEl.style.color = catColor(r.category || '');
  document.getElementById('risk-modal-name').textContent  = r.name       || '';
  document.getElementById('modal-definition').textContent = r.definition || '—';
  document.getElementById('modal-status').textContent     = r.status     || '—';
  document.getElementById('modal-owner').textContent      = r.owner      || '—';
  document.getElementById('modal-managers').textContent   = r.managers   || '—';
}

function switchModalTab(idx) {
  const isFirstRender = (_activeTabIdx === null);
  const dir = (!isFirstRender && idx > _activeTabIdx) ? 1 : -1;
  _activeTabIdx = idx;

  // Update tab button styles
  document.querySelectorAll('.modal-tab').forEach((t, i) => {
    const col = t.dataset.col || '#666';
    if (i === idx) {
      t.classList.add('active');
      t.style.backgroundColor = hexToRgba(col, 0.85);
      t.style.borderColor     = col;
      t.style.color           = '#000';
    } else {
      t.classList.remove('active');
      t.style.backgroundColor = hexToRgba(col, 0.22);
      t.style.borderColor     = hexToRgba(col, 0.5);
      t.style.color           = '#000';
    }
  });

  const newColor = document.querySelectorAll('.modal-tab')[idx]?.dataset.col || '#5A5A5C';
  const sep   = document.getElementById('modal-sep');
  const sweep = document.getElementById('modal-sep-sweep');

  if (isFirstRender) {
    // No animation on initial open — set directly
    sep.style.setProperty('--sep-color', newColor);
    _updateModalContent(idx);
    return;
  }

  // ── Separator colour sweep ────────────────────────────────────────────────
  sweep.style.background = newColor;
  sweep.classList.remove('sweeping');
  void sweep.offsetWidth;
  sweep.classList.add('sweeping');
  sweep.addEventListener('transitionend', () => {
    sep.style.setProperty('--sep-color', newColor);
    sweep.classList.remove('sweeping');
    // Clear inline overrides so base CSS scaleX(0) takes over cleanly next time
    sweep.style.transform  = '';
    sweep.style.transition = '';
  }, { once: true });

  // ── Height animation setup — pin current height before content changes ────
  const box = document.getElementById('risk-modal-box');
  const pinnedH = box.offsetHeight;
  box.style.transition = 'none';
  box.style.height = pinnedH + 'px';

  // ── Content directional slide ─────────────────────────────────────────────
  const content = document.getElementById('modal-tab-content');
  // Rapid click mid-animation — bail to immediate update
  if (content.classList.contains('tab-exit') || content.classList.contains('tab-enter')) {
    content.classList.remove('tab-exit', 'tab-enter');
    _updateModalContent(idx);
    _animateBoxToAutoHeight(box, pinnedH);
    return;
  }
  content.dataset.dir = dir;
  content.classList.add('tab-exit');
  content.addEventListener('animationend', () => {
    content.classList.remove('tab-exit');
    _updateModalContent(idx);
    _animateBoxToAutoHeight(box, pinnedH);
    void content.offsetWidth;
    content.classList.add('tab-enter');
    content.addEventListener('animationend', () => content.classList.remove('tab-enter'), { once: true });
  }, { once: true });
}

function _animateBoxToAutoHeight(box, fromH) {
  // Measure the new natural height
  box.style.height = 'auto';
  const toH = box.offsetHeight;
  if (toH === fromH) { box.style.height = ''; box.style.transition = ''; return; }
  // Snap back to old height, then transition to new
  box.style.height = fromH + 'px';
  void box.offsetWidth;
  box.style.transition = 'height 0.44s cubic-bezier(0.165, 0.84, 0.44, 1)';
  box.style.height = toH + 'px';
  box.addEventListener('transitionend', function h(e) {
    if (e.propertyName !== 'height') return;
    box.removeEventListener('transitionend', h);
    box.style.height = '';
    box.style.transition = '';
  });
}

function closeModal() {
  const modal = document.getElementById('risk-modal');
  if (!modal.classList.contains('open')) return;
  modal.classList.add('closing');
  // Overlay carries the 0.20s closing animation — listen there for animationend
  document.getElementById('risk-modal-overlay').addEventListener('animationend', () => {
    modal.classList.remove('open', 'closing');
  }, { once: true });
}

// Keyboard: Escape closes, Left/Right arrows switch tabs
document.addEventListener('keydown', e => {
  if (!document.getElementById('risk-modal').classList.contains('open')) return;
  if (e.key === 'Escape') { closeModal(); return; }
  const tabs = document.querySelectorAll('.modal-tab');
  if (!tabs.length) return;
  const cur = [...tabs].findIndex(t => t.classList.contains('active'));
  if (e.key === 'ArrowRight') switchModalTab((cur + 1) % _modalRisks.length);
  if (e.key === 'ArrowLeft')  switchModalTab((cur - 1 + _modalRisks.length) % _modalRisks.length);
});

// Renders moved to after event listeners — see bottom of script

// ── Label toggle ──────────────────────────────────────────────────────────────
let labelsVisible = true;
function toggleLabels() {
  labelsVisible = !labelsVisible;
  document.getElementById('risks-layer').classList.toggle('labels-off', !labelsVisible);
  const btn = document.getElementById('label-toggle');
  btn.textContent = labelsVisible ? 'Labels' : 'Labels Off';
  btn.classList.toggle('active', !labelsVisible);
}

// ── Data-range Zoom / Pan ────────────────────────────────────────────────────
// The plot square stays fixed in size. Zoom changes VR (the visible data range).
// svgX/svgY automatically map the new range into the same plot pixels.
// Re-rendering updates axis ticks, dots, and labels.
const hm = document.getElementById('hm');

// Pin zoom pill directly below "Likelihood" label in SVG space
function positionCtrl() {
  const r = hm.getBoundingClientRect();
  if (!r.width || !r.height) return;
  const scale   = Math.min(r.width / 1300, r.height / 780);
  const offsetX = (r.width  - 1300 * scale) / 2;
  const offsetY = (r.height - 780  * scale) / 2;
  const ctrl = document.getElementById('zoom-ctrl');
  ctrl.style.left      = (r.left + offsetX + 430 * scale) + 'px';
  // Pin 10px below the "Likelihood" label (SVG y=734), clamped so it never leaves view
  const pillTop = r.top + offsetY + 734 * scale + 10;
  ctrl.style.top    = Math.min(pillTop, window.innerHeight - 50) + 'px';
  ctrl.style.bottom = 'auto';
  ctrl.style.transform = 'translateX(-50%)';
}

function updateResetBtn() {
  const atDefault = Math.abs(VR.xMin) < 0.001 && Math.abs(VR.xMax - 5) < 0.001 &&
                    Math.abs(VR.yMin) < 0.001 && Math.abs(VR.yMax - 5) < 0.001;
  document.getElementById('zoom-reset').classList.toggle('reset-active', !atDefault);
}

function rerender() {
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  hideTip();
  updateResetBtn();
  _dimCount = 0;
  document.getElementById('legend-layer').classList.remove('legend-dimmed');
  ['static-layer','risks-layer'].forEach(id => {
    const el = document.getElementById(id);
    while (el.firstChild) el.removeChild(el.firstChild);
  });
  renderStatic();
  renderRisks();
  positionCtrl();
  _reapplyLegendHighlights();
}

// Labels fade out at zoom start; 50ms debounce before fade-in so rapid scroll
// events don't flicker them in and out between each 180ms animation.
let _zoomFadeIn = null;
const _zoomRL = () => document.getElementById('risks-layer');

function doZoom(factor, pivDX, pivDY, dur = 300) {
  const cx = (pivDX != null) ? pivDX : (VR.xMin + VR.xMax) / 2;
  const cy = (pivDY != null) ? pivDY : (VR.yMin + VR.yMax) / 2;
  const nxMin = cx - (cx - VR.xMin) / factor;
  const nxMax = cx + (VR.xMax - cx) / factor;
  const nyMin = cy - (cy - VR.yMin) / factor;
  const nyMax = cy + (VR.yMax - cy) / factor;
  if (nxMax - nxMin > 5.001 || nyMax - nyMin > 5.001) return;

  let tXMin = nxMin, tXMax = nxMax, tYMin = nyMin, tYMax = nyMax;
  const _xrz = tXMax - tXMin, _yrz = tYMax - tYMin;
  if (tXMin < 0) { tXMin = 0; tXMax = _xrz; }
  if (tXMax > 5) { tXMax = 5; tXMin = 5 - _xrz; }
  if (tYMin < 0) { tYMin = 0; tYMax = _yrz; }
  if (tYMax > 5) { tYMax = 5; tYMin = 5 - _yrz; }

  _zoomRL().classList.add('zooming');  // labels start fading out (CSS transition)
  clearTimeout(_zoomFadeIn);           // cancel any pending fade-in
  const aXMin = VR.xMin, aXMax = VR.xMax, aYMin = VR.yMin, aYMax = VR.yMax;
  const t0 = performance.now();
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    VR.xMin = aXMin + (tXMin - aXMin) * e;  VR.xMax = aXMax + (tXMax - aXMax) * e;
    VR.yMin = aYMin + (tYMin - aYMin) * e;  VR.yMax = aYMax + (tYMax - aYMax) * e;
    _fastRerender();
    if (p < 1) { _panAnim = requestAnimationFrame(step); }
    else {
      VR.xMin=tXMin; VR.xMax=tXMax; VR.yMin=tYMin; VR.yMax=tYMax;
      rerender();  // places labels at correct positions (still opacity:0)
      _panAnim = null;
      _zoomFadeIn = setTimeout(() => _zoomRL().classList.remove('zooming'), 50);
    }
  }
  _panAnim = requestAnimationFrame(step);
}

function resetView() {
  _zoomRL().classList.add('zooming');
  clearTimeout(_zoomFadeIn);
  const aXMin=VR.xMin, aXMax=VR.xMax, aYMin=VR.yMin, aYMax=VR.yMax;
  const tXMin=0, tXMax=5, tYMin=0, tYMax=5;
  const dur = 420; const t0 = performance.now();
  if (_panAnim) { cancelAnimationFrame(_panAnim); _panAnim = null; }
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    VR.xMin = aXMin+(tXMin-aXMin)*e; VR.xMax = aXMax+(tXMax-aXMax)*e;
    VR.yMin = aYMin+(tYMin-aYMin)*e; VR.yMax = aYMax+(tYMax-aYMax)*e;
    _fastRerender();
    if (p < 1) { _panAnim = requestAnimationFrame(step); }
    else {
      VR={xMin:0,xMax:5,yMin:0,yMax:5}; rerender(); _panAnim=null;
      _zoomFadeIn = setTimeout(() => _zoomRL().classList.remove('zooming'), 50);
    }
  }
  _panAnim = requestAnimationFrame(step);
}

function screenToData(clientX, clientY) {
  const r = hm.getBoundingClientRect();
  const sx = (clientX - r.left) / r.width  * 1300;
  const sy = (clientY - r.top)  / r.height * 780;
  return { x: dataX(sx), y: dataY(sy) };
}

// Scroll wheel zoom: rAF accumulation batches rapid events into one doZoom() per frame.
// doZoom() runs the same 180ms animated zoom as button clicks, using _renderVR as origin.
let _wheelAcc = 1, _wheelPivX = null, _wheelPivY = null, _wheelRafId = null;
hm.addEventListener('wheel', e => {
  e.preventDefault();
  const r = hm.getBoundingClientRect();
  const sx = (e.clientX - r.left) / r.width * 1300;
  if (sx < P.x || sx > P.x + P.w) return;
  const pt = screenToData(e.clientX, e.clientY);
  _wheelAcc *= e.deltaY < 0 ? 1.25 : 0.8;
  _wheelAcc  = Math.max(0.5, Math.min(2.0, _wheelAcc));
  _wheelPivX = pt.x;
  _wheelPivY = pt.y;
  if (!_wheelRafId) {
    _wheelRafId = requestAnimationFrame(() => {
      doZoom(_wheelAcc, _wheelPivX, _wheelPivY, 180);
      _wheelAcc = 1;
      _wheelRafId = null;
    });
  }
}, { passive: false });

// Pan: update VR on mousemove but throttle rerender to ~20fps so the data
// inside the chart square updates smoothly without flickering label recalc.
let panState    = null;
let panThrottle = null;

hm.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const r = hm.getBoundingClientRect();
  const sx = (e.clientX - r.left) / r.width * 1300;
  if (sx < P.x || sx > P.x + P.w) return;
  panState = { clientX: e.clientX, clientY: e.clientY, vr: {...VR}, moved: false };
  hm.classList.add('panning');
  e.preventDefault();
});

const risksLayer = document.getElementById('risks-layer');

window.addEventListener('mousemove', e => {
  if (!panState) return;
  const r = hm.getBoundingClientRect();
  // Data-space delta
  const dDataX = -(e.clientX - panState.clientX) / r.width  * (panState.vr.xMax - panState.vr.xMin);
  const dDataY =  (e.clientY - panState.clientY) / r.height * (panState.vr.yMax - panState.vr.yMin);
  // Update VR then clamp to default 0–5 bounds
  VR.xMin = panState.vr.xMin + dDataX;
  VR.xMax = panState.vr.xMax + dDataX;
  VR.yMin = panState.vr.yMin + dDataY;
  VR.yMax = panState.vr.yMax + dDataY;
  const _xr = VR.xMax - VR.xMin, _yr = VR.yMax - VR.yMin;
  if (VR.xMin < 0) { VR.xMin = 0; VR.xMax = _xr; }
  if (VR.xMax > 5) { VR.xMax = 5; VR.xMin = 5 - _xr; }
  if (VR.yMin < 0) { VR.yMin = 0; VR.yMax = _yr; }
  if (VR.yMax > 5) { VR.yMax = 5; VR.yMin = 5 - _yr; }
  panState.moved = true;

  // SVG-pixel offset using clamped VR (not raw delta)
  const dxSVG = -(VR.xMin - panState.vr.xMin) / (panState.vr.xMax - panState.vr.xMin) * P.w;
  const dySVG =  (VR.yMin - panState.vr.yMin) / (panState.vr.yMax - panState.vr.yMin) * P.h;

  if (!panThrottle) {
    panThrottle = requestAnimationFrame(() => {
      // Static layer re-renders (fast: gradient + grid + axis ticks update to new VR)
      const sl = document.getElementById('static-layer');
      while (sl.firstChild) sl.removeChild(sl.firstChild);
      renderStatic();
      // Risks layer just gets a translate — zero label recalculation, zero flicker
      risksLayer.setAttribute('transform',
        'translate('+dxSVG.toFixed(2)+','+dySVG.toFixed(2)+')');
      panThrottle = null;
    });
  }
});

window.addEventListener('mouseup', () => {
  if (!panState) return;
  if (panThrottle) { cancelAnimationFrame(panThrottle); panThrottle = null; }
  risksLayer.setAttribute('transform', '');  // clear visual offset
  const wasDrag = panState.moved;
  panState = null;
  hm.classList.remove('panning');
  // Only rerender if user actually dragged — a plain click must NOT destroy
  // dot elements before the click event fires on the dot group.
  if (wasDrag) rerender();
});

// Pin pill below "Likelihood" and cat-filter button
window.addEventListener('resize', () => { positionCtrl(); positionRiskHeader(); });

// ── Page-load entrance animation ─────────────────────────────────────────────
function runEntranceAnimation() {
  const GRAPH_OFFSET = 220;   // SVG units — shifts graph to center initially
  const PAUSE_MS     = 1000;  // hold centered state before animation begins
  const P1_DUR       = 950;   // graph slides to final position
  const P2_DELAY     = 550;   // list starts expanding (graph is ~97% home)
  const P2_DUR       = 580;   // list card reveals
  const P3_DELAY     = 1080;  // rows start after list bounce settles (must be < P2_DELAY+P2_DUR)
  const STAGGER_DUR  = 980;   // total spread for all rows
  const ITEM_DUR     = 400;   // each row / dot animation

  const easeGraph   = t => 1 - (1 - t) ** 4;  // quartic: fast start, long settle
  // easeOutBack: overshoots to ~1.10x then settles — gives the overstretch bounce
  const c1 = 1.70158, c3 = c1 + 1;
  const easeList    = t => 1 + c3 * (t - 1) ** 3 + c1 * (t - 1) ** 2;

  const chartInner  = document.getElementById('chart-inner');
  const legendLayer = document.getElementById('legend-layer');
  const zoomCtrl    = document.getElementById('zoom-ctrl');
  const headerBar   = document.getElementById('risk-header-bar');

  // SVG attribute transform: translate-scale-translate anchors scale to x=730 (graph right edge)
  // This is immune to CSS-pixel vs SVG-unit mismatch that causes left-edge drift with CSS scaleX
  const SCALE_ORIGIN = P.x + P.w;  // = 730
  legendLayer.setAttribute('transform',
    `translate(${SCALE_ORIGIN} 0) scale(0 1) translate(${-SCALE_ORIGIN} 0)`);

  zoomCtrl.style.opacity  = '0';
  headerBar.style.opacity = '0';

  const sortedIds = [...RISKS]
    .sort((a, b) => parseInt(a.id.replace(/\D/g,'')) - parseInt(b.id.replace(/\D/g,'')))
    .map(r => r.id);
  const STAGGER_PER = STAGGER_DUR / sortedIds.length;

  // ── Set initial visual state NOW (before the 1s pause) ───────────────────
  const revealedRiskGroups = new Set();
  sortedIds.forEach(id => {
    const row = legendRowByRiskId[id];
    if (row) {
      row.style.opacity        = '0';
      row.style.transform      = 'translateX(-20px)';
      row.style.transformBox   = 'view-box';
      row.style.transformOrigin = '50% 50%';
    }
    const dotG = dotGroupByRiskId[id];
    if (dotG) {
      const rg = dotG.parentElement;
      if (rg && !revealedRiskGroups.has(rg)) { rg.style.opacity = '0'; revealedRiskGroups.add(rg); }
      const sw = dotG.querySelector('.dot-scale-wrapper');
      if (sw) { sw.style.transform = 'scale(0)'; sw.style.transition = 'none'; }
    }
  });
  revealedRiskGroups.clear();

  // Graph centered from the very first frame — user sees this for PAUSE_MS
  chartInner.setAttribute('transform', `translate(${GRAPH_OFFSET},0)`);

  // ── Start ticker after 1-second pause ────────────────────────────────────
  setTimeout(() => {
    const t0 = performance.now();
    let phase2CornerSwitched = false;
    let phase3Fired          = false;

    function tick(now) {
      const elapsed = now - t0;

      // Phase 1: graph slides to final position
      const p1 = Math.min(1, elapsed / P1_DUR);
      const gx = GRAPH_OFFSET * (1 - easeGraph(p1));
      if (p1 < 1) chartInner.setAttribute('transform', `translate(${gx.toFixed(2)},0)`);
      else        chartInner.removeAttribute('transform');

      // Switch to open-path border just as list starts appearing
      if (!phase2CornerSwitched && elapsed >= P2_DELAY) {
        phase2CornerSwitched = true;
        _graphAllRounded = false;
        const sl = document.getElementById('static-layer');
        while (sl.firstChild) sl.removeChild(sl.firstChild);
        renderStatic();
      }

      // Phase 2: SVG transform scale anchored to x=730 — easeOutBack gives overstretch bounce
      const p2raw = (elapsed - P2_DELAY) / P2_DUR;
      const p2    = Math.max(0, Math.min(1, p2raw));
      const sx    = Math.max(0, easeList(p2)).toFixed(4);
      legendLayer.setAttribute('transform',
        `translate(${SCALE_ORIGIN} 0) scale(${sx} 1) translate(${-SCALE_ORIGIN} 0)`);

      if (p2 > 0.4) {
        headerBar.style.transition = 'opacity 0.35s ease';
        headerBar.style.opacity    = '1';
        zoomCtrl.style.transition  = 'opacity 0.35s ease';
        zoomCtrl.style.opacity     = '1';
      }

      // Phase 3: stagger rows and dots
      if (!phase3Fired && elapsed >= P3_DELAY) {
        phase3Fired = true;
        sortedIds.forEach((id, idx) => {
          setTimeout(() => {
            const row = legendRowByRiskId[id];
            if (row) {
              row.style.transition = `opacity ${ITEM_DUR}ms cubic-bezier(0.16,1,0.3,1), transform ${ITEM_DUR}ms cubic-bezier(0.16,1,0.3,1)`;
              row.style.opacity    = '1';
              row.style.transform  = 'translateX(0px)';
              setTimeout(() => {
                // Clear ALL inline styles — leftover values override CSS hover/dim rules
                row.style.opacity = ''; row.style.transform = ''; row.style.transformBox = '';
                row.style.transformOrigin = ''; row.style.transition = '';
              }, ITEM_DUR + 60);
            }
            const dotG = dotGroupByRiskId[id];
            if (dotG) {
              const rg = dotG.parentElement;
              if (rg && !revealedRiskGroups.has(rg)) {
                revealedRiskGroups.add(rg);
                rg.style.transition = `opacity ${Math.round(ITEM_DUR * 0.55)}ms ease`;
                rg.style.opacity    = '1';
                setTimeout(() => { rg.style.opacity = ''; rg.style.transition = ''; }, ITEM_DUR + 60);
              }
              const sw = dotG.querySelector('.dot-scale-wrapper');
              if (sw) {
                sw.style.transition = 'none';
                sw.style.transform  = 'scale(0)';
                requestAnimationFrame(() => {
                  sw.style.transition = `transform ${ITEM_DUR}ms cubic-bezier(0.34,1.56,0.64,1)`;
                  sw.style.transform  = 'scale(1)';
                  // Clear inline styles after bounce so CSS hover rules take over
                  setTimeout(() => {
                    sw.style.transform = '';
                    sw.style.transition = '';
                  }, ITEM_DUR + 60);
                });
              }
            }
          }, idx * STAGGER_PER);
        });
      }

      // Keep ticking until p1 done, p2 done, AND phase3 has fired
      if (p1 < 1 || (p2raw > 0 && p2 < 1) || !phase3Fired) {
        requestAnimationFrame(tick);
      } else {
        setTimeout(() => legendLayer.removeAttribute('transform'), STAGGER_DUR + ITEM_DUR + 100);
      }
    }

    requestAnimationFrame(tick);
  }, PAUSE_MS);
}

// Renders run LAST — after all event listeners are registered so a render
// error can never prevent zoom/pan/labels from working
try { renderStatic(); renderRisks(); renderLegend(); } catch(e) { console.error('render error', e); }
buildCatDropdown();
updateCatFilterBtn();
setTimeout(() => { positionCtrl(); positionRiskHeader(); runEntranceAnimation(); }, 0);
</script>
</body>
